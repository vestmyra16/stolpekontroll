<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v2.7</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    text-align:center;
}

.container {
    max-width:420px;
    margin:auto;
    padding:10px;
}

h2 {
    margin-top:10px;
}

label {
    display:block;
    text-align:left;
    font-weight:bold;
    margin-top:10px;
}

input, select {
    width:100%;
    padding:12px;
    margin-top:5px;
    font-size:16px;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:18px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:5px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.smallgrid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:6px;
}

.section {
    background:white;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
}

.result {
    background:#e8f5e9;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v2.7</h2>

<!-- GRUNNLAG -->
<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordband (mm)</label>
<input id="jordband">

<label>Nedgravd (m)</label>
<input id="nedgravd">

<label>Jordsmonn</label>
<div class="grid">
<button onclick="sett('jord','Innmark')">Innmark</button>
<button onclick="sett('jord','Skogsmark')">Skogsmark</button>
<button onclick="sett('jord','Fjell')">Fjell</button>
</div>

<label>Klima</label>
<div class="grid">
<button onclick="sett('klima','Kyst')">Kyst</button>
<button onclick="sett('klima','Innland')">Innland</button>
<button onclick="sett('klima','Fjell')">Fjell</button>
</div>

<label>Vertikallast</label>
<div class="grid">
<button onclick="sett('last','Lav')">Lav</button>
<button onclick="sett('last','Normal')">Normal</button>
<button onclick="sett('last','Høy')">Høy</button>
</div>

<button onclick="nyMast()">Ny mast</button>
</div>

<!-- SKADEVALG -->
<div class="section">
<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velgSkade('indre')">Indre råte</button>
<button onclick="velgSkade('sirk')">Sirkulær råte</button>
<button onclick="velgSkade('soft')">Softråte</button>
<button onclick="velgSkade('sprekk')">Sprekk</button>
<button onclick="velgSkade('hakk')">Hakkespetthull</button>
<button onclick="velgSkade('spett')">Spettsmie</button>
</div>
</div>

<!-- SKADE -->
<div class="section" id="skadeDiv" style="display:none;">
<h3 id="skadetittel"></h3>

<label>Stolpenr</label>
<input>

<label>Høyde skade (m)</label>
<input>

<label>Diameter (mm)</label>
<input>

<div id="felt"></div>

<button onclick="taBilde()">📷 Ta bilde</button>

<label>Merknad</label>
<input>

<button onclick="lagre()">Lagre mast</button>
</div>

<!-- EXPORT -->
<div class="section">
<h3>Eksport</h3>

<button onclick="lastNed()">Last ned CSV</button>
</div>

</div>

<script>

let data = [];

function sett(type, verdi){
    console.log(type, verdi);
}

function nyMast(){
    document.querySelectorAll("input").forEach(i => i.value="");
}

function velgSkade(type){
    let div = document.getElementById("skadeDiv");
    div.style.display="block";

    let felt = document.getElementById("felt");
    let tittel = document.getElementById("skadetittel");

    felt.innerHTML = "";

    if(type=="indre"){
        tittel.innerText="Indre råte (A B E)";
        lagFelt(["A","B","E"]);
    }
    if(type=="sirk"){
        tittel.innerText="Sirkulær råte (A B C D)";
        lagFelt(["A","B","C","D"]);
    }
    if(type=="soft"){
        tittel.innerText="Softråte (A B C D)";
        lagFelt(["A","B","C","D"]);
    }
    if(type=="spett"){
        tittel.innerText="Spettsmie (A B)";
        lagFelt(["A","B"]);
    }
    if(type=="hakk"){
        tittel.innerText="Hakkespetthull (A B C D)";
        lagFelt(["A","B","C","D"]);
    }
    if(type=="sprekk"){
        tittel.innerText="Sprekk";
        felt.innerHTML = `
        <label>Start (m)</label><input>
        <label>Slutt (m)</label><input>
        <label>Dybde (mm)</label><input>
        <label>Bredde (mm)</label><input>
        <label>Lengde (m)</label><input>
        `;
    }
}

function lagFelt(arr){
    let felt = document.getElementById("felt");
    arr.forEach(a=>{
        felt.innerHTML += `<label>${a} (mm)</label><input>`;
    });
}

function lagre(){
    alert("Lagret");
}

function lastNed(){
    let csv = "data";
    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stolper.csv";
    a.click();
}

function taBilde(){
    alert("Åpner kamera (kommer)");
}

</script>

</body>
</html>
