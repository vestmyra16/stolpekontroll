<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;max-width:420px;margin:auto;background:#f2f2f2;padding:10px;}
h2{text-align:center;}
label{display:block;font-weight:bold;margin-top:8px;color:#000;}
input{width:100%;padding:12px;margin:4px 0 8px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin:6px 0;background:#2e7d32;color:white;border:none;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.choice{background:#2e7d32;color:white;padding:12px;text-align:center;}
.hidden{display:none;}
img{width:90px;margin:auto;display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>Stolpekontroll</h3>
<label>Passord</label>
<input type="password" id="pass">
<button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">

<h2>Stolpekontroll v2.9</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Nedgravingsdybde (m)</label><input id="nedgravd">
<label>Jordbånddiameter (mm)</label><input id="jord">

<label>Avtrapping (cm/m)</label><input id="avtr" value="0.75">
<label>Toppdiameter (mm)</label><input id="topp">

<h3>Forhold</h3>

<label>Jordsmonn</label>
<div class="choice" onclick="toggle('jordvalg')" id="jordTxt">Skogsmark</div>
<div id="jordvalg" class="hidden grid">
<button onclick="setVal('jordTxt','Innmark')">Innmark</button>
<button onclick="setVal('jordTxt','Skogsmark')">Skogsmark</button>
<button onclick="setVal('jordTxt','Fjell')">Fjell</button>
</div>

<label>Klima</label>
<div class="choice" onclick="toggle('klimavalg')" id="klimaTxt">Kyst</div>
<div id="klimavalg" class="hidden grid">
<button onclick="setVal('klimaTxt','Kyst')">Kyst</button>
<button onclick="setVal('klimaTxt','Innland')">Innland</button>
<button onclick="setVal('klimaTxt','Fjell')">Fjell</button>
</div>

<label>Vertikallast</label>
<div class="choice" onclick="toggle('lastvalg')" id="lastTxt">Normal</div>
<div id="lastvalg" class="hidden grid">
<button onclick="setVal('lastTxt','Lav')">Lav</button>
<button onclick="setVal('lastTxt','Normal')">Normal</button>
<button onclick="setVal('lastTxt','Høy')">Høy</button>
</div>

<button onclick="toggleFukt()">Fuktmåling</button>

<div id="fuktBox" class="hidden">
<label>Lufttemperatur</label><input id="temp">
<label>Relativ fuktighet</label><input id="rf">
<label>Fukt ytterskall</label><input id="fukt">
</div>

<label>GPS</label><input id="gps">

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre')">Indre råte</button>
<button onclick="velg('sirk')">Sirkulær råte</button>
<button onclick="velg('soft')">Softråte</button>
<button onclick="velg('spett')">Spettsmie</button>
<button onclick="velg('hakk')">Hakkespetthull</button>
<button onclick="velg('sprekk')">Sprekk</button>
</div>

<div id="skade1" class="hidden">
<h3 id="tittel1"></h3>
<label>Stolpenr</label><input id="stolpe1">
<label>Skadehøyde over bakken (m)</label><input id="h1">
<label>Skadelengde (m)</label><input id="l1">
<label>Diameter på skadested (mm)</label><input id="d1">
<div id="felt1"></div>
</div>

<button onclick="toggle2()">Legg til skade 2</button>

<div id="skade2" class="hidden">
<h3 id="tittel2"></h3>
<label>Stolpenr</label><input id="stolpe2">
<label>Skadehøyde over bakken (m)</label><input id="h2">
<label>Skadelengde (m)</label><input id="l2">
<label>Diameter på skadested (mm)</label><input id="d2">
<div id="felt2"></div>
</div>

<button onclick="lagre()">Lagre mast</button>
<button onclick="lastCSV()">Last ned Excel</button>

</div>

<script>

// LOGIN
const PASSORD="Stolpe2026";
function login(){
if(pass.value===PASSORD){
loginBox.style.display="none";
app.style.display="block";
}else alert("Feil passord");
}

// 🔧 TOPPDIAMETER
function beregnTopp(){
let toppFelt = document.getElementById("topp");
if(toppFelt.value) return;

let d = parseFloat(document.getElementById("jord").value);
let h = parseFloat(document.getElementById("hoyde").value);
let a = parseFloat(document.getElementById("avtr").value);

if(!d || !h || !a) return;

let topp = d - (a * 10 * h);
if(topp > 0) toppFelt.value = Math.round(topp);
}

["jord","hoyde","avtr"].forEach(id=>{
document.getElementById(id).addEventListener("input", ()=>{
document.getElementById("topp").value="";
beregnTopp();
});
});

// UI
function toggle(id){document.getElementById(id).classList.toggle("hidden");}
function setVal(id,val){document.getElementById(id).innerText=val;}
function toggleFukt(){fuktBox.classList.toggle("hidden");}

// GPS
let watch=null;
function startGPS(){
watch=navigator.geolocation.watchPosition(p=>{
gps.value=p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
});
}
function stopGPS(){navigator.geolocation.clearWatch(watch);}

// FELT
const felt={
indre:["A (mm)","B (mm)","E (mm)"],
sirk:["A","B","C","D"],
soft:["A","B","C","D"],
spett:["A","B"],
hakk:["A","B","C","D"],
sprekk:["Start","Slutt","A","B","Antall","30","40","Beskrivelse"]
};

function lagFelt(type,id,p){
let d=document.getElementById(id);
d.innerHTML="";
felt[type].forEach(f=>{
d.innerHTML+=`<label>${f}</label><input id="${p}_${f}">`;
});
}

function velg(type){
skade1.classList.remove("hidden");
tittel1.innerText=type+" 1";
tittel2.innerText=type+" 2";
lagFelt(type,"felt1","s1");
lagFelt(type,"felt2","s2");
}

function hent(p){
let r={};
document.querySelectorAll(`[id^=${p}_]`).forEach(i=>{
r[i.id]=i.value;
});
return r;
}

function toggle2(){skade2.classList.toggle("hidden");}

// DATA
let data=[];

function lagre(){

let base={
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
stolpehoyde:hoyde.value,
nedgraving:nedgravd.value,
jorddiameter:jord.value,
avtrapping:avtr.value,
toppdiameter:topp.value,
klima:klimaTxt.innerText,
jordsmonn:jordTxt.innerText,
vertikallast:lastTxt.innerText,
temp:temp.value,
rf:rf.value,
fukt:fukt.value,
gps:gps.value,
dato:new Date().toLocaleDateString("no-NO")
};

if(stolpe1.value){
data.push({...base,
stolpenr:stolpe1.value,
skadetype:tittel1.innerText,
skadehoyde:h1.value,
skadelengde:l1.value,
diameter:d1.value,
...hent("s1")
});
}

if(stolpe2.value){
data.push({...base,
stolpenr:stolpe2.value,
skadetype:tittel2.innerText,
skadehoyde:h2.value,
skadelengde:l2.value,
diameter:d2.value,
...hent("s2")
});
}

alert("Lagret");
}

// CSV
function lastCSV(){
if(data.length===0){alert("Ingen data");return;}
let csv=Object.keys(data[0]).join(",")+"\n";
data.forEach(d=>{csv+=Object.values(d).join(",")+"\n";});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="stolpekontroll.csv";
a.click();
}

function nyMast(){
let n=netteier.value;
let l=linje.value;
document.querySelectorAll("input").forEach(i=>i.value="");
netteier.value=n;
linje.value=l;
skade1.classList.add("hidden");
skade2.classList.add("hidden");
}

</script>

</body>
</html>
