<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v3.1</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:auto; padding:12px; background:white; }

h2 { text-align:center; }

label { display:block; margin-top:10px; font-weight:bold; }

input, select, textarea {
    width:100%;
    padding:12px;
    margin-top:4px;
    font-size:16px;
}

button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2e7d32;
    color:white;
    font-size:16px;
}

.result {
    background:#eef;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v3.1</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordbånddiameter (mm)</label>
<input id="jordband">

<label>Mastetype</label>
<select id="mastetype">
<option value="enkel" selected>Enkel stolpe</option>
<option value="bardun">Bardunert mast</option>
<option value="a">A-mast</option>
</select>

<label>Vertikallast</label>
<select id="last">
<option>Lav</option>
<option selected>Normal</option>
<option>Høy</option>
</select>

<label>Klima</label>
<select id="klima">
<option value="fjell">Fjell</option>
<option value="innland" selected>Innland</option>
<option value="kyst">Kyst</option>
</select>

<label>Jordsmonn</label>
<select id="jord">
<option value="fjell">Fjell</option>
<option value="skog" selected>Skogsmark</option>
<option value="innmark">Innmark</option>
</select>

<button onclick="nyMast()">Ny mast</button>

<h3>Indre råte</h3>

<label>Stolpenr</label>
<input id="stolpenr">

<label>Skade starter (m)</label>
<input id="start">

<label>Skade slutter (m)</label>
<input id="slutt">

<label>Diameter på skadested (mm)</label>
<input id="diameter">

<label>A (mm)</label>
<input id="A">

<label>E (restskall mm)</label>
<input id="E">

<label>Lengde langs stolpen</label>
<select id="lengde">
<option value="kort">0 – 0,5 m (Kort)</option>
<option value="middels" selected>0,5 – 2 m (Middels)</option>
<option value="lang">&gt; 2 m (Lang)</option>
</select>

<textarea id="merknad" placeholder="Merknad"></textarea>

<button onclick="beregn()">Beregn</button>

<div id="resultat" class="result"></div>

</div>

<script>

function beregn(){

    let D = parseFloat(document.getElementById("diameter").value);
    let E = parseFloat(document.getElementById("E").value);
    let A = parseFloat(document.getElementById("A").value || 0);
    let hoyde = parseFloat(document.getElementById("hoyde").value);
    let start = parseFloat(document.getElementById("start").value);
    let slutt = parseFloat(document.getElementById("slutt").value);

    let mastetype = document.getElementById("mastetype").value;
    let last = document.getElementById("last").value;
    let lengdeklasse = document.getElementById("lengde").value;
    let klima = document.getElementById("klima").value;
    let jord = document.getElementById("jord").value;

    if(!D || !E || !hoyde){
        alert("Fyll inn diameter, restskall og stolpehøyde");
        return;
    }

    let radius = D / 2;

    // 🔥 RESTSTYRKE – riktig følsomhet
    let rest = 100 * Math.pow((E / radius), 0.6);

    // 🔧 A påvirkning
    let faktorA = 1 - Math.pow((A / D), 1.2);
    if(faktorA < 0.3) faktorA = 0.3;

    // 🔧 Lengde
    let faktorLengde = 1;
    if(lengdeklasse === "middels") faktorLengde = 0.8;
    if(lengdeklasse === "lang") faktorLengde = 0.6;

    // 🔧 Mastetype
    let faktorMast = 1;
    if(mastetype === "bardun") faktorMast = 1.15;
    if(mastetype === "a") faktorMast = 1.25;

    // 🔧 Knekkpunkt
    let knekk = hoyde * 0.33;
    let treff = 0;

    if(start && slutt){
        if(start <= knekk && slutt >= knekk) treff = 1;
        else if(Math.abs(start - knekk) < 2 || Math.abs(slutt - knekk) < 2) treff = 0.5;
    }

    let faktorKnekk = (treff > 0) ? 0.8 : 1;

    rest = rest * faktorA * faktorLengde * faktorMast * faktorKnekk;

    if(rest > 100) rest = 100;
    if(rest < 40) rest = 40;

    // 🔥 Sikkerhetsfaktor
    let baseSF = 1.8 * (rest / 100);

    let lastFaktor = 1;
    if(last === "Høy") lastFaktor = 0.8;
    if(last === "Lav") lastFaktor = 1.2;

    let sf30 = baseSF * lastFaktor;
    let sf40 = sf30 * (40 / 30);

    // 🔥 Levetid (med klima + jord)
    let levetid = 15;

    if(sf30 < 1.1) levetid = 8;
    if(sf30 < 1.0) levetid = 4;

    // Klima
    if(klima === "kyst") levetid *= 0.7;
    if(klima === "fjell") levetid *= 1.2;

    // Jord
    if(jord === "innmark") levetid *= 0.8;
    if(jord === "fjell") levetid *= 1.1;

    let levetidTekst = Math.round(levetid) + " år";

    document.getElementById("resultat").innerHTML = `
        <b>Reststyrke:</b> ${rest.toFixed(1)} %<br>
        <b>SF (30):</b> ${sf30.toFixed(2)}<br>
        <b>SF (40):</b> ${sf40.toFixed(2)}<br>
        <b>Restlevetid:</b> ${levetidTekst}
    `;
}

function nyMast(){

    let netteier = document.getElementById("netteier").value;
    let linje = document.getElementById("linje").value;

    document.querySelectorAll("input, textarea").forEach(e => e.value = "");

    document.getElementById("netteier").value = netteier;
    document.getElementById("linje").value = linje;

    document.getElementById("resultat").innerHTML = "";
}

</script>

</body>
</html>
