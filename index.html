<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v2.8</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; text-align:center; }

.container { max-width:420px; margin:auto; padding:10px; }

.section { background:white; padding:10px; margin-top:10px; border-radius:6px; }

label { display:block; text-align:left; font-weight:bold; margin-top:10px; }

input { width:100%; padding:12px; margin-top:5px; font-size:16px; }

button {
    width:100%;
    height:55px;
    margin-top:8px;
    font-size:18px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:6px;
}

/* grid knapper samme størrelse */
.grid button {
    height:55px;
    font-size:18px;
}

.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.hidden { display:none; }

img {
    width:55%;
    margin:10px auto;
    display:block;
    border-radius:5px;
}

.choice {
    background:#2e7d32;
    color:white;
    padding:12px;
    margin-top:5px;
    border-radius:5px;
}

.smallBtn {
    padding:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v2.8</h2>

<!-- GRUNNLAG -->
<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input>

<label>Jordband (mm)</label>
<input>

<label>Nedgravd (m)</label>
<input>

<!-- Jordsmonn -->
<label>Jordsmonn</label>
<div class="choice" onclick="toggle('jordvalg')" id="jordValg">Skogsmark</div>

<div id="jordvalg" class="hidden grid">
<button onclick="settValg('jordValg','Innmark')">Innmark</button>
<button onclick="settValg('jordValg','Fjell')">Fjell</button>
</div>

<!-- Klima -->
<label>Klima</label>
<div class="choice" onclick="toggle('klimavalg')" id="klimaValg">Kyst</div>

<div id="klimavalg" class="hidden grid">
<button onclick="settValg('klimaValg','Innland')">Innland</button>
<button onclick="settValg('klimaValg','Fjell')">Fjell</button>
</div>

<!-- Vertikallast -->
<label>Vertikallast</label>
<div class="choice" onclick="toggle('lastvalg')" id="lastValg">Normal</div>

<div id="lastvalg" class="hidden grid">
<button onclick="settValg('lastValg','Lav')">Lav</button>
<button onclick="settValg('lastValg','Høy')">Høy</button>
</div>

<button onclick="nyMast()">Ny mast</button>
</div>

<!-- SKADEVALG -->
<div class="section">
<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velgSkade('indre')">Indre råte</button>
<button onclick="velgSkade('sirk')">Sirkulær råte</button>
<button onclick="velgSkade('soft')">Softråte</button>
<button onclick="velgSkade('sprekk')">Sprekk</button>
<button onclick="velgSkade('hakk')">Hakkespetthull</button>
<button onclick="velgSkade('spett')">Spettsmie</button>
</div>
</div>

<!-- SKADE -->
<div class="section hidden" id="skadeDiv">

<h3 id="skadetittel"></h3>

<img id="bilde">

<label>Stolpenr</label>
<input>

<label>Høyde skade (m)</label>
<input>

<label>Diameter (mm)</label>
<input>

<div id="felt"></div>

<button onclick="taBilde()">📷 Ta bilde</button>

<label>Merknad</label>
<input>

<button onclick="lagre()">Lagre mast</button>
</div>

<!-- EXPORT -->
<div class="section">
<h3>Eksport</h3>
<button onclick="lastNed()">Last ned CSV</button>
</div>

</div>

<script>

// 🔹 Behold Netteier + LinjeID
window.onload = function(){
    document.getElementById("netteier").value = localStorage.getItem("netteier") || "";
    document.getElementById("linje").value = localStorage.getItem("linje") || "";
}

function lagreGrunnlag(){
    localStorage.setItem("netteier", document.getElementById("netteier").value);
    localStorage.setItem("linje", document.getElementById("linje").value);
}

// 🔹 Toggle valg
function toggle(id){
    let el = document.getElementById(id);
    el.classList.toggle("hidden");
}

// 🔹 Sett valg
function settValg(id, verdi){
    document.getElementById(id).innerText = verdi;
    document.getElementById(id.replace("Valg","valg")).classList.add("hidden");
}

// 🔹 Ny mast
function nyMast(){
    lagreGrunnlag();
    document.querySelectorAll("input").forEach(i=>{
        if(i.id!="netteier" && i.id!="linje") i.value="";
    });
}

// 🔹 Velg skade
function velgSkade(type){

    let div = document.getElementById("skadeDiv");
    div.classList.remove("hidden");

    let felt = document.getElementById("felt");
    let tittel = document.getElementById("skadetittel");
    let bilde = document.getElementById("bilde");

    felt.innerHTML = "";

    if(type=="indre"){
        tittel.innerText="Indre råte (ABE)";
        bilde.src="indre.svg";
        lagFelt(["A","B","E"]);
    }
    if(type=="sirk"){
        tittel.innerText="Sirkulær råte (ABCD)";
        bilde.src="sirk.svg";
        lagFelt(["A","B","C","D"]);
    }
    if(type=="soft"){
        tittel.innerText="Softråte (ABCD)";
        bilde.src="soft.svg";
        lagFelt(["A","B","C","D"]);
    }
    if(type=="spett"){
        tittel.innerText="Spettsmie (AB)";
        bilde.src="spett.svg";
        lagFelt(["A","B"]);
    }
    if(type=="hakk"){
        tittel.innerText="Hakkespetthull (ABCD)";
        bilde.src="hakk.svg";
        lagFelt(["A","B","C","D"]);
    }
    if(type=="sprekk"){
        tittel.innerText="Sprekk";
        bilde.src="sprekk.svg";
        felt.innerHTML = `
        <label>Start (m)</label><input>
        <label>Slutt (m)</label><input>
        <label>Dybde (mm)</label><input>
        <label>Bredde (mm)</label><input>
        <label>Lengde (m)</label><input>
        `;
    }
}

// 🔹 Lag felt
function lagFelt(arr){
    let felt = document.getElementById("felt");
    arr.forEach(a=>{
        felt.innerHTML += `<label>${a} (mm)</label><input>`;
    });
}

// 🔹 Lagre
function lagre(){
    lagreGrunnlag();
    alert("Lagret");
}

// 🔹 CSV
function lastNed(){
    let blob = new Blob(["data"], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stolper.csv";
    a.click();
}

// 🔹 Kamera
function taBilde(){
    alert("Kamera kommer i neste steg");
}

</script>

</body>
</html>
