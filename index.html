<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 10px;
}

.section {
  background: #fff;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 8px;
}

input, select {
  width: 100%;
  padding: 10px;
  border: 1px solid #999;
  border-radius: 6px;
  margin-top: 3px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 6px;
}

img {
  width: 100%;
  max-height: 150px;
  object-fit: contain;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v14.2</h2>

<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
<label>Stolpenr</label><input id="stolpe">

<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Jordbanddiameter (mm)</label><input id="jord">
</div>

<div class="section">
<h3>Skade</h3>

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte (ABE)</option>
<option>Sirkulær råte (ABCD)</option>
<option>Softråte (ABCD)</option>
<option>Spettsmie (AB)</option>
<option>Hakkespetthull (ABCD)</option>
<option>Sprekk (ABCH)</option>
</select>

<button onclick="visBilde()">Vis forklaring</button>
<img id="bilde" style="display:none">

<label>Diameter skadested (mm)</label>
<input id="diam">

<div id="felter"></div>

<button onclick="taBilde()">📸 Ta bilde</button>
<input type="file" id="kamera" accept="image/*" capture="environment" style="display:none">

<label>Merknad</label>
<input id="merknad">

</div>

<button onclick="nesteMast()">➡️ Neste mast</button>
<button onclick="lagreMast()">💾 Lagre mast</button>
<button onclick="lastNed()">📥 Last ned Excel</button>

<script>

let registreringer = [];

function oppdaterFelter() {
  let t = type.value;
  let f = document.getElementById("felter");

  if (t.includes("ABE")) {
    f.innerHTML = `
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
      <label>E (mm)</label><input id="E">
    `;
  }
  else if (t.includes("ABCD") && !t.includes("Sprekk")) {
    f.innerHTML = `
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
      <label>C (mm)</label><input id="C">
      <label>D (mm)</label><input id="D">
    `;
  }
  else if (t.includes("Spettsmie")) {
    f.innerHTML = `
      <label>Skadehøyde (m)</label><input id="sh">
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
    `;
  }
  else if (t.includes("Sprekk")) {
    f.innerHTML = `
      <label>Bredde A (mm)</label><input id="A">
      <label>Dybde B (mm)</label><input id="B">
      <label>Lengde på sprekk (C) (m)</label><input id="C">
      <label>Høyde over bakken H (m)</label><input id="H">

      <p style="font-size:14px;">
      A = Bredde | B = Dybde | C = Lengde på sprekk | H = Høyde over bakken
      </p>
    `;
  }
}

function visBilde() {
  let img = document.getElementById("bilde");
  let t = type.value;

  if (t.includes("Indre")) img.src = "indre.svg";
  else if (t.includes("Sirkulær")) img.src = "sirk.svg";
  else if (t.includes("Softråte")) img.src = "soft.svg";
  else if (t.includes("Spettsmie")) img.src = "spett.svg";
  else if (t.includes("Hakkespetthull")) img.src = "hakk.svg";
  else if (t.includes("Sprekk")) img.src = "sprekk.svg";

  img.style.display = "block";
}

function taBilde() {
  document.getElementById("kamera").click();
}

function hent(id) {
  let el = document.getElementById(id);
  return el ? el.value : "";
}

function lagreMast() {

  if (!mast.value) {
    alert("Mastnr mangler");
    return;
  }

  registreringer.push({
    netteier: hente("netteier"),
    linje: hente("linje"),
    mast: hente("mast"),
    type: hente("type"),
    A: hente("A"),
    B: hente("B"),
    C: hente("C"),
    D: hente("D"),
    E: hente("E"),
    merknad: hente("merknad")
  });

  alert("Mast lagret");
}

function nesteMast() {
  lagreMast();
  document.getElementById("mast").value = "";
}

function lastNed() {

  let csv = "Netteier,Linje,Mast,Type,A,B,C,D,E,Merknad\n";

  registreringer.forEach(r => {
    csv += `${r.netteier},${r.linje},${r.mast},${r.type},${r.A},${r.B},${r.C},${r.D},${r.E},${r.merknad}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stolpekontroll.csv";
  a.click();
}

oppdaterFelter();

</script>

</body>
</html>
