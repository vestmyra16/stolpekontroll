<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll</title>

<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px}
.section{background:#fff;padding:12px;margin-top:15px;border-radius:8px}
label{font-weight:bold;display:block;margin-top:10px}
input,select{width:100%;padding:10px;border:2px solid #999;border-radius:6px}
button{width:100%;padding:12px;margin-top:10px;background:#2e7d32;color:#fff;border:none;border-radius:6px}
</style>
</head>

<body>

<h2>Stolpekontroll v13</h2>

<div class="section">
<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
</div>

<div class="section">
<label>Type skade</label>
<select id="type" onchange="felter()">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
</select>

<div id="f"></div>

<label>📸</label>
<input type="file" accept="image/*" capture="environment" multiple>

<label>📝</label>
<input id="m">

<button onclick="lagre()">Lagre skade</button>
</div>

<button onclick="lastNed()">Last ned Excel</button>

<script>
let data=[];

function felter(){
if(type.value==="Sprekk"){
f.innerHTML=`
<label>Bredde A (mm)</label><input id="A">
<label>Dybde B (mm)</label><input id="B">
<label>Lengde C (m)</label><input id="C">
<label>Høyde H (m)</label><input id="H">
`;
}else{
f.innerHTML=`
<label>Skadehøyde (m)</label><input id="sh">
<label>A (mm)</label><input id="A">
<label>B (mm)</label><input id="B">
`;
}
}

function g(id){return document.getElementById(id)?.value||""}

function lagre(){
data.push({
netteier:g("netteier"),
linje:g("linje"),
mast:g("mast"),
type:g("type"),
sh:g("sh"),
A:g("A"),
B:g("B"),
C:g("C"),
H:g("H"),
merknad:g("m")
});
alert("Lagret");
}

function lastNed(){
let csv="Netteier,Linje,Mast,Type,Skadehøyde,A,B,C,H,Merknad\n";
data.forEach(r=>{
csv+=`${r.netteier},${r.linje},${r.mast},${r.type},${r.sh},${r.A},${r.B},${r.C},${r.H},${r.merknad}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="stolpekontroll.csv";
a.click();
}

felter();
</script>

</body>
</html>
