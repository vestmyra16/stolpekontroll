<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>
  
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
  
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; max-width:700px; margin:auto; padding:15px;}
label {font-weight:bold; display:block; margin-top:10px;}
input, select, textarea {width:100%; padding:8px;}
button {margin-top:10px; padding:12px; width:100%; background:green; color:white; border:none;}
.hidden {display:none;}
</style>
</head>

<body>

<h2>Grunnlagsdata</h2>
<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<button onclick="nyMast()">Ny mast</button>
<button onclick="mastOK()">Mast OK</button>

<h2>Registrer skade 1</h2>

<select id="skadetype1" onchange="visFelter(1)">
<option value="">Velg skadetype</option>
<option value="indre">Indre råte</option>
<option value="sirk">Sirkulær råte</option>
<option value="soft">Softråte</option>
<option value="spett">Spettsmie</option>
<option value="sprekk">Sprekk</option>
<option value="hakk">Hakkespetthull</option>
</select>

<img id="img1" width="80">
<div id="bok1"></div>

<label>Skadehøyde (m)</label><input id="sh1">
<label>Diameter (mm)</label><input id="d1">

<div id="foto1">
<button onclick="kamera(1)">📷 Ta bilde</button>
<input type="file" id="kamera1" accept="image/*" capture="environment" class="hidden">
</div>

<div id="merknad1box">
<label>Merknad</label><textarea id="merknad1"></textarea>
</div>

<button onclick="visSkade2()">Ny registrering (skade 2)</button>

<div id="skade2" class="hidden">

<h2>Registrer skade 2</h2>

<select id="skadetype2" onchange="visFelter(2)">
<option value="">Velg skadetype</option>
<option value="indre">Indre råte</option>
<option value="sirk">Sirkulær råte</option>
<option value="soft">Softråte</option>
<option value="spett">Spettsmie</option>
<option value="sprekk">Sprekk</option>
<option value="hakk">Hakkespetthull</option>
</select>

<img id="img2" width="80">
<div id="bok2"></div>

<label>Skadehøyde (m)</label><input id="sh2">
<label>Diameter (mm)</label><input id="d2">

<div id="foto2">
<button onclick="kamera(2)">📷 Ta bilde</button>
<input type="file" id="kamera2" accept="image/*" capture="environment" class="hidden">
</div>

<div id="merknad2box">
<label>Merknad</label><textarea id="merknad2"></textarea>
</div>

</div>

<button onclick="lagre()">Lagre</button>
<button onclick="excel()">Last ned Excel</button>

<script>

/* ===== TILGANG ===== */
let kode = prompt("Skriv inn tilgangskode");
if(kode !== "stolpe2026"){document.body.innerHTML="Ingen tilgang";throw new Error();}

/* ===== TID ===== */
const EXPIRY_DAYS = 365;
let start=localStorage.getItem("start");
if(!start){localStorage.setItem("start",Date.now());}
if((Date.now()-start)/(1000*60*60*24)>EXPIRY_DAYS){
document.body.innerHTML="Tilgang utløpt";throw new Error();
}

/* ===== APP ===== */
let lagret=[];

function nyMast(){
document.getElementById("skade2").classList.add("hidden");
}

function mastOK(){
document.getElementById("foto1").style.display="none";
document.getElementById("merknad1box").style.display="none";
document.getElementById("skade2").style.display="none";
}

function visSkade2(){
document.getElementById("skade2").classList.remove("hidden");
visFelter(2);
}

function kamera(nr){
document.getElementById("kamera"+nr).click();
}

function felt(n,nr){
return `<label>${n} (mm)</label><input id="${n}${nr}">`;
}

function visFelter(nr){
let type=document.getElementById("skadetype"+nr).value;
let div=document.getElementById("bok"+nr);
let img=document.getElementById("img"+nr);
div.innerHTML="";

if(type=="indre"){img.src="indre.svg";div.innerHTML=felt("A",nr)+felt("B",nr)+felt("E",nr);}
if(type=="sirk"){img.src="sirk.svg";div.innerHTML=felt("A",nr)+felt("B",nr)+felt("C",nr)+felt("D",nr);}
if(type=="soft"){img.src="soft.svg";div.innerHTML=felt("A",nr)+felt("B",nr)+felt("C",nr)+felt("D",nr);}
if(type=="spett"){img.src="spett.svg";div.innerHTML=felt("A",nr)+felt("B",nr);}
if(type=="sprekk"){img.src="sprekk.svg";div.innerHTML=felt("A",nr)+felt("B",nr);}
if(type=="hakk"){img.src="hakkespetthull.svg";div.innerHTML=felt("A",nr)+felt("B",nr)+felt("C",nr)+felt("D",nr);}
}

function lagre(){

let linje=document.getElementById("linje").value;
let mast=document.getElementById("mast").value;

let bilde1=document.getElementById("kamera1").files[0]?.name || "";
let bilde2=document.getElementById("kamera2").files[0]?.name || "";

lagret.push({
Linje:linje,
Mast:mast,
Skade1:document.getElementById("skadetype1").value,
Merknad1:document.getElementById("merknad1").value,
Bilde1:bilde1,
Skade2:document.getElementById("skadetype2").value,
Merknad2:document.getElementById("merknad2").value,
Bilde2:bilde2
});

alert("Lagret");
}

function excel(){

let linje=document.getElementById("linje").value || "UtenLinje";

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.json_to_sheet(lagret);

XLSX.utils.book_append_sheet(wb,ws,"Kontroll");

XLSX.writeFile(wb,"Stolpekontroll_"+linje+".xlsx");
}

visFelter(1);

</script>

</body>
</html>
