<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; max-width:700px; margin:auto; padding:15px;}
label {font-weight:bold; display:block; margin-top:10px;}
input, select, textarea {width:100%; padding:8px; margin-top:4px;}
button {margin-top:10px; padding:12px; width:100%; background:green; color:white; border:none;}
img {width:80px; margin-top:10px;}
.hidden {display:none;}
</style>

<script>
/* 🔐 TILGANG */
const ACCESS_CODE = "stolpe2026";
const EXPIRY_DAYS = 365;

function sjekkTilgang(){
    let start = localStorage.getItem("startDato");
    let idag = new Date().getTime();

    if(!start){
        localStorage.setItem("startDato", idag);
    } else {
        let diff = (idag - start) / (1000*60*60*24);
        if(diff > EXPIRY_DAYS){
            document.body.innerHTML = "<h2>Tilgang utløpt</h2>";
            return false;
        }
    }

    let kode = prompt("Skriv inn tilgangskode");
    if(kode !== ACCESS_CODE){
        document.body.innerHTML = "<h2>Feil kode</h2>";
        return false;
    }

    return true;
}
</script>
</head>

<body>

<h2>Grunnlagsdata</h2>
<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<button onclick="nyMast()">Ny mast</button>

<h2>Registrer skade</h2>

<select id="skade">
<option value="">Velg skadetype</option>
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Spettsmie</option>
<option>Sprekk</option>
<option>Hakkespetthull</option>
</select>

<img id="illustrasjon" src="">

<label>Skadehøyde (m)</label><input id="hoyde">
<label>Diameter på skadested (mm)</label><input id="diameter">

<div id="bokstaver"></div>

<button onclick="taBilde()">📷 Ta bilde</button>
<input type="file" id="kamera" accept="image/*" capture="environment" class="hidden">

<label>Merknad</label>
<textarea id="merknad"></textarea>

<button onclick="ekstra()">Ny registrering (samme mast)</button>
<button onclick="lagre()">Lagre</button>
<button onclick="lastNed()">Last ned Excel</button>

<script>

/* 🚀 START (hindrer hvit skjerm) */
window.onload = function(){
    if(!sjekkTilgang()) return;
};

/* 📷 Kamera */
function taBilde(){
    document.getElementById("kamera").click();
}

/* 🔄 Ny mast */
function nyMast(){
    mast.value="";
    hoyde.value="";
    diameter.value="";
    merknad.value="";
    document.getElementById("bokstaver").innerHTML="";
}

/* ➕ Ekstra registrering */
function ekstra(){
    hoyde.value="";
    diameter.value="";
    merknad.value="";
    document.getElementById("bokstaver").innerHTML="";
}

/* 🔤 Dynamiske skader */
document.getElementById("skade").onchange = function(){

    let type = this.value;
    let div = document.getElementById("bokstaver");
    let img = document.getElementById("illustrasjon");

    div.innerHTML="";

    function felt(n){
        return `<label>${n} (mm)</label><input>`;
    }

    if(type=="Indre råte"){
        img.src="indre.svg";
        div.innerHTML=felt("A")+felt("B")+felt("E");
    }

    if(type=="Sirkulær råte"){
        img.src="sirk.svg";
        div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");
    }

    if(type=="Softråte"){
        img.src="soft.svg";
        div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");
    }

    if(type=="Spettsmie"){
        img.src="spett.svg";
        div.innerHTML=felt("A")+felt("B");
    }

    if(type=="Sprekk"){
        img.src="sprekk.svg";
        div.innerHTML=felt("A")+felt("B");
    }

    if(type=="Hakkespetthull"){
        img.src="hakkespetthull.svg";
        div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");
    }
};

/* 💾 Lagring */
let data = [];

function lagre(){
    data.push({
        netteier: netteier.value,
        linje: linje.value,
        mast: mast.value,
        skade: skade.value,
        hoyde: hoyde.value,
        diameter: diameter.value,
        merknad: merknad.value
    });
    alert("Lagret");
}

/* 📊 Excel */
function lastNed(){
    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Ark1");

    let navn = linje.value || "stolpekontroll";
    XLSX.writeFile(wb, navn + ".xlsx");
}

</script>

</body>
</html>
