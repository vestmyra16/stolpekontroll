<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.5.3 (REN FELT)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {font-family: Arial; background:#f4f4f4; padding:10px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select {width:100%; padding:8px; margin:4px 0;}
button {background:#2e7d32; color:white; padding:12px; width:100%; border:none; margin-top:10px;}

.popup {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.popup img {max-width:90%;}
</style>
</head>

<body>

<h2>Stolpekontroll v10.5.3 (REN)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">
<input id="nedgraving" type="number" placeholder="Nedgravingsdybde (m)">
<input id="jordband" type="number" placeholder="Jordbånddiameter (mm)">

<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<select id="jord">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<select id="fiber">
<option value="30">Fiberstyrke 30</option>
<option value="40">Fiberstyrke 40</option>
</select>

<select id="sf">
<option value="1">SF 1</option>
<option value="1.5">SF 1.5</option>
<option value="2">SF 2</option>
</select>

</div>

<div class="card">
<h3>Fukt</h3>

<input id="temp" placeholder="Temperatur (°C)">
<input id="rf" placeholder="Relativ luftfuktighet (%)">
<input id="yfukt" placeholder="Ytre fukt (%)">

</div>

<div class="card">
<h3>Skader</h3>

<select id="skadetype" onchange="visFelter()">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<label>
<input type="checkbox" onchange="visBilde(this)"> Vis målebilde
</label>

<div id="felter"></div>

<input id="lengde" placeholder="Lengde skade (mm)">
<input id="hSkade" placeholder="Skadehøyde over bakken (m)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<button onclick="beregn()">Beregn</button>

<h3 id="resultat"></h3>

<div id="popup" class="popup" onclick="this.style.display='none'">
<img id="popupimg">
</div>

<script>

let skader=[];

function visFelter(){

let t = skadetype.value;
let html = "";

if(t==="indre"){
html += input("A (mm)");
html += input("B (mm)");
html += input("E (mm)");
}
if(t==="sirk" || t==="soft"){
html += input("A (mm)");
html += input("B (mm)");
html += input("C (mm)");
html += input("D (mm)");
}
if(t==="sprekk" || t==="spett"){
html += input("A (mm)");
html += input("B (mm)");
}

document.getElementById("felter").innerHTML = html;
}

function input(label){
return `<input class="skade" placeholder="${label}">`;
}

function leggTil(){

let verdier = [];
document.querySelectorAll(".skade").forEach(i=>{
verdier.push(parseFloat(i.value)||0);
});

skader.push(verdier);

let html="";
skader.forEach((s,i)=>{
html += "Skade "+(i+1)+" registrert<br>";
});
liste.innerHTML = html;
}

function visBilde(el){

if(!el.checked){
popup.style.display="none";
return;
}

let map = {
indre:"indre.svg",
sirk:"sirk.svg",
soft:"soft.svg",
sprekk:"sprekk.svg",
spett:"spett.svg"
};

popupimg.src = map[skadetype.value] + "?v=" + Date.now();
popup.style.display="flex";
}

function beregn(){

let d = parseFloat(diameter.value||200);
let sf = parseFloat(document.getElementById("sf").value);

let lavest = 100;

skader.forEach(s=>{
let snitt = s.reduce((a,b)=>a+b,0)/s.length;
let rest = (d - snitt)/d * 100;
if(rest < lavest) lavest = rest;
});

let status = lavest < 75 ? "IKKE GODKJENT" : "OK";

if(sf < 1) status = "IKKE GODKJENT (SF<1)";

resultat.innerHTML =
"Restkapasitet: " + lavest.toFixed(1) + " %<br>Status: " + status;
}

</script>

</body>
</html>
