<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;max-width:420px;margin:auto;background:#f2f2f2;padding:10px;}
h2{text-align:center;}
label{display:block;font-weight:bold;margin-top:8px;}
input,textarea{width:100%;padding:10px;margin-top:4px;}
button{width:100%;padding:12px;margin-top:8px;background:#2e7d32;color:white;border:none;}
.hidden{display:none;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.choice{background:#2e7d32;color:white;padding:10px;text-align:center;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>Stolpekontroll</h3>
<input type="password" id="pass" placeholder="Passord">
<button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">

<h2>Stolpekontroll v2.9</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Nedgravingsdybde (m)</label><input id="nedgravd">
<label>Jordbånddiameter (mm)</label><input id="jord">

<label>Avtrapping (cm/m)</label><input id="avtr" value="0.75">
<label>Toppdiameter (mm)</label><input id="topp">

<label>GPS</label><input id="gps">

<h3>Forhold</h3>
<div class="grid">
<div class="choice" id="jordTxt" onclick="setVal('jordTxt','Innmark')">Innmark</div>
<div class="choice" id="klimaTxt" onclick="setVal('klimaTxt','Kyst')">Kyst</div>
<div class="choice" id="lastTxt" onclick="setVal('lastTxt','Normal')">Normal</div>
</div>

<h3>Skade</h3>

<label>Stolpenr</label><input id="stolpe">
<label>Skadetype</label><input id="type">
<label>Skadehøyde</label><input id="sh">
<label>Skadelengde</label><input id="sl">
<label>Diameter skadested</label><input id="sd">

<label>A</label><input id="A">
<label>B</label><input id="B">
<label>C</label><input id="C">
<label>D</label><input id="D">
<label>E</label><input id="E">

<button onclick="lagre()">Lagre</button>
<button onclick="lastCSV()">Last ned Excel</button>

</div>

<script>

// PASSORD
const PASSORD="1234";

function login(){
if(pass.value===PASSORD){
loginBox.style.display="none";
app.style.display="block";
}
}

// 🔧 Toppdiameter
function calcTopp(){
if(topp.value) return;

let d=parseFloat(jord.value);
let h=parseFloat(hoyde.value);
let a=parseFloat(avtr.value);

if(!d||!h||!a) return;

let t=d-(a*10*h);
if(t>0) topp.value=Math.round(t);
}

["jord","hoyde","avtr"].forEach(id=>{
document.addEventListener("input",e=>{
if(e.target.id===id){
topp.value="";
calcTopp();
}
});
});

// DATA
let data=[];

function lagre(){

let rad={
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
hoyde:hoyde.value,
nedgravd:nedgravd.value,
jord:jord.value,
avtr:avtr.value,
topp:topp.value,
gps:gps.value,
klima:klimaTxt.innerText,
jordtype:jordTxt.innerText,
last:lastTxt.innerText,
stolpe:stolpe.value,
type:type.value,
skadeh:sh.value,
skadel:sl.value,
diameter:sd.value,
A:A.value,B:B.value,C:C.value,D:D.value,E:E.value,
dato:new Date().toLocaleDateString()
};

data.push(rad);
alert("Lagret");
}

function lastCSV(){

let csv=Object.keys(data[0]).join(",")+"\n";
data.forEach(d=>{csv+=Object.values(d).join(",")+"\n";});

let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="stolpekontroll.csv";
a.click();
}

function setVal(id,val){document.getElementById(id).innerText=val;}

</script>

</body>
</html>
