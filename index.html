<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll</title>

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

h2 { margin-top: 25px; }

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  font-size: 16px;
}

.camera-btn {
  font-size: 30px;
  background: none;
  border: none;
}
</style>
</head>

<body>

<h2>Grunnlagsdata</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input type="number" id="hoyde">

<label>Jordbånddiameter (mm)</label>
<input type="number" id="jord">

<button onclick="nyMast()">Ny mast</button>

<h2>Registrer skade</h2>

<label>Skadetype</label>
<select id="skadetype" onchange="visFelter()">
  <option value="indre">Indre råte</option>
  <option value="sirk">Sirkulær råte</option>
  <option value="soft">Softråte</option>
  <option value="spett">Spettsmie</option>
  <option value="sprekk">Sprekk</option>
  <option value="hakk">Hakkespetthull</option>
</select>

<label>Stolpenr</label>
<input id="stolpenr">

<label>Skadehøyde (m)</label>
<input type="number">

<label>Diameter på skadested (mm)</label>
<input type="number">

<div id="bokstaver"></div>

<h3>Foto</h3>
<button class="camera-btn" onclick="document.getElementById('kamera').click()">📷</button>
<input type="file" id="kamera" accept="image/*" capture="environment" style="display:none">

<label>Merknad</label>
<textarea rows="3"></textarea>

<script>

function nyMast() {
  document.getElementById("mast").value = "";
  document.getElementById("hoyde").value = "";
  document.getElementById("jord").value = "";
  document.getElementById("stolpenr").value = "";
}

function visFelter() {
  let type = document.getElementById("skadetype").value;
  let div = document.getElementById("bokstaver");
  div.innerHTML = "";

  function felt(navn) {
    return `<label>${navn} (mm)</label><input type="number">`;
  }

  if (type === "indre") {
    div.innerHTML =
      felt("A") +  // råtebredde
      felt("B") +  // indre råte
      felt("E");   // restskall
  }

  if (type === "sirk") {
    div.innerHTML =
      felt("A") +
      felt("B") +
      felt("C") +
      felt("D");
  }

  if (type === "soft") {
    div.innerHTML =
      felt("A") +
      felt("B") +
      felt("C") +
      felt("D");
  }

  if (type === "spett") {
    div.innerHTML =
      felt("A") +
      felt("B");
  }

  if (type === "sprekk") {
    div.innerHTML =
      felt("A") +  // bredde
      felt("B");   // dybde
  }

  if (type === "hakk") {
    div.innerHTML =
      felt("A") +
      felt("B") +
      felt("C") +
      felt("D");
  }
}

visFelter();

</script>

</body>
</html>
