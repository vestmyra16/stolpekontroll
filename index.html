<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; background:white; }

label { font-weight:bold; display:block; margin-top:8px; }
input { width:100%; padding:10px; margin-top:4px; font-size:16px; }

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  font-size:16px;
  border:none;
  border-radius:6px;
  background:#2e7d32;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

img {
  width:40%;
  display:block;
  margin:auto;
}

.hidden { display:none; }
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v2.9</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>GPS (lat, lon)</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordband (mm)</label>
<input id="jordband">

<label>Nedgravd (m)</label>
<input id="nedgravd">

<!-- SKADEKNAPPER -->
<h3>Registrer skade</h3>

<div class="grid">
<button onclick="visSkade('indre')">Indre råte</button>
<button onclick="visSkade('sirk')">Sirkulær råte</button>

<button onclick="visSkade('soft')">Softråte</button>
<button onclick="visSkade('spett')">Spettsmie</button>

<button onclick="visSkade('hakk')">Hakkespetthull</button>
<button onclick="visSkade('sprekk')">Sprekk</button>
</div>

<!-- INDRE -->
<div id="indre" class="hidden">
<img src="indre.svg">
<label>A</label><input id="A">
<label>B</label><input id="B">
<label>E</label><input id="E">
</div>

<!-- SIRK -->
<div id="sirk" class="hidden">
<img src="sirk.svg">
<label>A</label><input>
<label>B</label><input>
<label>C</label><input>
<label>D</label><input>
</div>

<!-- SOFT -->
<div id="soft" class="hidden">
<img src="soft.svg">
<label>A</label><input>
<label>B</label><input>
<label>C</label><input>
<label>D</label><input>
</div>

<!-- SPETT -->
<div id="spett" class="hidden">
<img src="spett.svg">
<label>A</label><input>
<label>B</label><input>
</div>

<!-- HAKK -->
<div id="hakk" class="hidden">
<img src="hakk.svg">
<label>A</label><input>
<label>B</label><input>
<label>C</label><input>
<label>D</label><input>
</div>

<!-- SPREKK -->
<div id="sprekk" class="hidden">
<img src="sprekk.svg">
<label>Start</label><input>
<label>Slutt</label><input>
<label>Dybde</label><input>
</div>

<label>Merknad</label>
<input id="merknad">

<button onclick="lagre()">Lagre mast</button>
<button onclick="lastned()">Last ned CSV</button>

</div>

<script>

// VIS SKADE
function visSkade(type){
  let typer = ["indre","sirk","soft","spett","hakk","sprekk"];
  typer.forEach(t => document.getElementById(t).classList.add("hidden"));
  document.getElementById(type).classList.remove("hidden");
}

// GPS
let gpsWatch = null;

function startGPS(){
    if(navigator.geolocation){
        gpsWatch = navigator.geolocation.watchPosition(function(pos){
            let lat = pos.coords.latitude.toFixed(6);
            let lon = pos.coords.longitude.toFixed(6);
            document.getElementById("gps").value = lat + ", " + lon;
        }, null, { enableHighAccuracy: true });
    }
}

function stopGPS(){
    if(gpsWatch){
        navigator.geolocation.clearWatch(gpsWatch);
        gpsWatch = null;
    }
}

// DATA
let data = [];

function lagre(){
    let row = [
        document.getElementById("netteier").value,
        document.getElementById("linje").value,
        document.getElementById("mast").value,
        document.getElementById("gps").value,
        document.getElementById("hoyde").value,
        document.getElementById("jordband").value,
        document.getElementById("nedgravd").value,
        document.getElementById("A").value,
        document.getElementById("B").value,
        document.getElementById("E").value,
        document.getElementById("merknad").value
    ];

    data.push(row);
    alert("Lagret");
}

// CSV
function lastned(){

    let csv = "Netteier,LinjeID,Mastnr,GPS,Høyde,Jordband,Nedgravd,A,B,E,Merknad\n";

    data.forEach(r => {
        csv += r.join(",") + "\n";
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stolper.csv";
    a.click();
}

</script>

</body>
</html>
