<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/Stolpekontroll/icon-180.png">

<title>Stolpekontroll v2.0</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:600px; margin:auto; padding:10px; background:white; }

label { display:block; margin-top:10px; font-weight:bold; }
input, select, textarea { width:100%; padding:10px; margin-top:4px; }

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    background:#2e7d32;
    color:white;
}

img {
    width:100%;
    margin-top:10px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v2.0</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input>
<label>LinjeID</label><input>
<label>Mastnr</label><input>
<label>Stolpehøyde (m)</label><input>
<label>Jordbåndsdiameter (mm)</label><input>

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade 1</h3>

<select onchange="byttBilde(this.value,'img1')">
<option value="indre">Indre råte</option>
<option value="sirk">Sirkulær råte</option>
<option value="soft">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spett">Spettsmie</option>
<option value="hakk">Hakkespetthull</option>
</select>

<img id="img1" src="indre.png">

<label>A (mm)</label><input>
<label>B (mm)</label><input>
<label>E (mm)</label><input>

<button>📷 Ta bilde</button>
<textarea placeholder="Merknad"></textarea>

<h3>Registrer skade 2</h3>

<select onchange="byttBilde(this.value,'img2')">
<option value="indre">Indre råte</option>
<option value="sirk">Sirkulær råte</option>
<option value="soft">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spett">Spettsmie</option>
<option value="hakk">Hakkespetthull</option>
</select>

<img id="img2" src="indre.png">

<label>A (mm)</label><input>
<label>B (mm)</label><input>
<label>E (mm)</label><input>

<button>📷 Ta bilde</button>
<textarea placeholder="Merknad"></textarea>

<button>Lagre</button>
<button>Last ned Excel</button>

</div>

<script>

function nyMast(){
    document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}

function byttBilde(type, imgId){

    let bilder = {
        indre: "indre.png",
        sirk: "sirk.png",
        soft: "soft.png",
        sprekk: "sprekk.png",
        spett: "spett.png",
        hakk: "hakk.png"
    };

    document.getElementById(imgId).src = bilder[type];
}

</script>

</body>
</html>
