<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v6</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
.small { font-size:12px; color:#444; }
</style>
</head>

<body>

<h2>Stolpekontroll v6 (Standardmodell)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="diameter" type="number" placeholder="Diameter (mm)">
<input id="hoyde" type="number" placeholder="Høyde (m)">

<select id="styrke">
<option value="30">30 N/mm²</option>
<option value="40">40 N/mm²</option>
</select>

<select id="vind">
<option value="0.5">Lav vind</option>
<option value="1">Normal vind</option>
<option value="1.5">Høy vind</option>
</select>

<select id="is">
<option value="0">Ingen is</option>
<option value="0.5">Lett is</option>
<option value="1">Mye is</option>
</select>

</div>

<div class="card">
<h3>Skader</h3>

<select id="type">
<option value="innvendig">Innvendig råte</option>
<option value="sirkular">Sirkulær råte</option>
<option value="softråte">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spettsmie">Spettsmie</option>
</select>

<input id="A" type="number" placeholder="A">
<input id="B" type="number" placeholder="B">
<input id="C" type="number" placeholder="C">
<input id="D" type="number" placeholder="D">
<input id="E" type="number" placeholder="E">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
<div id="forklaring" class="small"></div>
</div>

<script>

let skader = [];

function leggTil() {
  skader.push({
    type: type.value,
    A: +A.value,
    B: +B.value,
    C: +C.value,
    D: +D.value,
    E: +E.value
  });

  liste.innerHTML += `<div>${type.value}</div>`;
}

function beregn() {

  let D = +diameter.value;
  let H = +hoyde.value;
  let sigma = +styrke.value;

  if (!D || !H) return alert("Mangler data");

  let vindF = +vind.value;
  let isF = +is.value;

  // LAST
  let q_vind = 0.6 * vindF;
  let q_is = 0.3 * isF;

  let M_vind = q_vind * H * H;
  let M_is = q_is * H * H;

  let M_last = (M_vind + M_is) * 1000;

  // SKADE → effektiv diameter
  let d_eff = D;
  let faktor = 1;

  skader.forEach(s => {

    if (s.type === "softråte") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let max = Math.max(...vals);
        d_eff = D - max;
      }
    }

    if (s.type === "sirkular") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let min = Math.min(...vals);
        d_eff = min * 2;
      }
    }

    if (s.type === "innvendig" && s.E) {
      d_eff = s.E * 2;
    }

    if (s.type === "sprekk") faktor *= 0.9;
    if (s.type === "spettsmie") faktor *= 0.85;

  });

  // KAPASITET
  let W = (Math.PI * Math.pow(d_eff,3)) / 32;
  let M_kap = sigma * W * faktor;

  let u = (M_last / M_kap) * 100;

  let status = "";
  if (u <= 100) status = "GODKJENT";
  else if (u <= 120) status = "KRITISK";
  else status = "IKKE GODKJENT";

  resultat.innerHTML =
    "Utnyttelse: " + u.toFixed(1) + "%<br>Status: " + status;

  forklaring.innerText =
    "Vindmoment: " + M_vind.toFixed(1) +
    " | Ismoment: " + M_is.toFixed(1) +
    " | Effektiv diameter: " + d_eff.toFixed(1);

}

</script>

</body>
</html>
