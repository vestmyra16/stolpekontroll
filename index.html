<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v4</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
.small { font-size:12px; color:#444; }
</style>
</head>

<body>

<h2>Stolpekontroll v4</h2>

<!-- GRUNNLAG -->
<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="Linje">
<input id="mast" placeholder="Mast nr">
<input id="stolpenr" placeholder="Stolpenr">

<input type="number" id="diameter" placeholder="Diameter skadested (mm)">
<input type="number" id="jordband" placeholder="Jordbåndsdiameter (mm)">
<input type="number" id="hoyde" placeholder="Stolpehøyde (m)">
<input type="number" id="nedgraving" placeholder="Nedgravingsdybde (m)">

<select id="miljo">
<option>Kyst</option>
<option>Innland</option>
<option>Fjellklima</option>
</select>

<select id="jord">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

</div>

<!-- SKADER -->
<div class="card">
<h3>Ny skade</h3>

<select id="type">
<option value="innvendig">Innvendig råte</option>
<option value="sirkular">Sirkulær råte</option>
<option value="softråte">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spettsmie">Spettsmie</option>
</select>

<input type="number" id="A" placeholder="A (mm)">
<input type="number" id="B" placeholder="B (mm)">
<input type="number" id="C" placeholder="C (mm)">
<input type="number" id="D" placeholder="D (mm)">
<input type="number" id="E" placeholder="E (mm)">
<input type="number" id="L" placeholder="Lengde (mm)">
<input type="number" id="H" placeholder="Skadehøyde (mm)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>
</div>

<!-- RESULTAT -->
<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
<div id="forklaring" class="small"></div>
</div>

<!-- EKSPORT -->
<div class="card">
<button onclick="excel()">Last ned Excel</button>
<button onclick="window.print()">Lag PDF</button>
</div>

<script>

let skader = [];

function leggTil() {
  let s = {
    type: type.value,
    A: parseFloat(A.value),
    B: parseFloat(B.value),
    C: parseFloat(C.value),
    D: parseFloat(D.value),
    E: parseFloat(E.value),
    L: parseFloat(L.value),
    H: parseFloat(H.value)
  };

  skader.push(s);
  liste.innerHTML += `<div>${s.type} (h=${s.H||0})</div>`;
}

function beregn() {

  let d = parseFloat(diameter.value);
  if (!d) return alert("Mangler diameter");

  let resultater = [];

  skader.forEach(s => {

    let rest = 100;
    let type = s.type;

    // INNVENDIG
    if (type === "innvendig" && s.E) {
      rest = (s.E / (d/2)) * 100;
    }

    // SIRKULÆR
    if (type === "sirkular") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let min = Math.min(...vals);
        rest = (min / (d/2)) * 100;
      }
    }

    // SOFTRÅTE
    if (type === "softråte") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let max = Math.max(...vals);
        rest = ((d - max) / d) * 100;
      }
    }

    // SPREKK
    if (type === "sprekk") {
      rest = 100 - ((s.B||0)*1.2 + (s.L||0)/1000);
    }

    // SPETTSMIE
    if (type === "spettsmie") {
      rest = 100 - ((s.B||0)*2);
    }

    resultater.push({type, rest});
  });

  // PRIORITET
  let styrende = 100;
  let styrendeType = "";

  resultater.forEach(r => {
    if (r.rest < styrende) {
      styrende = r.rest;
      styrendeType = r.type;
    }
  });

  let status = styrende >= 75 ? "GODKJENT" : "IKKE GODKJENT";

  // BESLUTNING
  let beslutning = "";

  if (styrende >= 75) {
    beslutning = "Stolpe kan beholdes";
  } else if (styrende >= 60) {
    beslutning = "Bør følges opp";
  } else {
    beslutning = "Bør skiftes";
  }

  resultat.innerHTML =
    "Restkapasitet: " + styrende.toFixed(1) + "%<br>" +
    "Status: " + status + "<br>" +
    "Tiltak: " + beslutning;

  forklaring.innerText = "Styrende skade: " + styrendeType;
}

// EXCEL
function excel() {

  let csv = "Netteier,Linje,Mast,Stolpe,Type,Rest\n";

  skader.forEach(s=>{
    csv += `${netteier.value},${linje.value},${mast.value},${stolpenr.value},${s.type},\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rapport.csv";
  a.click();
}

</script>

</body>
</html>
