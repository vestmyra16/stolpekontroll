<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body {font-family:Arial; max-width:420px; margin:auto; background:#f2f2f2;}
h2{text-align:center;}
label{font-weight:bold;}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
margin:6px 0;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.choice{
background:#2e7d32;
color:white;
padding:14px;
border-radius:6px;
text-align:center;
margin-bottom:6px;
}

.hidden{display:none;}

img{
width:140px;
display:none;
margin:auto;
}
</style>
</head>

<body>

<h2>Stolpekontroll v2.9</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Nedgravingsdybde (m)</label>
<input id="nedgravd">

<label>Jordbånddiameter (mm)</label>
<input id="jordband">

<label>Avtrapping (cm/m)</label>
<input id="avtrapping" value="0.75">

<label>Toppdiameter (mm)</label>
<input id="topp" oninput="manuellTopp=true">

<button onclick="beregnTopp()">Beregn toppdiameter</button>

<!-- JORDSMONN -->
<label>Jordsmonn</label>
<div class="choice" onclick="toggle('jordvalg')" id="jordTxt">Skogsmark</div>
<div id="jordvalg" class="hidden">
<button onclick="setVal('jordTxt','Innmark')">Innmark</button>
<button onclick="setVal('jordTxt','Skogsmark')">Skogsmark</button>
<button onclick="setVal('jordTxt','Fjell')">Fjell</button>
</div>

<!-- KLIMA -->
<label>Klima</label>
<div class="choice" onclick="toggle('klimavalg')" id="klimaTxt">Kyst</div>
<div id="klimavalg" class="hidden">
<button onclick="setVal('klimaTxt','Kyst')">Kyst</button>
<button onclick="setVal('klimaTxt','Innland')">Innland</button>
<button onclick="setVal('klimaTxt','Fjell')">Fjell</button>
</div>

<!-- LAST -->
<label>Vertikallast</label>
<div class="choice" onclick="toggle('lastvalg')" id="lastTxt">Normal</div>
<div id="lastvalg" class="hidden">
<button onclick="setVal('lastTxt','Lav')">Lav</button>
<button onclick="setVal('lastTxt','Normal')">Normal</button>
<button onclick="setVal('lastTxt','Høy')">Høy</button>
</div>

<label>GPS</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre')">Indre råte</button>
<button onclick="velg('sirk')">Sirkulær råte</button>
<button onclick="velg('soft')">Softråte</button>
<button onclick="velg('spett')">Spettsmie</button>
<button onclick="velg('hakk')">Hakkespetthull</button>
<button onclick="velg('sprekk')">Sprekk</button>
</div>

<div id="skade1" class="hidden">
<h3 id="tittel1"></h3>

<label>Stolpenr</label>
<input>

<label>Høyde skadested (m)</label>
<input>

<label>Diameter skadested (mm)</label>
<input>

<img id="img1">

<div id="felt1"></div>
</div>

<button id="btnSkade2" onclick="toggleSkade2()">Legg til skade 2</button>

<div id="skade2" class="hidden">
<h3 id="tittel2"></h3>

<img id="img2">
<div id="felt2"></div>
</div>

<script>

let manuellTopp=false;

// toppdiameter
function beregnTopp(){
if(manuellTopp) return;

let h = parseFloat(document.getElementById("hoyde").value);
let avtr = parseFloat(document.getElementById("avtrapping").value);

if(!h || !avtr) return;

let topp = 300 - (h * avtr * 10); // enkel modell
document.getElementById("topp").value = Math.round(topp);
}

// valg
function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

function setVal(id,val){
document.getElementById(id).innerText=val;
document.getElementById(id.replace("Txt","valg")).classList.add("hidden");
}

// felter
let felt={
indre:["A mm","B mm","E mm"],
sirk:["A mm","B mm","C mm","D mm"],
soft:["A mm","B mm","C mm","D mm"],
spett:["A mm","B mm"],
hakk:["A mm","B mm","C mm","D mm"],
sprekk:["Start (m)","Slutt (m)","A mm","B mm","Lengde (m)"]
}

function velg(type){

let s1=document.getElementById("skade1");
let img1=document.getElementById("img1");
let felt1=document.getElementById("felt1");

s1.classList.remove("hidden");

document.getElementById("tittel1").innerText=type+" 1";

img1.src=type+".svg";
img1.style.display="block";

felt1.innerHTML="";
felt[type].forEach(f=>{
felt1.innerHTML+="<label>"+f+"</label><input>";
});

}

// skade 2
function toggleSkade2(){
let s2=document.getElementById("skade2");

if(s2.classList.contains("hidden")){
s2.classList.remove("hidden");
btnSkade2.innerText="Skjul skade 2";
}else{
s2.classList.add("hidden");
btnSkade2.innerText="Legg til skade 2";
}
}

// GPS
let gpsWatch=null;

function startGPS(){
gpsWatch=navigator.geolocation.watchPosition(p=>{
gps.value=p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
});
}

function stopGPS(){
navigator.geolocation.clearWatch(gpsWatch);
}

// ny mast
function nyMast(){

let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");

netteier.value=n;
linje.value=l;

skade1.classList.add("hidden");
skade2.classList.add("hidden");

img1.style.display="none";
img2.style.display="none";

felt1.innerHTML="";
felt2.innerHTML="";

btnSkade2.innerText="Legg til skade 2";

manuellTopp=false;
}

</script>

</body>
</html>
