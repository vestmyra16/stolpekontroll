<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.4.3 (REN)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }

.popup {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.popup img {
width:90%;
max-width:500px;
background:white;
padding:10px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v10.4.3 (REN)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">
</div>

<div class="card">
<h3>Skader</h3>

<select id="skadetype" onchange="oppdaterSkade()">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<label>
<input type="checkbox" onchange="visBilde(this)">
 Vis målebilde
</label>

<div id="felter"></div>

<input id="lengde" placeholder="Lengde skade (mm)">
<input id="hSkade" placeholder="Skadehøyde over bakken (m)">
</div>

<button onclick="beregn()">Beregn</button>
<button onclick="lastCSV()">Last ned Excel</button>
<button onclick="window.print()">Lag PDF</button>

<h3 id="resultat"></h3>

<div id="popup" class="popup" onclick="this.style.display='none'">
<img id="popupimg">
</div>

<script>

function oppdaterSkade(){

let t = skadetype.value;
let f = document.getElementById("felter");

if(t==="indre"){
f.innerHTML = input("A (mm)") + input("B (mm)") + input("E restskall (mm)");
}
else if(t==="sirk" || t==="soft"){
f.innerHTML = input("A (mm)") + input("B (mm)") + input("C (mm)") + input("D (mm)");
}
else if(t==="sprekk" || t==="spett"){
f.innerHTML = input("A (mm)") + input("B (mm)");
}
else{
f.innerHTML="";
}
}

function input(label){
return `<input class="skade" placeholder="${label}">`;
}

function visBilde(el){

if(!el.checked){
popup.style.display="none";
return;
}

let map = {
indre:"Innvendig_raate.svg",
sirk:"Sirkulaer_raate.svg",
soft:"Softraate.svg",
sprekk:"Sprekk.svg",
spett:"Spettsmie.svg"
};

let fil = map[skadetype.value];

if(fil){
popupimg.src = fil;
popup.style.display="flex";
}
}

function beregn(){

let d = parseFloat(diameter.value)||0;
let h = parseFloat(hoyde.value)||0;

let inputs = document.querySelectorAll(".skade");
let vals = [];

inputs.forEach(i=>{
let v=parseFloat(i.value);
if(v>0) vals.push(v);
});

let rest = 1;

if(vals.length){
let snitt = vals.reduce((a,b)=>a+b,0)/vals.length;
rest = (d - snitt)/d;
}

let kapasitet = rest * 100;

let status = kapasitet < 75 ? "IKKE GODKJENT" : "OK";

resultat.innerHTML =
"Restkapasitet: " + kapasitet.toFixed(1) + "%<br>" +
"Status: " + status;

}

function lastCSV(){

let data = [
netteier.value,
linje.value,
mast.value,
stolpe.value,
resultat.innerText
];

let blob = new Blob([data.join(";")]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "rapport.csv";
a.click();
}

</script>

</body>
</html>
