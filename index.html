<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.5 (REN + kombinasjon)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {font-family: Arial; background:#f4f4f4; padding:10px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select {width:100%; padding:8px; margin:4px 0;}
button {background:#2e7d32; color:white; padding:12px; width:100%; border:none; margin-top:10px;}
img {max-width:100px; cursor:pointer;}
</style>
</head>

<body>

<h2>Stolpekontroll v10.5 (REN)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">
<input id="nedgraving" type="number" placeholder="Nedgravingsdybde (m)">
<input id="jordband" type="number" placeholder="Jordbånddiameter (mm)">

<select id="miljo">
<option value="1">Innland</option>
<option value="1.1">Kyst</option>
<option value="1.2">Fjell</option>
</select>

<select id="fiber">
<option value="30">Fiberstyrke 30</option>
<option value="40">Fiberstyrke 40</option>
</select>

<select id="sf">
<option value="1.5">SF 1.5</option>
<option value="2">SF 2.0</option>
</select>

</div>

<div class="card">
<h3>Fukt</h3>

<input id="temp" placeholder="Temperatur (°C)">
<input id="rf" placeholder="Relativ fuktighet (%)">
<input id="yfukt" placeholder="Ytre fukt (%)">

</div>

<div class="card">
<h3>Skader</h3>

<select id="skadevalg">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<button onclick="leggTil()">Legg til skade</button>

<div id="skadeliste"></div>

</div>

<button onclick="beregn()">Beregn</button>
<button onclick="excel()">Last ned Excel</button>
<button onclick="pdf()">Lag PDF</button>

<div id="resultat"></div>

<script>

let skader = [];

function leggTil(){
let type = document.getElementById("skadevalg").value;
if(!type) return;

let obj = {type:type};

if(type=="indre"){
obj.A = prompt("A (mm)");
obj.B = prompt("B (mm)");
obj.E = prompt("Restskall E (mm)");
}
if(type=="sirk" || type=="soft"){
obj.A = prompt("A (mm)");
obj.B = prompt("B (mm)");
obj.C = prompt("C (mm)");
obj.D = prompt("D (mm)");
}
if(type=="sprekk" || type=="spett"){
obj.A = prompt("A (mm)");
obj.B = prompt("B (mm)");
}

obj.L = prompt("Lengde skade (mm)");
obj.H = prompt("Skadehøyde (m)");

skader.push(obj);

visSkader();
}

function visSkader(){
let html="";
skader.forEach((s,i)=>{
html += "<div>Skade "+(i+1)+" ("+s.type+")</div>";
});
document.getElementById("skadeliste").innerHTML = html;
}

function kapasitet(s){

let d = parseFloat(document.getElementById("diameter").value || 200);
let fiber = parseFloat(document.getElementById("fiber").value);
let sf = parseFloat(document.getElementById("sf").value);

let reduksjon = 0;

if(s.E) reduksjon = (d - s.E) / d;
if(s.A) reduksjon += s.A / d * 0.3;

let kap = (1 - reduksjon) * (fiber / 40) / sf * 100;

return Math.max(0, kap);
}

function beregn(){

if(skader.length==0){
document.getElementById("resultat").innerHTML="Ingen skade";
return;
}

let lavest = 100;

skader.forEach(s=>{
let k = kapasitet(s);
if(k < lavest) lavest = k;
});

let status = (lavest < 75) ? "IKKE GODKJENT" : "OK";

if(parseFloat(document.getElementById("sf").value) < 1){
status = "IKKE GODKJENT (SF<1)";
}

document.getElementById("resultat").innerHTML =
"Restkapasitet: "+lavest.toFixed(1)+" %<br>Status: "+status;
}

function excel(){

let text = "Netteier,Linje,Restkapasitet\n";
text += document.getElementById("netteier").value + ",";
text += document.getElementById("linje").value + ",";
text += document.getElementById("resultat").innerText;

let blob = new Blob([text]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "rapport.csv";
a.click();

reset();
}

function pdf(){

let win = window.open();
win.document.write("<h1>Stolpekontroll rapport</h1>");
win.document.write(document.getElementById("resultat").innerHTML);
win.print();

reset();
}

function reset(){

let netteier = document.getElementById("netteier").value;
let linje = document.getElementById("linje").value;

document.querySelectorAll("input").forEach(i=>i.value="");

document.getElementById("netteier").value = netteier;
document.getElementById("linje").value = linje;

skader = [];
visSkader();
}

</script>

</body>
</html>
