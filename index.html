<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolpekontroll</title>
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" type="image/png" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: auto; padding: 10px; background: #f2f2f2; }
        label { display: block; font-weight: bold; color: #000; margin-top: 15px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; color: #000; background: #fff; }
        button { width: 100%; padding: 12px; margin: 4px 0; background: #2e7d32; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .skade-box { border: 2px solid #2e7d32; padding: 10px; margin-top: 20px; background: #fff; }
    </style>
</head>
<body>

<div id="loginBox">
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">
    <h3>Grunnlagsdata</h3>
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    <label>Mastnr</label><input id="mast">
    <label>Stolpehøyde (m)</label><input id="hoyde">
    <label>Nedgravd (m)</label><input id="nedgravd">
    <label>Jordbånd (mm)</label><input id="jord">
    <label>Avtrapping (cm/m)</label><input id="avtr" value="0.7">
    <label>Toppdiameter (mm)</label><input id="topp">

    <h3>Forhold</h3>
    <label>Jordsmonn</label>
    <div class="grid"><button onclick="v('jord', 'Innmark', this)">Innmark</button><button onclick="v('jord', 'Skogsmark', this)">Skogsmark</button><button onclick="v('jord', 'Fjell', this)">Fjell</button></div>
    <label>Klima</label>
    <div class="grid"><button onclick="v('klima', 'Innland', this)">Innland</button><button onclick="v('klima', 'Kyst', this)">Kyst</button><button onclick="v('klima', 'Fjell', this)">Fjell</button></div>
    <label>Vertikallast</label>
    <div class="grid"><button onclick="v('last', 'Lav', this)">Lav</button><button onclick="v('last', 'Normal', this)">Normal</button><button onclick="v('last', 'Høy', this)">Høy</button></div>
    
    <label>Lufttemperatur (°C)</label><input id="temp">
    <label>Relativ fuktighet (%)</label><input id="rf">
    <label>Fukt i ytterskall (%)</label><input id="fukt">

    <h3>Skaderegistrering</h3>
    <button onclick="leggTilNy()" style="background:#558b2f;">+ Registrer ny skade</button>
    <div id="skadeOmraade"></div>

    <button onclick="lagre()" style="background:#1b5e20; margin-top:20px;">Lagre Mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned Excel (CSV)</button>
    <button onclick="location.reload()" style="background:#c62828;">Ny Mast</button>
</div>

<script>
let valg = {jord:"", klima:"", last:""};
const felter = {
    "Indre råte":['A','B','E'], "Sirkulær råte":['A','B','C','D'], "Softråte":['A','B','C','D'],
    "Spettsmie":['A','B'], "Hakkespett":['A','B','C','D'], "Sprekk":['Start','Slutt','A','B']
};

function login(){ if(document.getElementById("pass").value==="1234"){ document.getElementById("loginBox").style.display="none"; document.getElementById("app").style.display="block"; } }
function v(k, n, b) { valg[k]=n; b.parentElement.querySelectorAll('button').forEach(x=>x.style.background='#2e7d32'); b.style.background='#1b5e20'; }

function leggTilNy() {
    let div = document.createElement("div");
    div.className = "skade-box";
    div.innerHTML = `<label>Velg skadetype</label>
        <select onchange="oppdater(this)">
            <option value="">-- Velg --</option>
            ${Object.keys(felter).map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <div class="felt"></div>
        <button style="background:#888;" onclick="this.parentElement.remove()">Fjern skade</button>`;
    document.getElementById("skadeOmraade").appendChild(div);
}

function oppdater(s) {
    let t = s.value;
    s.nextElementSibling.innerHTML = `<label>Stolpenr</label><input class="s_stolpe">
        <label>Skadehøyde</label><input class="s_h">` +
        felter[t].map(f => `<label>${f} (mm)</label><input class="d_f" data-navn="${f}">`).join('');
}

function lagre() {
    let d = JSON.parse(localStorage.getItem("db")||"[]");
    let grunndata = {
        netteier: document.getElementById("netteier").value,
        linje: document.getElementById("linje").value,
        mast: document.getElementById("mast").value,
        ...valg,
        temp: document.getElementById("temp").value
    };
    document.querySelectorAll(".skade-box").forEach(s => {
        let obj = {...grunndata, type: s.querySelector("select").value};
        s.querySelectorAll("input").forEach(i => { if(i.className) obj[i.className] = i.value; });
        s.querySelectorAll(".d_f").forEach(i => obj[i.dataset.navn] = i.value);
        d.push(obj);
    });
    localStorage.setItem("db", JSON.stringify(d)); alert("Mast lagret!");
}

function lastCSV() {
    let d = JSON.parse(localStorage.getItem("db")||"[]");
    if(d.length === 0) return alert("Ingen data");
    let csv = "\uFEFF" + Object.keys(d[0]).join(";") + "\n" + d.map(r => Object.values(r).join(";")).join("\n");
    let a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "stolpekontroll.csv";
    a.click();
}
</script>
</body>
</html>
