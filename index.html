<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="icon" href="Knapp.png">
<link rel="apple-touch-icon" href="Knapp.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stolpekontroll">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 10px;
}

.section {
  background: #fff;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
}

label {
  font-weight: 700;
  margin-top: 10px;
  display: block;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 3px;
  border: 2px solid #999;
  border-radius: 6px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2e7d32;
  color: #fff;
  border: none;
  border-radius: 6px;
}

img.vis {
  width: 100%;
  max-height: 200px;
  object-fit: contain;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2 id="appTittel"></h2>

<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
<label>Stolpenr</label><input id="stolpe">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordbanddiameter (mm)</label>
<input id="jord">

<label>Klima</label>
<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select id="jordtype">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<label>Sikkerhetsfaktor</label>
<select id="sf">
<option>1</option>
<option>1.5</option>
<option>2</option>
</select>

</div>

<div class="section">
<h3>Skade</h3>

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte (ABE)</option>
<option>Sirkulær råte (ABCD)</option>
<option>Softråte (ABCD)</option>
<option>Spettsmie (AB)</option>
<option>Hakkespetthull (ABCD)</option>
<option>Sprekk (ABCH)</option>
</select>

<button onclick="visBilde()">Vis bilde</button>
<img id="bilde" class="vis" style="display:none">

<label>Diameter skadested (mm)</label>
<input id="diam">

<div id="skadehoydeWrap">
<label>Skadehøyde (m)</label>
<input id="sh">
</div>

<div id="felter"></div>

<button onclick="leggTil()">Lagre skade</button>

</div>

<button onclick="lastNed()">Last ned Excel</button>
<button onclick="nyRegistrering()">Ny registrering</button>

<script>

// VERSION
const VERSION = "v12.3";
document.getElementById("appTittel").innerText = "Stolpekontroll " + VERSION;

// DATA
let skader = [];

function oppdaterFelter() {
  let t = type.value;
  let f = document.getElementById("felter");
  let skadeWrap = document.getElementById("skadehoydeWrap");

  if (t.includes("Sprekk")) {

    skadeWrap.style.display = "none";

    f.innerHTML = `
      <label>A = Bredde på sprekk (mm)</label><input id="A">
      <label>B = Dybde på sprekk (mm)</label><input id="B">
      <label>C = Lengde på sprekk (m)</label><input id="C">
      <label>H = Høyde over bakken (m)</label><input id="H">
    `;

  } else if (t.includes("ABE")) {

    skadeWrap.style.display = "block";

    f.innerHTML = `
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
      <label>E (mm)</label><input id="E">
    `;

  } else if (t.includes("ABCD")) {

    skadeWrap.style.display = "block";

    f.innerHTML = `
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
      <label>C (mm)</label><input id="C">
      <label>D (mm)</label><input id="D">
    `;

  } else {

    skadeWrap.style.display = "block";

    f.innerHTML = `
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
    `;
  }
}

function visBilde() {
  let img = document.getElementById("bilde");
  let t = type.value;

  if (t.includes("Indre")) img.src = "indre.svg";
  else if (t.includes("Sirkulær")) img.src = "sirk.svg";
  else if (t.includes("Softråte")) img.src = "soft.svg";
  else if (t.includes("Spettsmie")) img.src = "spett.svg";
  else if (t.includes("Hakkespetthull")) img.src = "hakk.svg";
  else if (t.includes("Sprekk")) img.src = "sprekk.svg";

  img.style.display = "block";
}

function getVal(id) {
  let el = document.getElementById(id);
  return el ? el.value : "";
}

function leggTil() {
  let obj = {
    netteier: getVal("netteier"),
    linje: getVal("linje"),
    mast: getVal("mast"),
    stolpe: getVal("stolpe"),
    hoyde: getVal("hoyde"),
    jord: getVal("jord"),
    klima: getVal("klima"),
    jordtype: getVal("jordtype"),
    sf: getVal("sf"),
    type: getVal("type"),
    diam: getVal("diam"),
    sh: getVal("sh"),
    A: getVal("A"),
    B: getVal("B"),
    C: getVal("C"),
    D: getVal("D"),
    E: getVal("E"),
    H: getVal("H")
  };

  skader.push(obj);
  alert("Skade lagret (" + skader.length + ")");
}

function lastNed() {

  if (getVal("diam") || getVal("A") || getVal("B")) {
    leggTil();
  }

  if (skader.length === 0) {
    alert("Ingen data registrert");
    return;
  }

  let csv = "sep=,\nNetteier,Linje,Mast,Stolpe,Høyde (m),Jordband (mm),Klima,Jordtype,SF,Type,Diameter (mm),Skadehøyde (m),A (mm),B (mm),C (m),D (mm),E (mm),H (m)\n";

  skader.forEach(s => {
    csv += `${s.netteier},${s.linje},${s.mast},${s.stolpe},${s.hoyde},${s.jord},${s.klima},${s.jordtype},${s.sf},${s.type},${s.diam},${s.sh},${s.A},${s.B},${s.C},${s.D},${s.E},${s.H}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stolpekontroll.csv";
  a.click();
}

function nyRegistrering() {
  let netteierVal = netteier.value;
  let linjeVal = linje.value;

  document.querySelectorAll("input").forEach(i => i.value = "");

  netteier.value = netteierVal;
  linje.value = linjeVal;

  document.getElementById("felter").innerHTML = "";
  skader = [];

  alert("Klar for ny registrering");
}

oppdaterFelter();

</script>

</body>
</html>
