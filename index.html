<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body {
  font-family: Arial;
  background:#f2f2f2;
  max-width:420px;
  margin:auto;
}

h2 {text-align:center;}

label {font-weight:bold;}

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:14px;
  margin:6px 0;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.hidden {display:none;}

img {
  width:160px;
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<h2>Stolpekontroll v2.9</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>GPS</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<label>Stolpehøyde (m)</label>
<input>

<label>Jordbånddiameter (mm)</label>
<input>

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre')">Indre råte</button>
<button onclick="velg('sirk')">Sirkulær råte</button>
<button onclick="velg('soft')">Softråte</button>
<button onclick="velg('spett')">Spettsmie</button>
<button onclick="velg('hakk')">Hakkespetthull</button>
<button onclick="velg('sprekk')">Sprekk</button>
</div>

<div id="skade1" class="hidden">
<h3 id="tittel1"></h3>

<label>Stolpenr</label>
<input>

<label>Høyde skadested (m)</label>
<input>

<label>Diameter skadested (mm)</label>
<input>

<img id="img1">

<div id="felt1"></div>
</div>

<button id="btnSkade2" onclick="toggleSkade2()">Legg til skade 2</button>

<div id="skade2" class="hidden">
<h3 id="tittel2"></h3>

<img id="img2">

<div id="felt2"></div>
</div>

<button onclick="lagre()">Lagre mast</button>
<button onclick="lastCSV()">Last ned CSV</button>

<script>

// FELT DEFINISJONER
let felt = {
indre:["A mm","B mm","E mm"],
sirk:["A mm","B mm","C mm","D mm"],
soft:["A mm","B mm","C mm","D mm"],
spett:["A mm","B mm"],
hakk:["A mm","B mm","C mm","D mm"],
sprekk:["Start (m)","Slutt (m)","A mm","B mm","Lengde (m)"]
}

// VELG SKADE
function velg(type){

let s1 = document.getElementById("skade1");
let img1 = document.getElementById("img1");
let felt1 = document.getElementById("felt1");

s1.classList.remove("hidden");

// tittel
document.getElementById("tittel1").innerText = type + " 1";

// bilde
img1.src = type + ".svg";
img1.style.display="block";

// felter
felt1.innerHTML="";
felt[type].forEach(f=>{
felt1.innerHTML += "<label>"+f+"</label><input>";
});

}

// SKADE 2 TOGGLE
function toggleSkade2(){

let s2 = document.getElementById("skade2");

if(s2.classList.contains("hidden")){
s2.classList.remove("hidden");
document.getElementById("btnSkade2").innerText="Skjul skade 2";
}else{
s2.classList.add("hidden");
document.getElementById("btnSkade2").innerText="Legg til skade 2";
}

}

// NY MAST
function nyMast(){

let n = document.getElementById("netteier").value;
let l = document.getElementById("linje").value;

document.querySelectorAll("input").forEach(i=>i.value="");

document.getElementById("netteier").value=n;
document.getElementById("linje").value=l;

// skjul ALT
document.getElementById("skade1").classList.add("hidden");
document.getElementById("skade2").classList.add("hidden");

document.getElementById("img1").style.display="none";
document.getElementById("img2").style.display="none";

document.getElementById("felt1").innerHTML="";
document.getElementById("felt2").innerHTML="";

document.getElementById("btnSkade2").innerText="Legg til skade 2";

}

// GPS
let gpsWatch=null;

function startGPS(){
gpsWatch = navigator.geolocation.watchPosition(p=>{
document.getElementById("gps").value =
p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
});
}

function stopGPS(){
navigator.geolocation.clearWatch(gpsWatch);
}

// LAGRING
let data=[];

function lagre(){

data.push({
netteier: document.getElementById("netteier").value,
linje: document.getElementById("linje").value,
mast: document.getElementById("mast").value,
gps: document.getElementById("gps").value
});

alert("Lagret");

}

// CSV
function lastCSV(){

let csv="Netteier,Linje,Mast,GPS\n";

data.forEach(d=>{
csv+=d.netteier+","+d.linje+","+d.mast+","+d.gps+"\n";
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="stolpe.csv";
a.click();

}

// START: skjul alt
window.onload=function(){
document.getElementById("skade1").classList.add("hidden");
document.getElementById("skade2").classList.add("hidden");
document.getElementById("img1").style.display="none";
document.getElementById("img2").style.display="none";
}

</script>

</body>
</html>
