<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.7 (RE)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {font-family: Arial; background:#f4f4f4; padding:10px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select {width:100%; padding:8px; margin:5px 0;}
button {background:#2e7d32; color:white; padding:12px; width:100%; border:none; margin-top:10px;}

.rad {display:flex; gap:5px;}
.rad input {flex:1;}

.popup {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}
.popup img {
max-width:500px;
width:90%;
background:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>
<h2>Stolpekontroll v10.7 (RE)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" placeholder="Diameter skadested (mm)">
<input id="hoyde" placeholder="Stolpehøyde (m)">
<input id="nedgraving" placeholder="Nedgravingsdybde (m)">
<input id="jordband" placeholder="Jordbånddiameter (mm)">

<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<select id="jord">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<select id="fiber">
<option>30</option>
<option>40</option>
</select>

<select id="sf">
<option value="1">1</option>
<option value="1.5">1.5</option>
<option value="2">2</option>
</select>

</div>

<div class="card">
<h3>Fukt</h3>

<input id="temp" placeholder="Temperatur (°C)">
<input id="rf" placeholder="Relativ luftfuktighet (%)">
<input id="yf" placeholder="Ytre fukt (%)">

</div>

<div class="card">
<h3>Skader</h3>

<select id="skadevalg" onchange="visSkade()">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<button onclick="visBilde()">Vis bilde</button>

<div id="skjema"></div>

<input id="lengde" placeholder="Lengde skade (mm)">
<input id="hskade" placeholder="Skadehøyde over bakken (m)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<button onclick="beregn()">Beregn</button>
<button onclick="lagExcel()">Last ned Excel</button>
<button onclick="lagPDF()">Lag PDF</button>

<h3 id="resultat"></h3>

<div id="popup" class="popup" onclick="this.style.display='none'">
<img id="img">
</div>

<script>

let skader=[];

function visSkade(){
let t = skadevalg.value;
let html="";

if(t==="indre") html += rad("A","B","E");
if(t==="sirk"||t==="soft") html += rad("A","B","C","D");
if(t==="sprekk"||t==="spett") html += rad("A","B");

skjema.innerHTML = html;
}

function rad(...labels){
let r="<div class='rad'>";
labels.forEach(l=>{
r+=`<input class="felt" placeholder="${l} (mm)">`;
});
r+="</div>";
return r;
}

function leggTil(){
let vals=[];
document.querySelectorAll(".felt").forEach(f=>{
vals.push(parseFloat(f.value)||0);
});
skader.push(vals);

liste.innerHTML += "Skade lagt til<br>";
}

function visBilde(){
let map={
indre:"indre.svg",
sirk:"sirk.svg",
soft:"soft.svg",
sprekk:"sprekk.svg",
spett:"spett.svg"
};
img.src = map[skadevalg.value]+"?v="+Date.now();
popup.style.display="flex";
}

function beregn(){
let d=parseFloat(diameter.value||200);
let lavest=100;

skader.forEach(s=>{
let snitt=s.reduce((a,b)=>a+b,0)/s.length;
let rest=(d-snitt)/d*100;
if(rest<lavest) lavest=rest;
});

let status = lavest<75 ? "IKKE GODKJENT" : "OK";

resultat.innerHTML =
"Restkapasitet: "+lavest.toFixed(1)+" %<br>Status: "+status;
}

function lagExcel(){
let csv="Netteier,Linje,Mast,Stolpe,Restkapasitet\n";

csv += `${netteier.value},${linje.value},${mast.value},${stolpe.value},${resultat.innerText}\n`;

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="rapport.csv";
a.click();
}

function lagPDF(){
let w=window.open("","","width=600,height=600");
w.document.write("<h2>Stolpekontroll rapport</h2>");
w.document.write("<p>"+resultat.innerHTML+"</p>");
w.print();
}

</script>

</body>
</html>
