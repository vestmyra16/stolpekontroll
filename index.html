<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.5.2 (FULL)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {font-family: Arial; background:#f4f4f4; padding:10px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select {width:100%; padding:8px; margin:4px 0;}
button {background:#2e7d32; color:white; padding:12px; width:100%; border:none; margin-top:10px;}
.popup {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;}
.popup img {max-width:90%;}
</style>
</head>

<body>

<h2>Stolpekontroll v10.5.2 (REN FULL)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">
<input id="nedgraving" type="number" placeholder="Nedgravingsdybde (m)">
<input id="jordband" type="number" placeholder="Jordbånddiameter (mm)">

<select id="klima">
<option value="1.2">Kyst</option>
<option value="1.0">Innland</option>
<option value="0.9">Fjell</option>
</select>

<select id="jord">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<select id="fiber">
<option value="30">Fiberstyrke 30</option>
<option value="40">Fiberstyrke 40</option>
</select>

<select id="sf">
<option value="1">SF 1</option>
<option value="1.5">SF 1.5</option>
<option value="2">SF 2</option>
</select>

<select id="vind">
<option value="1">Lav vind</option>
<option value="1.2">Middels vind</option>
<option value="1.5">Høy vind</option>
</select>

<select id="is">
<option value="1">Ingen is</option>
<option value="1.2">Lett is</option>
<option value="1.5">Tung is</option>
</select>

</div>

<div class="card">
<h3>Fukt</h3>

<input id="temp" placeholder="Temperatur (°C)">
<input id="rf" placeholder="Relativ luftfuktighet (%)">
<input id="yfukt" placeholder="Ytre fukt (%)">

</div>

<div class="card">
<h3>Skader</h3>

<select id="type">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<button onclick="beregn()">Beregn</button>
<button onclick="csv()">Excel</button>
<button onclick="pdf()">PDF</button>

<h3 id="resultat"></h3>

<script>

let skader=[];

function leggTil(){

let t=type.value;
if(!t) return;

let s={type:t};

if(t=="indre"){
s.A=prompt("A mm");
s.B=prompt("B mm");
s.E=prompt("E mm");
}
if(t=="sirk"||t=="soft"){
s.A=prompt("A");
s.B=prompt("B");
s.C=prompt("C");
s.D=prompt("D");
}
if(t=="sprekk"||t=="spett"){
s.A=prompt("A");
s.B=prompt("B");
}

s.L=prompt("Lengde mm");
s.H=prompt("Høyde m");

skader.push(s);

vis();
}

function vis(){
let html="";
skader.forEach((s,i)=>{
html += "Skade "+(i+1)+" ("+s.type+")<br>";
});
liste.innerHTML=html;
}

function beregn(){

let d=parseFloat(diameter.value||200);
let klima=parseFloat(klima.value);
let vindf=parseFloat(vind.value);
let isf=parseFloat(is.value);
let fiber=parseFloat(fiber.value);
let sfv=parseFloat(sf.value);

let fuktf = 1 - (rf.value/200 || 0);

let lavest=100;

skader.forEach(s=>{

let reduksjon=0;

if(s.E) reduksjon=(d-s.E)/d;
if(s.A) reduksjon += s.A/d*0.2;

let kap = (1-reduksjon)
* klima
* fuktf
* (fiber/40)
/ sfv
/ vindf
/ isf
*100;

if(kap<lavest) lavest=kap;

});

let status = lavest<75 ? "IKKE GODKJENT" : "OK";

if(sfv<1) status="IKKE GODKJENT (SF<1)";

resultat.innerHTML =
"Restkapasitet: "+lavest.toFixed(1)+" %<br>Status: "+status;

}

function csv(){
let txt=netteier.value+";"+linje.value+";"+resultat.innerText;
let blob=new Blob([txt]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="rapport.csv";
a.click();
}

function pdf(){
window.print();
}

</script>

</body>
</html>
