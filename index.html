<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }

.section {
  background:#fff;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
}

label {
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input, select {
  width:100%;
  padding:10px;
  border:2px solid #999;
  border-radius:6px;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
  text-align:left;
}

.camBtn { background:#2e7d32; color:#fff; }
.saveBtn { background:#1565c0; color:#fff; }
.imgBtn { background:#6d4c41; color:#fff; }

img {
  width:100%;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v13.5</h2>

<div class="section">
<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
</div>

<div class="section">

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte (ABE)</option>
<option>Sirkulær råte (ABCD)</option>
<option>Softråte (ABCD)</option>
<option>Spettsmie (AB)</option>
<option>Hakkespetthull (ABCD)</option>
<option>Sprekk (ABCH)</option>
</select>

<button class="imgBtn" onclick="visBilde()">📖 Vis forklaring</button>

<img id="bilde" style="display:none">

<label>Diameter skadested (mm)</label>
<input id="diam">

<div id="felter"></div>

<!-- 📸 Kamera -->
<input type="file" id="cam" accept="image/*" capture="environment" multiple style="display:none">

<button class="camBtn" onclick="document.getElementById('cam').click()">
📸 Ta bilde
</button>

<label>Merknad</label>
<input id="merknad">

</div>

<button onclick="nesteMast()">➡️ Neste mast</button>
<button class="saveBtn" onclick="lagreMast()">💾 Lagre mast</button>
<button onclick="lastNed()">📥 Last ned Excel</button>

<script>

let registreringer = [];
let sistLagretMast = "";

// FELTER
function oppdaterFelter() {

  let t = type.value;
  let f = document.getElementById("felter");

  if (t.includes("Sprekk")) {
    f.innerHTML = `
      <label>Bredde A (mm)</label><input id="A">
      <label>Dybde B (mm)</label><input id="B">
      <label>Lengde C (m)</label><input id="C">
      <label>Høyde H (m)</label><input id="H">
    `;
  } else if (t.includes("ABE")) {
    f.innerHTML = `
      <label>Skadehøyde (m)</label><input id="sh">
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
      <label>E (mm)</label><input id="E">
    `;
  } else if (t.includes("ABCD")) {
    f.innerHTML = `
      <label>Skadehøyde (m)</label><input id="sh">
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
      <label>C (mm)</label><input id="C">
      <label>D (mm)</label><input id="D">
    `;
  } else {
    f.innerHTML = `
      <label>Skadehøyde (m)</label><input id="sh">
      <label>A (mm)</label><input id="A">
      <label>B (mm)</label><input id="B">
    `;
  }
}

// 🖼 VIS BILDE
function visBilde() {

  let img = document.getElementById("bilde");
  let t = type.value;

  if (t.includes("Indre")) img.src = "indre.svg";
  else if (t.includes("Sirkulær")) img.src = "sirk.svg";
  else if (t.includes("Softråte")) img.src = "soft.svg";
  else if (t.includes("Spettsmie")) img.src = "spett.svg";
  else if (t.includes("Hakkespetthull")) img.src = "hakk.svg";
  else if (t.includes("Sprekk")) img.src = "sprekk.svg";

  img.style.display = "block";
}

// HENT VERDI
function v(id){
  let el = document.getElementById(id);
  return el ? el.value : "";
}

// 💾 LAGRE
function lagreMast(){

  if (!mast.value){
    alert("Mastnr mangler");
    return;
  }

  if (mast.value === sistLagretMast){
    alert("Allerede lagret");
    return;
  }

  registreringer.push({
    netteier: v("netteier"),
    linje: v("linje"),
    mast: v("mast"),
    type: v("type"),
    diam: v("diam"),
    sh: v("sh"),
    A: v("A"),
    B: v("B"),
    C: v("C"),
    D: v("D"),
    E: v("E"),
    H: v("H"),
    merknad: v("merknad"),
    bilder: document.getElementById("cam").files.length
  });

  sistLagretMast = mast.value;

  alert("Mast lagret");
}

// ➡️ NESTE
function nesteMast(){

  lagreMast();

  document.getElementById("mast").value = "";

  document.querySelectorAll("input").forEach(i=>{
    if(i.id !== "netteier" && i.id !== "linje") i.value="";
  });
}

// 📥 EXCEL
function lastNed(){

  let csv = "Netteier,Linje,Mast,Type,Diameter,Skadehøyde,A,B,C,D,E,H,Merknad,Bilder\n";

  registreringer.forEach(s=>{
    csv += `${s.netteier},${s.linje},${s.mast},${s.type},${s.diam},${s.sh},${s.A},${s.B},${s.C},${s.D},${s.E},${s.H},${s.merknad},${s.bilder}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stolpekontroll.csv";
  a.click();
}

oppdaterFelter();

</script>

</body>
</html>
