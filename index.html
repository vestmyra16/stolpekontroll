<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolpekontroll v6.1</title>
    <meta name="author" content="Opphavsrett 2026 - vestmyra16">
    <link class="no-print" rel="apple-touch-icon" href="icon-180.png">
    <link class="no-print" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; max-width: 440px; margin: auto; padding: 12px; background: #f2f2f2; -webkit-user-select: none; user-select: none; }
        
        /* Vannmerke */
        .vannmerke {
            position: fixed; top: 10px; right: 10px; z-index: 9999;
            font-size: 10px; color: rgba(0,0,0,0.1); pointer-events: none;
        }

        label { display: block; font-weight: bold; color: #000; margin-top: 14px; margin-bottom: 4px; font-size: 16px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #000; border-radius: 8px; box-sizing: border-box; color: #000; background: #fff; font-size: 16px; }
        
        button { 
            width: 100%; padding: 18px; margin: 6px 0; background: #2e7d32; color: #fff; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px; 
            cursor: pointer; touch-action: manipulation; 
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid button { padding: 15px 5px; font-size: 14px; }
        
        .skade-box { border: 2px solid #2e7d32; border-radius: 12px; padding: 12px; margin-top: 20px; background: #fff; }
        img { width: 140px; display: block; margin: 10px auto; border: 1px solid #ccc; border-radius: 6px; }
        .beregnet { background: #e8f5e9 !important; font-style: italic; font-weight: bold; border: 1px solid #2e7d32; }
        
        .lightgreen { background:#4caf50 !important; color:white; margin-bottom: 20px; border: 3px solid #1b5e20 !important; }
        .save-btn { background:#1b5e20 !important; margin-top:30px; }
        .excel-btn { background:#1565c0 !important; }
        .report-btn { background:#f57c00 !important; color: white; border: 2px solid #e65100 !important; margin-top:15px; }
        .new-pole-btn { background:#c62828 !important; }
        .retur-btn { background:#1565c0 !important; margin-top:15px; border: 2px solid #0d47a1 !important; font-size: 18px; display: block; text-decoration: none; text-align: center; padding: 18px; color: white; font-weight: bold; border-radius: 10px; box-sizing: border-box; }

        #loginBox { max-width:400px; margin: 60px auto; padding: 25px; background: #fff; border: 1px solid #ccc; border-radius: 12px; text-align: center; }
        .skjult { display: none !important; }

        /* Spesialregler for sømløs mobilutskrift */
        #printSone { display: none; }
        @media print {
            body { background: white; max-width: 100% !important; width: 100% !important; padding: 0 !important; }
            .no-print, #app, #loginBox, .vannmerke { display: none !important; }
            #printSone { display: block !important; }
            .page { background: white; width: 100%; padding: 20px; page-break-after: always; box-sizing: border-box; }
            h2 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
            table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 16px; }
            th, td { border: 1px solid #ccc; padding: 12px; text-align: left; }
            th { background: #f4f4f4; width: 40%; }
            img { max-height: 220px; display: block; margin: 15px auto; }
        }
    </style>
</head>
<body>
<div class="vannmerke">Kun for autorisert bruk - Vestmyra16</div>

<div id="loginBox" class="no-print">
    <h3>Logg inn - Stolpekontroll v6.1</h3>
    <label>Passord</label>
    <input type="password" id="pass" style="text-align: center; margin-bottom: 15px;">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" class="skjult no-print">
    <button class="lightgreen" onclick="nyttAnlegg()">➕ NYTT ANLEGG / ENDRE ANLEGG</button>

    <h3>Grunnlagsdata</h3>
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    
    <label>Kontrollert av:</label> <input id="kontrollor" oninput="lagreKontrollor()" placeholder="F.eks. Ola Nordmann">
    <label>Dato kontrollert:</label> <input type="date" id="dato_kontroll">
    
    <hr style="margin: 20px 0; border: 1px solid #ccc;">

    <label>Mastnr</label><input id="mast">
    <label>Mast type</label>
    <select id="mast_type" onchange="sjekkMastType(this.value)">
        <option value="E">E</option>
        <option value="H" selected>H</option>
        <option value="DH">DH</option>
        <option value="3H">3H</option>
        <option value="2A">2A</option>
        <option value="3A">3A</option>
        <option value="Annet">Annen type...</option>
    </select>
    
    <div id="egendefinertMastDiv" class="skjult">
        <label>Skriv inn mast type</label>
        <input id="egenMastType" placeholder="F.eks. Portal, Gitter...">
    </div>

    <label>Stolpehøyde (m)</label><input id="hoyde" type="number" step="0.1" oninput="beregnTopp()">
    <label>Nedgravingsdybde (m)</label><input id="nedgravd" type="number" step="0.1" oninput="beregnTopp()">
    <label>Jordbånd (mm)</label><input id="jord" type="number" oninput="beregnTopp()">
    <label>Avtrapping (cm/m)</label><input id="avtr" type="number" step="0.1" value="0.7" oninput="beregnTopp()">
    
    <label>Beregnet Toppdiameter (mm)</label>
    <input id="topp" class="beregnet" readonly>

    <h3>Forhold</h3>
    <label>Jordsmonn</label>
    <div class="grid">
        <button onclick="v('jord', 'Innmark', this)">Innmark</button>
        <button onclick="v('jord', 'Skogsmark', this)">Skogsmark</button>
        <button onclick="v('jord', 'Fjell', this)">Fjell</button>
    </div>
    <label>Klima</label>
    <div class="grid">
        <button onclick="v('klima', 'Innland', this)">Innland</button>
        <button onclick="v('klima', 'Kyst', this)">Kyst</button>
        <button onclick="v('klima', 'Fjell', this)">Fjell</button>
    </div>
    <label>Vertikallast</label>
    <div class="grid">
        <button onclick="v('last', 'Lav', this)">Lav</button>
        <button onclick="v('last', 'Normal', this)">Normal</button>
        <button onclick="v('last', 'Høy', this)">Høy</button>
    </div>
    
    <label>Lufttemp (°C)</label><input id="temp" type="number" step="0.1">
    <label>Rel. fukt (%)</label><input id="rf" type="number">
    <label>Fukt ytterskall (%)</label><input id="fukt" type="number">

    <h3>Skaderegistrering</h3>
    <button onclick="leggTilNy()" style="background:#558b2f;">+ Registrer ny skade</button>
    <div id="skadeOmraade"></div>

    <button class="save-btn" onclick="lagre()">Lagre Mast</button>
    <div id="returSone"></div>
    <hr style="margin: 20px 0; border: 1px solid #ccc;">
    
    <button class="report-btn" onclick="visRapporter()">📄 Vis Råteskjema (Utskrift/PDF)</button>
    <button class="excel-btn" onclick="lastExcel()">📊 Last ned Excel (.xlsx)</button>
    <button class="new-pole-btn" onclick="nyMast()">Neste Mast</button>
</div>

<div id="printSone"></div>

<script>
    // 🔒 START SIKKERHETSLÅS
    document.addEventListener("DOMContentLoaded", () => {
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());

        const gyldigDomene = "vestmyra16.github.io";
        if (window.location.hostname !== "" && window.location.hostname !== gyldigDomene) {
            document.body.innerHTML = ""; 
            return; 
        }

        const utlopsDato = new Date("2026-07-13");
        if (new Date() > utlopsDato) {
            alert("Testperioden er utløpt.");
            window.location.href = "about:blank";
            return;
        }

        if (localStorage.getItem("stolpe_innlogget") === "ja") {
            visAppen();
            sjekkURLParametere();
        }
    });
    // 🔒 SLUTT SIKKERHETSLÅS

    let valgData = {jord:"", klima:"", last:""};
    const skadeDef = {
        "Indre råte": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'E',u:'mm'}], img: "indre.svg" },
        "Sirkulær råte": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'C',u:'mm'}, {n:'D',u:'mm'}], img: "sirk.svg" },
        "Softråte": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'C',u:'mm'}, {n:'D',u:'mm'}], img: "soft.svg" },
        "Spettsmie": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}], img: "spett.svg" },
        "Hakkespetthull": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'C',u:'mm'}, {n:'D',u:'mm'}], img: "hakk.svg" },
        "Sprekk": { felt: [{n:'Start over bakken',u:'m'}, {n:'Slutt over bakken',u:'m'}, {n:'A',u:'mm'}, {n:'B',u:'mm'}], img: "sprekk.svg" }
    };

    function login() { 
        const input = document.getElementById("pass").value;
        if(input === "1234") { 
            localStorage.setItem("stolpe_innlogget", "ja");
            visAppen();
            setTimeout(sjekkURLParametere, 100);
        } else {
            alert("Feil passord!");
        }
    }

    function lagreKontrollor() {
        localStorage.setItem("stolpe_kontrollor", document.getElementById("kontrollor").value);
    }

    function visAppen() {
        document.getElementById("loginBox").classList.add("skjult"); 
        document.getElementById("app").classList.remove("skjult"); 
        document.getElementById('kontrollor').value = localStorage.getItem('stolpe_kontrollor') || "";
        
        let today = new Date().toISOString().split('T')[0];
        document.getElementById('dato_kontroll').value = today;
    }

    function nyttAnlegg() {
        if(confirm("Dette vil tømme Netteier og LinjeID. Er du sikker?")) {
            document.getElementById("netteier").value = "";
            document.getElementById("linje").value = "";
            nyMast();
        }
    }

    function sjekkMastType(verdi) {
        let egenDiv = document.getElementById("egendefinertMastDiv");
        if (verdi === "Annet") {
            egenDiv.classList.remove("skjult");
        } else {
            egenDiv.classList.add("skjult");
            document.getElementById("egenMastType").value = "";
        }
    }

    function beregnTopp() {
        let h = parseFloat(document.getElementById("hoyde").value) || 0;
        let n = parseFloat(document.getElementById("nedgravd").value) || 0;
        let j = parseFloat(document.getElementById("jord").value) || 0;
        let a = parseFloat(document.getElementById("avtr").value) || 0.7;
        if (h && j) document.getElementById("topp").value = Math.round(j - (a * (h - n) * 10));
    }

    function v(k, n, b) { 
        valgData[k]=n; 
        b.parentElement.querySelectorAll('button').forEach(x=>x.style.background='#2e7d32'); 
        b.style.background='#1b5e20'; 
    }

    function leggTilNy() {
        let div = document.createElement("div");
        div.className = "skade-box";
        div.innerHTML = `<label>Velg skadetype</label>
            <select onchange="oppdater(this)">
                <option value="">-- Velg --</option>
                ${Object.keys(skadeDef).map(t => `<option value="${t}">${t}</option>`).join('')}
            </select>
            <div class="skade-innhold"></div>
            <button style="background:#888; margin-top:10px; padding:10px;" onclick="this.parentElement.remove()">Slett denne skaden</button>`;
        document.getElementById("skadeOmraade").appendChild(div);
        return div;
    }

    function oppdater(sel) {
        let t = sel.value;
        let cont = sel.parentElement.querySelector(".skade-innhold");
        if(!t) { cont.innerHTML = ""; return; }
        cont.innerHTML = `<img src="${skadeDef[t].img}">
            <label>Stolpenr</label><input class="s_stolpe">
            <label>Skadehøyde over bakken (m)</label><input class="s_h" type="number" step="0.1">
            <label>Diameter på skadested (mm)</label><input class="s_diam" type="number">` +
            skadeDef[t].felt.map(f => `<label>${f.n} (${f.u})</label><input class="d_f" data-navn="${f.n}" type="number" step="0.1">`).join('');
    }

    function lagre() {
        let d = JSON.parse(localStorage.getItem("db") || "[]");
        let valgtMastType = document.getElementById("mast_type").value === "Annet" 
            ? document.getElementById("egenMastType").value || "Uoppgitt" 
            : document.getElementById("mast_type").value;
            
        let inputDato = document.getElementById("dato_kontroll").value;
        let datoFormat = "";
        if(inputDato) {
            let deler = inputDato.split('-');
            datoFormat = `${deler[2]}.${deler[1]}.${deler[0]}`;
        }

        let grunndata = {
            dato: datoFormat,
            kontrollor: document.getElementById("kontrollor").value,
            netteier: document.getElementById("netteier").value,
            linje: document.getElementById("linje").value,
            mast: document.getElementById("mast").value,
            mast_type: valgtMastType,
            stolpehøyde_m: document.getElementById("hoyde").value,
            nedgravingsdybde_m: document.getElementById("nedgravd").value,
            jordbånd_mm: document.getElementById("jord").value,
            toppdiam_mm: document.getElementById("topp").value,
            jordsmonn: valgData.jord, 
            klima: valgData.klima, 
            vertikallast: valgData.last,
            temp: document.getElementById("temp").value, 
            rf: document.getElementById("rf").value,
            fukt: document.getElementById("fukt").value
        };

        let lagretMinstEn = false;
        document.querySelectorAll(".skade-box").forEach(s => {
            let type = s.querySelector("select").value;
            if(!type) return;
            lagretMinstEn = true;
            let row = { ...grunndata, skadetype: type };
            row.stolpenr = s.querySelector(".s_stolpe").value;
            row.skadehoyde_m = s.querySelector(".s_h").value;
            row.diam_skadested_mm = s.querySelector(".s_diam").value;
            
            ['A','B','C','D','E','Start over bakken','Slutt over bakken'].forEach(k => row[k] = "");
            s.querySelectorAll(".d_f").forEach(i => row[i.dataset.navn] = i.value);
            d.push(row);
        });

        if(!lagretMinstEn) {
            d.push({ ...grunndata, skadetype: "Ingen skade", stolpenr:"", skadehoyde_m:"", diam_skadested_mm:"", A:"", B:"", C:"", D:"", E:"", 'Start over bakken':"", 'Slutt over bakken':"" });
        }

        localStorage.setItem("db", JSON.stringify(d));
        alert("Mast " + grunndata.mast + " lagret!");
        lagReturKnapp(grunndata.netteier, grunndata.linje, grunndata.mast);
    }

    function lagReturKnapp(ne, li, ma) {
        let n = encodeURIComponent(ne || "");
        let l = encodeURIComponent(li || "");
        let m = encodeURIComponent(ma || "");
        let returUrl = `https://vestmyra16.github.io/Linjekontroll/?retur=ja&netteier=${n}&linje=${l}&mast=${m}`; 
        document.getElementById("returSone").innerHTML = `
            <a href="${returUrl}" class="retur-btn">Transmission complete 🔙 TILBAKE TIL LINJEKONTROLL</a>
        `;
    }

    function nyMast() {
        ['mast', 'hoyde', 'nedgravd', 'jord', 'topp', 'temp', 'rf', 'fukt'].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById("mast_type").value = "H"; 
        sjekkMastType("H"); 
        valgData = {jord:"", klima:"", last:""};
        document.querySelectorAll('.grid button').forEach(b => b.style.background = '#2e7d32');
        document.getElementById("skadeOmraade").innerHTML = "";
        document.getElementById("returSone").innerHTML = ""; 
        window.scrollTo(0,0);
    }

    function lastExcel() {
        if(typeof XLSX === 'undefined') { alert("Vennligst vent et sekund på biblioteket."); return; }
        let d = JSON.parse(localStorage.getItem("db") || "[]");
        if(d.length === 0) return alert("Ingen data å laste ned.");
        
        let wb = XLSX.utils.book_new();
        let headers = ['Dato', 'Kontrollør', 'Netteier', 'Linje', 'Mast', 'Mast_type', 'Høyde_m', 'Nedgravd_m', 'Jordbånd_mm', 'Toppdiam_mm', 'Jordsmonn', 'Klima', 'Vertikallast', 'Temp', 'RF', 'Fukt', 'Skadetype', 'Stolpenr', 'Skadehøyde_m', 'Diam_skadested_mm', 'A', 'B', 'C', 'D', 'E', 'Start_over_bakken', 'Slutt_over_bakken'];
        let hovedData = [headers];
        
        d.forEach(r => {
            hovedData.push([
                r.dato, r.kontrollor, r.netteier, r.linje, r.mast, r.mast_type,
                r.stolpehøyde_m, r.nedgravingsdybde_m, r.jordbånd_mm, r.toppdiam_mm,
                r.jordsmonn, r.klima, r.vertikallast, r.temp, r.rf, r.fukt,
                r.skadetype, r.stolpenr, r.skadehoyde_m, r.diam_skadested_mm,
                r.A, r.B, r.C, r.D, r.E, r['Start over bakken'], r['Slutt over bakken']
            ]);
        });
        
        let ws_main = XLSX.utils.aoa_to_sheet(hovedData);
        XLSX.utils.book_append_sheet(wb, ws_main, "Oversikt");
        XLSX.writeFile(wb, "stolpekontroll_rapport.xlsx");
    }

    // Mobiloptimalisert utskrift og PDF-generering uten å miste applikasjonsvisningen
    function visRapporter() {
        let d = JSON.parse(localStorage.getItem("db") || "[]");
        let skader = d.filter(r => r.skadetype && r.skadetype !== "Ingen skade");
        
        if(skader.length === 0) return alert("Ingen registrerte skader å vise på råteskjemaet.");

        let printSone = document.getElementById("printSone");
        let html = "";

        skader.forEach(r => {
            let imgSrc = skadeDef[r.skadetype] ? skadeDef[r.skadetype].img : "";
            let imgTag = imgSrc ? `<img src="${imgSrc}" alt="${r.skadetype}">` : "";
            
            html += `<div class="page">
                <h2>Råteskjema - Mast ${r.mast} (Stolpe ${r.stolpenr || "Uoppgitt"})</h2>
                <p><strong>Dato:</strong> ${r.dato || "-"} | <strong>Kontrollør:</strong> ${r.kontrollor || "-"}</p>
                <p><strong>Netteier:</strong> ${r.netteier || "-"} | <strong>LinjeID:</strong> ${r.linje || "-"}</p>
                
                ${imgTag}
                
                <table>
                    <tr><th>Skadetype</th><td><strong>${r.skadetype}</strong></td></tr>
                    <tr><th>Høyde over bakken</th><td>${r.skadehoyde_m || "-"} m</td></tr>
                    <tr><th>Diameter på skadested</th><td>${r.diam_skadested_mm || "-"} mm</td></tr>`;
            
            if(r.A) html += `<tr><th>Mål A</th><td>${r.A} mm</td></tr>`;
            if(r.B) html += `<tr><th>Mål B</th><td>${r.B} mm</td></tr>`;
            if(r.C) html += `<tr><th>Mål C</th><td>${r.C} mm</td></tr>`;
            if(r.D) html += `<tr><th>Mål D</th><td>${r.D} mm</td></tr>`;
            if(r.E) html += `<tr><th>Mål E</th><td>${r.E} mm</td></tr>`;
            if(r['Start over bakken']) html += `<tr><th>Start over bakken</th><td>${r['Start over bakken']} m</td></tr>`;
            if(r['Slutt over bakken']) html += `<tr><th>Slutt over bakken</th><td>${r['Slutt over bakken']} m</td></tr>`;

            html += `
                    <tr><th>Jordsmonn</th><td>${r.jordsmonn || "-"}</td></tr>
                    <tr><th>Klima</th><td>${r.klima || "-"}</td></tr>
                </table>
            </div>`;
        });

        printSone.innerHTML = html;

        // Kort tidsforsinkelse gjør at mobilgrensesnittet oppdateres feilfritt før print-dialogen tar over
        setTimeout(() => {
            window.print();
        }, 300);
    }

    function sjekkURLParametere() {
        const urlParams = new URLSearchParams(window.location.search);
        const netteierVal = urlParams.get('netteier');
        const linjeVal = urlParams.get('linje');
        const mastVal = urlParams.get('mast');
        const stolpenrVal = urlParams.get('stolpenr');

        if (netteierVal) document.getElementById('netteier').value = netteierVal;
        if (linjeVal) document.getElementById('linje').value = linjeVal;
        if (mastVal) document.getElementById('mast').value = mastVal;

        if (stolpenrVal) {
            let nyBoks = leggTilNy();
            let selectFelt = nyBoks.querySelector("select");
            selectFelt.addEventListener("change", () => {
                let stolpeFelt = nyBoks.querySelector(".s_stolpe");
                if (stolpeFelt) stolpeFelt.value = stolpenrVal;
            });
            nyBoks.scrollIntoView({ behavior: 'smooth' });
        }
    }
</script>
</body>
</html>
