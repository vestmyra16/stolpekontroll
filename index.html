<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0;}
.container {max-width:420px; margin:auto; background:white; padding:10px;}
label {font-weight:bold; display:block; margin-top:8px;}
input {width:100%; padding:10px;}
button {
width:100%;
padding:12px;
margin-top:6px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}
.grid {display:grid; grid-template-columns:1fr 1fr; gap:6px;}
.hidden {display:none;}
img {width:35%; margin:auto; display:block;}
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v2.9</h2>

<!-- GRUNNLAGSDATA -->
<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mast nr</label>
<input id="mast">

<label>Stolpehøyde over bakken (m)</label>
<input id="hoyde">

<label>Jordband (mm)</label>
<input id="jordband">

<label>Nedgravd (m)</label>
<input id="nedgravd">

<label>GPS</label>
<input id="gps" readonly>
<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<label>Jordsmonn</label>
<input id="jord" value="Skogsmark">

<label>Klima</label>
<input id="klima" value="Kyst">

<label>Avtrapping</label>
<input id="avtrapping" value="0.75">

<label>Vertikallast</label>
<input id="last" value="Normal">

<button onclick="nyMast()">Ny mast</button>

<!-- SKADEKNAPPER -->
<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre')">Indre råte</button>
<button onclick="velg('sirk')">Sirkulær råte</button>

<button onclick="velg('soft')">Softråte</button>
<button onclick="velg('spett')">Spettsmie</button>

<button onclick="velg('hakk')">Hakkespetthull</button>
<button onclick="velg('sprekk')">Sprekk</button>
</div>

<!-- SKADE 1 -->
<h3>Skade 1</h3>
<img id="img1">
<div id="felt1"></div>

<button onclick="visSkade2()">Legg til skade 2</button>

<!-- SKADE 2 -->
<div id="skade2" class="hidden">
<h3>Skade 2</h3>
<img id="img2">
<div id="felt2"></div>
</div>

<label>Merknad</label>
<input id="merknad">

<button onclick="lagre()">Lagre mast</button>
<button onclick="excel()">Last ned Excel</button>

</div>

<script>

const felt = {
indre:["A mm","B mm","E mm"],
sirk:["A mm","B mm","C mm","D mm"],
soft:["A mm","B mm","C mm","D mm"],
spett:["A mm","B mm"],
hakk:["A mm","B mm","C mm","D mm"],
sprekk:[
"Diam på skadested",
"Sprekk starter (m)",
"Sprekk slutter (m)",
"Sprekkdybde (A)",
"Sprekkbredde (B)",
"Sprekklengde (m)"
]
};

function velg(type){
document.getElementById("img1").src = type + ".svg";
document.getElementById("img2").src = type + ".svg";

lagFelt(type,"felt1");
lagFelt(type,"felt2");
}

function lagFelt(type,id){
let d=document.getElementById(id);
d.innerHTML="";

felt[type].forEach(f=>{
d.innerHTML+=`<label>${f}</label><input>`;
});
}

function visSkade2(){
document.getElementById("skade2").classList.remove("hidden");
}

let gpsWatch=null;

function startGPS(){
gpsWatch=navigator.geolocation.watchPosition(p=>{
gps.value=p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
});
}

function stopGPS(){
navigator.geolocation.clearWatch(gpsWatch);
}

let data=[];

function lagre(){
data.push({
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
hoyde:hoyde.value,
jordband:jordband.value,
nedgravd:nedgravd.value,
gps:gps.value,
jord:jord.value,
klima:klima.value,
last:last.value,
merknad:merknad.value
});
alert("Lagret");
}

function nyMast(){
let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");

netteier.value=n;
linje.value=l;

document.getElementById("skade2").classList.add("hidden");
}

function excel(){
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Stolper");
XLSX.writeFile(wb,"stolpekontroll.xlsx");
}

</script>

</body>
</html>
