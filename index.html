<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0;}
.container {max-width:420px; margin:auto; background:white; padding:10px;}

label {font-weight:bold; display:block; margin-top:8px;}
input {width:100%; padding:10px; margin-top:4px;}

button {
width:100%;
padding:12px;
margin-top:6px;
font-size:16px;
border:none;
border-radius:6px;
background:#2e7d32;
color:white;
}

.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.choice {
background:#2e7d32;
color:white;
padding:12px;
border-radius:6px;
text-align:center;
margin-top:4px;
}

.hidden {display:none;}

img {
width:35%;
display:block;
margin:auto;
}
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v2.9</h2>

<!-- GRUNNLAG -->

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordband (mm)</label>
<input id="jordband">

<label>Nedgravd (m)</label>
<input id="nedgravd">

<label>Toppdiameter (mm)</label>
<input id="toppdiameter">

<label>Avtrapping (cm/m)</label>
<input id="avtrapping" value="0.75">

<!-- GPS -->

<label>GPS</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<!-- VALG -->

<label>Jordsmonn</label>
<div class="choice" onclick="toggle('jordvalg')" id="jordTxt">Skogsmark</div>
<div id="jordvalg" class="hidden grid">
<button onclick="setVal('jordTxt','Innmark')">Innmark</button>
<button onclick="setVal('jordTxt','Fjell')">Fjell</button>
</div>

<label>Klima</label>
<div class="choice" onclick="toggle('klimavalg')" id="klimaTxt">Kyst</div>
<div id="klimavalg" class="hidden grid">
<button onclick="setVal('klimaTxt','Innland')">Innland</button>
<button onclick="setVal('klimaTxt','Fjell')">Fjell</button>
</div>

<label>Vertikallast</label>
<div class="choice" onclick="toggle('lastvalg')" id="lastTxt">Normal</div>
<div id="lastvalg" class="hidden grid">
<button onclick="setVal('lastTxt','Lav')">Lav</button>
<button onclick="setVal('lastTxt','Høy')">Høy</button>
</div>

<button onclick="nyMast()">Ny mast</button>

<!-- SKADEKNAPPER -->

<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre','Indre råte')">Indre råte</button>
<button onclick="velg('sirk','Sirkulær råte')">Sirkulær råte</button>

<button onclick="velg('soft','Softråte')">Softråte</button>
<button onclick="velg('spett','Spettsmie')">Spettsmie</button>

<button onclick="velg('hakk','Hakkespetthull')">Hakkespetthull</button>
<button onclick="velg('sprekk','Sprekk')">Sprekk</button>
</div>

<!-- SKADE 1 -->

<h3 id="tittel1">Skade 1</h3>

<label>Stolpenr</label>
<input id="stolpe1">

<label>Høyde skadested (m)</label>
<input id="h1">

<label>Diameter skadested (mm)</label>
<input id="d1">

<img id="img1">
<div id="felt1"></div>

<!-- SKADE 2 -->

<button id="btnSkade2" onclick="toggleSkade2()">Legg til skade 2</button>

<div id="skade2" class="hidden">

<h3 id="tittel2">Skade 2</h3>

<label>Stolpenr</label>
<input id="stolpe2">

<label>Høyde skadested (m)</label>
<input id="h2">

<label>Diameter skadested (mm)</label>
<input id="d2">

<img id="img2">
<div id="felt2"></div>

</div>

<label>Merknad</label>
<input id="merknad">

<button onclick="lagre()">Lagre mast</button>
<button onclick="excel()">Last ned Excel</button>

</div>

<script>

const felt = {
indre:["A mm","B mm","E mm"],
sirk:["A mm","B mm","C mm","D mm"],
soft:["A mm","B mm","C mm","D mm"],
spett:["A mm","B mm"],
hakk:["A mm","B mm","C mm","D mm"],
sprekk:[
"Diam skadested",
"Sprekk start (m)",
"Sprekk slutt (m)",
"Sprekkdybde",
"Sprekkbredde",
"Sprekklengde"
]
};

function velg(type, navn){

img1.src = type + ".svg";
img2.src = type + ".svg";

document.getElementById("tittel1").innerText = navn + " 1";
document.getElementById("tittel2").innerText = navn + " 2";

lagFelt(type,"felt1");
lagFelt(type,"felt2");
}

function lagFelt(type,id){
let d=document.getElementById(id);
d.innerHTML="";
felt[type].forEach(f=>{
d.innerHTML += `<label>${f}</label><input>`;
});
}

function toggleSkade2(){
let el = document.getElementById("skade2");
let btn = document.getElementById("btnSkade2");

if(el.classList.contains("hidden")){
el.classList.remove("hidden");
btn.innerText = "Skjul skade 2";
}else{
el.classList.add("hidden");
btn.innerText = "Legg til skade 2";
}
}

// GPS
let gpsWatch=null;

function startGPS(){
gpsWatch=navigator.geolocation.watchPosition(p=>{
gps.value=p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
});
}

function stopGPS(){
navigator.geolocation.clearWatch(gpsWatch);
}

// valg
function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

function setVal(id,val){
document.getElementById(id).innerText=val;
document.getElementById(id.replace("Txt","valg")).classList.add("hidden");
}

// data
let data=[];

function lagre(){
data.push({
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
gps:gps.value,
merknad:merknad.value
});
alert("Lagret");
}

function nyMast(){

let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");

netteier.value=n;
linje.value=l;

skade2.classList.add("hidden");
btnSkade2.innerText="Legg til skade 2";

document.getElementById("tittel1").innerText="Skade 1";
document.getElementById("tittel2").innerText="Skade 2";
}

// excel
function excel(){
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Stolper");
XLSX.writeFile(wb,"stolpekontroll.xlsx");
}

</script>

</body>
</html>
