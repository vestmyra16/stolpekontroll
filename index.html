<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/Stolpekontroll/icon-180.png">
<meta name="theme-color" content="#2e7d32">

<title>Stolpekontroll</title>

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
}

.container {
    max-width:600px;
    margin:auto;
    padding:10px;
    background:white;
}

h2 {
    text-align:center;
}

label {
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin-top:4px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    background:#2e7d32;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v1.4</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input>

<label>LinjeID</label>
<input>

<label>Mastnr</label>
<input>

<label>Stolpehøyde (m)</label>
<input>

<label>Jordbåndsdiameter (mm)</label>
<input>

<label>Vertikallast</label>
<select>
<option>Lav</option>
<option>Normal</option>
<option>Høy</option>
</select>

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade</h3>

<label>Skadetype</label>
<select>
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
</select>

<label>Stolpenr</label>
<input>

<label>Skadehøyde (m)</label>
<input>

<label>Diameter på skadested (mm)</label>
<input>

<label>A (mm)</label>
<input>

<label>B (mm)</label>
<input>

<label>E (mm)</label>
<input>

<button>📷 Ta bilde</button>

<label>Merknad</label>
<textarea></textarea>

<button>Ny registrering (skade)</button>
<button>Lagre</button>
<button>Last ned Excel</button>

</div>

<script>
function nyMast(){
    document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}
</script>

</body>
</html>
