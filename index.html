<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.8</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 10px;
}

h2 {
  margin-top: 20px;
}

label {
  font-weight: 600;
  color: #111;
  display: block;
  margin-top: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 3px;
  border: 2px solid #ccc;
  border-radius: 6px;
  font-size: 16px;
  color: #000;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}

.section {
  background: white;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
}

</style>
</head>

<body>

<h2>Stolpekontroll v10.8</h2>

<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpenr</label>
<input id="stolpe">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordbanddiameter (mm)</label>
<input id="jord">

<label>Klima</label>
<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select id="jordtype">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<label>Sikkerhetsfaktor</label>
<select id="sf">
<option>1</option>
<option>1.5</option>
<option>2</option>
</select>

<label>Temperatur</label>
<input id="temp">

<label>Relativ fukt (%)</label>
<input id="rf">

<label>Ytre fukt (%)</label>
<input id="yf">

</div>

<div class="section">
<h3>Skade</h3>

<label>Type skade</label>
<select id="type">
<option>Indre råte (ABE)</option>
<option>Sirkulær råte (ABCD)</option>
<option>Softråte (ABCD)</option>
<option>Spettsmie (AB)</option>
<option>Hakkespetthull (ABCD)</option>
</select>

<label>Diameter skadested (mm)</label>
<input id="diam">

<label>Skadehøyde (m)</label>
<input id="sh">

<label>A</label><input id="A">
<label>B</label><input id="B">
<label>C</label><input id="C">
<label>D</label><input id="D">
<label>E</label><input id="E">

<button onclick="leggTil()">Legg til skade</button>

</div>

<button onclick="lastNed()">Last ned CSV</button>

<script>

let skader = [];

function leggTil() {
  skader.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    stolpe: stolpe.value,
    hoyde: hoyde.value,
    jord: jord.value,
    klima: klima.value,
    jordtype: jordtype.value,
    sf: sf.value,
    temp: temp.value,
    rf: rf.value,
    yf: yf.value,
    type: type.value,
    diam: diam.value,
    sh: sh.value,
    A: A.value,
    B: B.value,
    C: C.value,
    D: D.value,
    E: E.value
  });

  alert("Skade registrert");
}

function lastNed() {

  let csv = "Netteier,Linje,Mast,Stolpe,Høyde,Jordband,Klima,Jordsmonn,SF,Temp,Fukt,YtreFukt,Type,Diameter,Skadehøyde,A,B,C,D,E\n";

  skader.forEach(s => {
    csv += `${s.netteier},${s.linje},${s.mast},${s.stolpe},${s.hoyde},${s.jord},${s.klima},${s.jordtype},${s.sf},${s.temp},${s.rf},${s.yf},${s.type},${s.diam},${s.sh},${s.A},${s.B},${s.C},${s.D},${s.E}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stolpekontroll.csv";
  a.click();
}

</script>

</body>
</html>
