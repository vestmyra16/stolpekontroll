<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/Stolpekontroll/icon-180.png">

<title>Stolpekontroll v2.3</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:600px; margin:auto; padding:10px; background:white; }

h2 { text-align:center; }

label { display:block; margin-top:10px; font-weight:bold; }
input, select, textarea {
    width:100%;
    padding:12px;
    margin-top:4px;
    font-size:16px;
}

button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    background:#2e7d32;
    color:white;
    font-size:16px;
}

img {
    width:70%;
    display:block;
    margin:10px auto;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v2.3</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input>
<label>LinjeID</label><input>
<label>Mastnr</label><input>

<label>Stolpehøyde (m)</label><input>

<label>Jordbånddiameter (mm)</label><input>

<label>Vertikallast</label>
<select>
<option>Lav</option>
<option>Normal</option>
<option>Høy</option>
</select>

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade</h3>

<select onchange="byttSkade(this.value)">
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
<option value="hakk">Hakkespetthull (ABCD)</option>
</select>

<img id="hovedBilde" src="indre.svg">

<!-- SKADE 1 -->
<h3>Registrering 1</h3>

<label>Stolpenr</label><input>
<label>Skadehøyde (m)</label><input>
<label>Diameter på skadested (mm)</label><input>
<label>Toppdiameter (mm)</label><input>

<div id="felt1"></div>

<button>📷 Ta bilde</button>
<textarea placeholder="Merknad"></textarea>

<!-- SKADE 2 -->
<h3>Registrering 2</h3>

<label>Stolpenr</label><input>
<label>Skadehøyde (m)</label><input>
<label>Diameter på skadested (mm)</label><input>
<label>Toppdiameter (mm)</label><input>

<div id="felt2"></div>

<button>📷 Ta bilde</button>
<textarea placeholder="Merknad"></textarea>

<button>Lagre</button>
<button>Last ned Excel</button>

</div>

<script>

function nyMast(){
    document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}

/* Skadetyper */
const feltMap = {
    indre: ["A","B","E"],
    sirk: ["A","B","C","D"],
    soft: ["A","B","C","D"],
    sprekk: ["A","B"],
    spett: ["A","B"],
    hakk: ["A","B","C","D"]
};

function byttSkade(type){

    document.getElementById("hovedBilde").src = type + ".svg";

    lagFelt(type, "felt1");
    lagFelt(type, "felt2");
}

function lagFelt(type, id){

    let container = document.getElementById(id);
    container.innerHTML = "";

    feltMap[type].forEach(bokstav => {

        let label = document.createElement("label");
        label.innerText = bokstav + " (mm)";

        let input = document.createElement("input");

        container.appendChild(label);
        container.appendChild(input);
    });
}

byttSkade("indre");

</script>

</body>
</html>
