<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
.small { font-size:12px; color:#444; }
</style>
</head>

<body>

<h2>Stolpekontroll v3</h2>

<div class="card">
<h3>Grunnlag</h3>
<input id="stolpenr" placeholder="Stolpenr">
<input type="number" id="diameter" placeholder="Diameter skadested (mm)">
</div>

<div class="card">
<h3>Ny skade</h3>

<select id="type">
<option value="innvendig">Innvendig råte</option>
<option value="sirkular">Sirkulær råte</option>
<option value="softråte">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spettsmie">Spettsmie</option>
</select>

<input type="number" id="A" placeholder="A (mm)">
<input type="number" id="B" placeholder="B (mm)">
<input type="number" id="C" placeholder="C (mm)">
<input type="number" id="D" placeholder="D (mm)">
<input type="number" id="E" placeholder="E (mm)">
<input type="number" id="L" placeholder="Lengde (mm)">
<input type="number" id="H" placeholder="Skadehøyde (mm)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
<div id="forklaring" class="small"></div>
</div>

<div class="card">
<button onclick="excel()">Last ned Excel</button>
<button onclick="window.print()">Lag PDF</button>
</div>

<script>

let skader = [];

function leggTil() {
  let s = {
    type: type.value,
    A: parseFloat(A.value),
    B: parseFloat(B.value),
    C: parseFloat(C.value),
    D: parseFloat(D.value),
    E: parseFloat(E.value),
    L: parseFloat(L.value),
    H: parseFloat(H.value)
  };

  skader.push(s);

  liste.innerHTML += `<div>${s.type} (h=${s.H||0})</div>`;
}

function beregn() {

  let d = parseFloat(diameter.value);
  if (!d) return alert("Mangler diameter");

  let restSoftråte = 100;
  let restSirk = 100;
  let restInnvendig = 100;
  let restLokalt = 100;

  skader.forEach(s => {

    // SOFTRÅTE
    if (s.type === "softråte") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let max = Math.max(...vals);
        let r = ((d - max) / d) * 100;
        if (r < restSoftråte) restSoftråte = r;
      }
    }

    // SIRKULÆR
    if (s.type === "sirkular") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let min = Math.min(...vals);
        let r = (min / (d/2)) * 100;
        if (r < restSirk) restSirk = r;
      }
    }

    // INNVENDIG
    if (s.type === "innvendig" && s.E) {
      let r = (s.E / (d/2)) * 100;
      if (r < restInnvendig) restInnvendig = r;
    }

    // SPREKK
    if (s.type === "sprekk") {
      let r = 100 - ((s.B||0)*1.2 + (s.L||0)/1000);
      if (r < restLokalt) restLokalt = r;
    }

    // SPETTSMIE
    if (s.type === "spettsmie") {
      let r = 100 - ((s.B||0)*2);
      if (r < restLokalt) restLokalt = r;
    }

  });

  let styrende = Math.min(restSoftråte, restSirk, restInnvendig, restLokalt);

  let fork = "";

  if (styrende === restSoftråte) fork = "Softråte styrer";
  else if (styrende === restSirk) fork = "Sirkulær råte styrer";
  else if (styrende === restInnvendig) fork = "Innvendig råte styrer";
  else fork = "Lokal skade styrer";

  let status = styrende >= 75 ? "GODKJENT" : "IKKE GODKJENT";

  resultat.innerHTML =
    "Restkapasitet: " + styrende.toFixed(1) + "%<br>Status: " + status;

  forklaring.innerText = fork;
}

// EXCEL
function excel() {
  let csv = "Stolpe,Type,A,B,C,D,E,L,H\n";
  skader.forEach(s=>{
    csv += `${stolpenr.value},${s.type},${s.A},${s.B},${s.C},${s.D},${s.E},${s.L},${s.H}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rapport.csv";
  a.click();
}

</script>

</body>
</html>
