<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/Stolpekontroll/icon-180.png">

<title>Stolpekontroll v2.1</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:600px; margin:auto; padding:10px; background:white; }

label { display:block; margin-top:10px; font-weight:bold; }
input, select, textarea { width:100%; padding:10px; margin-top:4px; }

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    background:#2e7d32;
    color:white;
}

img {
    width:100%;
    margin-top:10px;
    border:1px solid #ccc;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v2.1</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input>
<label>LinjeID</label><input>
<label>Mastnr</label><input>

<button onclick="nyMast()">Ny mast</button>

<!-- SKADE 1 -->
<h3>Registrer skade 1</h3>

<select onchange="byttSkade(this.value,'1')">
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
<option value="hakk">Hakkespetthull (ABCD)</option>
</select>

<img id="img1" src="indre.svg">

<div id="felt1"></div>

<button>📷 Ta bilde</button>
<textarea placeholder="Merknad"></textarea>

<!-- SKADE 2 -->
<h3>Registrer skade 2</h3>

<select onchange="byttSkade(this.value,'2')">
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
<option value="hakk">Hakkespetthull (ABCD)</option>
</select>

<img id="img2" src="indre.svg">

<div id="felt2"></div>

<button>📷 Ta bilde</button>
<textarea placeholder="Merknad"></textarea>

<button>Lagre</button>
<button>Last ned Excel</button>

</div>

<script>

function nyMast(){
    document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}

/* Skadetyper og felt */
const feltMap = {
    indre: ["A","B","E"],
    sirk: ["A","B","C","D"],
    soft: ["A","B","C","D"],
    sprekk: ["A","B"],
    spett: ["A","B"],
    hakk: ["A","B","C","D"]
};

function byttSkade(type, nr){

    // Bytt bilde (SVG fra repo)
    document.getElementById("img"+nr).src = type + ".svg";

    // Lag riktige inputfelt
    let container = document.getElementById("felt"+nr);
    container.innerHTML = "";

    feltMap[type].forEach(bokstav=>{
        let label = document.createElement("label");
        label.innerText = bokstav + " (mm)";

        let input = document.createElement("input");

        container.appendChild(label);
        container.appendChild(input);
    });
}

/* Start med Indre råte */
byttSkade("indre","1");
byttSkade("indre","2");

</script>

</body>
</html>
