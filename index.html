<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3.0</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
body{
font-family:Arial;
max-width:420px;
margin:auto;
background:#f2f2f2;
padding:10px;
box-sizing:border-box;
}
*{box-sizing:border-box;}
h2{text-align:center;}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2e7d32;
color:white;
border:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.choice{
background:#2e7d32;
color:white;
padding:12px;
border-radius:6px;
text-align:center;
}

.hidden{display:none;}

img{
width:80px;
display:none;
margin:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h3>Stolpekontroll</h3>
<input type="password" id="pass" placeholder="Passord">
<button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">

<h2>Stolpekontroll v3.0</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Nedgravingsdybde (m)</label>
<input id="nedgravd">

<label>Jordbånddiameter (mm)</label>
<input id="jord">

<label>Avtrapping (cm/m)</label>
<input id="avtr" value="0.75">

<label>Toppdiameter (mm)</label>
<input id="topp">

<!-- FORHOLD -->
<h3>Forhold</h3>

<label>Jordsmonn</label>
<div class="choice" onclick="toggle('jordvalg')" id="jordTxt">Skogsmark</div>
<div id="jordvalg" class="hidden grid">
<button onclick="setVal('jordTxt','Innmark')">Innmark</button>
<button onclick="setVal('jordTxt','Skogsmark')">Skogsmark</button>
<button onclick="setVal('jordTxt','Fjell')">Fjell</button>
</div>

<label>Klima</label>
<div class="choice" onclick="toggle('klimavalg')" id="klimaTxt">Kyst</div>
<div id="klimavalg" class="hidden grid">
<button onclick="setVal('klimaTxt','Kyst')">Kyst</button>
<button onclick="setVal('klimaTxt','Innland')">Innland</button>
<button onclick="setVal('klimaTxt','Fjell')">Fjell</button>
</div>

<label>Vertikallast</label>
<div class="choice" onclick="toggle('lastvalg')" id="lastTxt">Normal</div>
<div id="lastvalg" class="hidden grid">
<button onclick="setVal('lastTxt','Lav')">Lav</button>
<button onclick="setVal('lastTxt','Normal')">Normal</button>
<button onclick="setVal('lastTxt','Høy')">Høy</button>
</div>

<!-- FUKT -->
<button onclick="toggleFukt()">Fuktmåling</button>

<div id="fuktBox" class="hidden">
<label>Lufttemperatur</label>
<input id="temp">
<label>Relativ fuktighet</label>
<input id="rf">
<label>Fukt ytterskall</label>
<input id="fukt">
</div>

<label>GPS</label>
<input id="gps" readonly>
<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<button onclick="nyMast()">Ny mast</button>

<!-- SKADER -->
<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre')">Indre råte</button>
<button onclick="velg('sirk')">Sirkulær råte</button>
<button onclick="velg('soft')">Softråte</button>
<button onclick="velg('spett')">Spettsmie</button>
<button onclick="velg('hakk')">Hakkespetthull</button>
<button onclick="velg('sprekk')">Sprekk</button>
</div>

<div id="skade1" class="hidden">
<h3 id="tittel1"></h3>
<label>Stolpenr</label>
<input id="stolpe1">
<img id="img1">
<div id="felt1"></div>
</div>

<button id="btn2" onclick="toggle2()">Legg til skade 2</button>

<div id="skade2" class="hidden">
<h3 id="tittel2"></h3>
<label>Stolpenr</label>
<input id="stolpe2">
<img id="img2">
<div id="felt2"></div>
</div>

<button onclick="lagre()">Lagre mast</button>
<button onclick="lastCSV()">Last ned Excel</button>

</div>

<script>

// LOGIN
const PASS="1234";
function login(){
let p=pass.value;
let start=localStorage.getItem("start");
if(p===PASS){
if(!start) localStorage.setItem("start",Date.now());
else{
let d=(Date.now()-start)/(1000*60*60*24);
if(d>60){alert("Tilgang utløpt");return;}
}
login.style.display="none";
app.style.display="block";
}else alert("Feil passord");
}

// TOGGLE
function toggle(id){document.getElementById(id).classList.toggle("hidden");}
function setVal(id,val){
document.getElementById(id).innerText=val;
document.getElementById(id.replace("Txt","valg")).classList.add("hidden");
}
function toggleFukt(){fuktBox.classList.toggle("hidden");}

// GPS
let watch=null;
function startGPS(){
watch=navigator.geolocation.watchPosition(p=>{
gps.value=p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6);
});
}
function stopGPS(){navigator.geolocation.clearWatch(watch);}

// FELT
const felt={
indre:["A","B","E"],
sirk:["A","B","C","D"],
soft:["A","B","C","D"],
spett:["A","B"],
hakk:["A","B","C","D"],
sprekk:["diameter","start","slutt","A","B","antall","f30","f40","merknad"]
};

function lagFelt(type,id,prefix){
let d=document.getElementById(id);
d.innerHTML="";
felt[type].forEach(f=>{
d.innerHTML+=`<label>${f}</label><input id="${prefix}_${f}">`;
});
}

// VELG TYPE
function velg(type){
skade1.classList.remove("hidden");
tittel1.innerText=type+" 1";
tittel2.innerText=type+" 2";
lagFelt(type,"felt1","s1");
lagFelt(type,"felt2","s2");

// bilder
img1.style.display="block";
if(type==="indre") img1.src="indre.svg";
else if(type==="sirk") img1.src="sirk.svg";
else img1.src=type+".svg";
}

// DATA
function hent(prefix){
let r={};
document.querySelectorAll(`[id^=${prefix}_]`).forEach(i=>{
let key=i.id.split("_")[1];
r[key]=i.value;
});
return r;
}

// SKADE 2
function toggle2(){
if(skade2.classList.contains("hidden")){
skade2.classList.remove("hidden");
btn2.innerText="Skjul skade 2";
}else{
skade2.classList.add("hidden");
btn2.innerText="Legg til skade 2";
}
}

// LAGRING
let excel=[];

function lagre(){

let base={
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
jordsmonn:jordTxt.innerText,
klima:klimaTxt.innerText,
vert:lastTxt.innerText,
temp:temp.value,
rf:rf.value,
fukt:fukt.value,
gps:gps.value,
dato:new Date().toLocaleDateString("no-NO")
};

if(stolpe1.value){
excel.push({...base,stolpe:stolpe1.value,type:tittel1.innerText,skade:1,...hent("s1")});
}

if(stolpe2.value){
excel.push({...base,stolpe:stolpe2.value,type:tittel2.innerText,skade:2,...hent("s2")});
}

alert("Lagret");
}

// CSV
function lastCSV(){

let csv=Object.keys(excel[0]||{}).join(",")+"\n";

excel.forEach(d=>{
csv+=Object.values(d).join(",")+"\n";
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="stolpekontroll.csv";
a.click();
}

// NY MAST
function nyMast(){
let n=netteier.value;
let l=linje.value;
document.querySelectorAll("input").forEach(i=>i.value="");
netteier.value=n;
linje.value=l;
skade1.classList.add("hidden");
skade2.classList.add("hidden");
img1.style.display="none";
img2.style.display="none";
felt1.innerHTML="";
felt2.innerHTML="";
btn2.innerText="Legg til skade 2";
}

// INIT
window.onload=function(){
skade1.classList.add("hidden");
skade2.classList.add("hidden");
};

</script>

</body>
</html>
