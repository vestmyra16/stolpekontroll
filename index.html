<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Stolpekontroll v5.0 - Strikt</title>
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: auto; padding: 10px; background: #f2f2f2; }
        label { display: block; font-weight: bold; color: #000; margin-top: 15px; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; color: #000; background: #fff; }
        button { width: 100%; padding: 12px; margin: 4px 0; background: #2e7d32; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .skade-box { border: 2px solid #2e7d32; padding: 10px; margin-top: 20px; background: #fff; }
        img { width: 120px; display: block; margin: 10px auto; }
    </style>
</head>
<body>

<div id="loginBox">
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">
    <h3>Grunnlagsdata</h3>
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    <label>Mastnr</label><input id="mast">
    <label>Stolpehøyde (m)</label><input id="hoyde">
    <label>Nedgravd (m)</label><input id="nedgravd">
    <label>Jordbånd (mm)</label><input id="jord">
    <label>Avtrapping</label><input id="avtr" value="0.75">
    <label>Toppdiameter (mm)</label><input id="topp">

    <h3>Forhold</h3>
    <label>Jordsmonn</label>
    <div class="grid"><button onclick="valg('jord', 'Innmark', this)">Innmark</button><button onclick="valg('jord', 'Skogsmark', this)">Skogsmark</button><button onclick="valg('jord', 'Fjell', this)">Fjell</button></div>
    <label>Klima</label>
    <div class="grid"><button onclick="valg('klima', 'Innland', this)">Innland</button><button onclick="valg('klima', 'Kyst', this)">Kyst</button><button onclick="valg('klima', 'Fjell', this)">Fjell</button></div>
    <label>Vertikallast</label>
    <div class="grid"><button onclick="valg('last', 'Lav', this)">Lav</button><button onclick="valg('last', 'Normal', this)">Normal</button><button onclick="valg('last', 'Høy', this)">Høy</button></div>

    <label>Lufttemperatur (°C)</label><input id="temp">
    <label>Relativ fuktighet (%)</label><input id="rf">
    <label>Fukt i ytterskall (%)</label><input id="fukt">

    <h3>Registrer skade</h3>
    <div class="grid">
        <button onclick="visSkade('indre')">Indre</button><button onclick="visSkade('sirk')">Sirk</button><button onclick="visSkade('soft')">Soft</button>
        <button onclick="visSkade('spett')">Spett</button><button onclick="visSkade('hakk')">Hakk</button><button onclick="visSkade('sprekk')">Sprekk</button>
    </div>

    <div id="skadeOmraade"></div>

    <button onclick="lagre()" style="background:#1b5e20;">Lagre Mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned Excel</button>
    <button onclick="nyMast()" style="background:#c62828;">Ny Mast</button>
</div>

<script>
const felter = {
    indre:['A','B','E'], sirk:['A','B','C','D'], soft:['A','B','C','D'],
    spett:['A','B'], hakk:['A','B','C','D'], sprekk:['Start','Slutt','A','B']
};
let v = {jord:"", klima:"", last:""};

function login(){ if(document.getElementById("pass").value==="1234"){ document.getElementById("loginBox").style.display="none"; document.getElementById("app").style.display="block"; } }
function valg(k, n, b) { v[k]=n; b.parentElement.querySelectorAll('button').forEach(x=>x.style.background='#2e7d32'); b.style.background='#1b5e20'; }

function visSkade(type) {
    let container = document.getElementById("skadeOmraade");
    container.innerHTML = `<div class="skade-box">
        <img src="${type}.svg">
        <input type="hidden" id="s_type" value="${type}">
        <label>Stolpenr</label><input id="s_stolpe">
        <label>Skadehøyde (m)</label><input id="s_h">
        <label>Skadelengde (m)</label><input id="s_l">
        <label>Diameter (mm)</label><input id="s_d">` +
        felter[type].map(f => `<label>${f} (mm)</label><input class="dynamisk" data-navn="${f}">`).join('') +
    `</div>`;
}

function lagre() {
    let d = JSON.parse(localStorage.getItem("db")||"[]");
    let obj = { mast: document.getElementById("mast").value, type: document.getElementById("s_type").value };
    document.querySelectorAll("input").forEach(i => { if(i.id) obj[i.id] = i.value; });
    document.querySelectorAll(".dynamisk").forEach(i => obj[i.dataset.navn] = i.value);
    d.push(obj); localStorage.setItem("db", JSON.stringify(d)); alert("Lagret");
}

function nyMast() { location.reload(); }
function lastCSV() { /* Samme eksport som før */ }
</script>
</body>
</html>
