<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0;}
.container {max-width:420px; margin:auto; padding:10px; background:white;}

label {font-weight:bold; display:block; margin-top:8px;}
input {width:100%; padding:10px; margin-top:4px;}

button {
width:100%;
padding:12px;
margin-top:6px;
font-size:16px;
border:none;
border-radius:6px;
background:#2e7d32;
color:white;
}

.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

img {width:40%; display:block; margin:auto;}
.hidden {display:none;}
.section {margin-top:12px;}
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v2.9</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>GPS</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velgSkade('indre')">Indre råte</button>
<button onclick="velgSkade('sirk')">Sirkulær råte</button>

<button onclick="velgSkade('soft')">Softråte</button>
<button onclick="velgSkade('spett')">Spettsmie</button>

<button onclick="velgSkade('hakk')">Hakkespetthull</button>
<button onclick="velgSkade('sprekk')">Sprekk</button>
</div>

<!-- SKADE 1 -->
<div class="section">
<h3>Skade 1</h3>
<img id="img1">
<div id="felt1"></div>
</div>

<button onclick="visSkade2()">Ny skade (2)</button>

<!-- SKADE 2 -->
<h3 id="skade2Tittel" class="hidden">Skade 2</h3>
<div id="skade2" class="hidden section">
<img id="img2">
<div id="felt2"></div>
</div>

<label>Merknad</label>
<input id="merknad">

<button onclick="lagre()">Lagre mast</button>
<button onclick="nyMast()">Ny mast</button>
<button onclick="lastnedExcel()">Last ned Excel</button>

</div>

<script>

// FELTMAPPING
const feltMap = {
indre:["A","B","E"],
sirk:["A","B","C","D"],
soft:["A","B","C","D"],
spett:["A","B"],
hakk:["A","B","C","D"],
sprekk:["Start","Slutt","Dybde"]
};

// VELG SKADE
function velgSkade(type){

document.getElementById("img1").src = type + ".svg";
document.getElementById("img2").src = type + ".svg";

lagFelt(type,"felt1");
lagFelt(type,"felt2");
}

// LAG FELT
function lagFelt(type,id){

let div = document.getElementById(id);
div.innerHTML = "";

feltMap[type].forEach(f=>{
div.innerHTML += `<label>${f}</label><input>`;
});
}

// VIS SKADE 2
function visSkade2(){
document.getElementById("skade2").classList.remove("hidden");
document.getElementById("skade2Tittel").classList.remove("hidden");
}

// GPS
let gpsWatch=null;

function startGPS(){
gpsWatch=navigator.geolocation.watchPosition(p=>{
gps.value=p.coords.latitude.toFixed(6)+", "+p.coords.longitude.toFixed(6);
});
}

function stopGPS(){
navigator.geolocation.clearWatch(gpsWatch);
}

// DATA
let data=[];

function lagre(){
data.push({
netteier:netteier.value,
linje:linje.value,
mast:mast.value,
gps:gps.value,
merknad:merknad.value
});
alert("Lagret");
}

// NY MAST
function nyMast(){

let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");

netteier.value=n;
linje.value=l;

document.getElementById("skade2").classList.add("hidden");
document.getElementById("skade2Tittel").classList.add("hidden");
}

// EXCEL
function lastnedExcel(){
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Stolper");
XLSX.writeFile(wb,"stolpekontroll.xlsx");
}

</script>

</body>
</html>
