<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.2</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
</style>
</head>

<body>

<h2>Stolpekontroll v10.2 (REN)</h2>

<!-- GRUNNLAG -->
<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="Linje">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input type="number" id="diameter" placeholder="Diameter skadested (mm)">
<input type="number" id="hoyde" placeholder="Stolpehøyde (m)">
<input type="number" id="nedgrav" placeholder="Nedgravingsdybde (m)">
<input type="number" id="jordband" placeholder="Jordbåndsdiameter (mm)">

<select id="miljo">
<option>Kyst</option>
<option>Innland</option>
<option>Fjellklima</option>
</select>

<select id="jordsmonn">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<select id="fiber">
<option value="30">Fiberstyrke 30 N/mm²</option>
<option value="40">Fiberstyrke 40 N/mm²</option>
</select>

<select id="sikkerhet">
<option value="1.5">Sikkerhetsfaktor 1.5</option>
<option value="2">Sikkerhetsfaktor 2.0</option>
<option value="2.5">Sikkerhetsfaktor 2.5</option>
</select>

<select id="vind">
<option value="1">Lav vind</option>
<option value="1.5">Middels vind</option>
<option value="2">Høy vind</option>
</select>

<select id="is">
<option value="1">Ingen is</option>
<option value="1.3">Lett is</option>
<option value="1.6">Tung is</option>
</select>

</div>

<!-- FUKT (KORRIGERT) -->
<div class="card">
<h3>Fuktregistrering</h3>

<label><input type="checkbox" id="fuktToggle"> Aktiver fuktmåling</label>

<div id="fuktFelter" style="display:none;">
<input type="number" id="temp" placeholder="Temperatur (°C)">
<input type="number" id="rf" placeholder="Relativ fuktighet (%)">
<input type="number" id="fuktYtre" placeholder="Ytre fuktighet (%)">
</div>

</div>

<!-- SKADER -->
<div class="card">
<h3>Skader</h3>

<select id="skadetype" onchange="visFelter()">
<option value="">Velg skade</option>
<option value="indre">Innvendig råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<button onclick="visBilde()">Vis målebilde</button>

<div id="felter"></div>

</div>

<!-- RESULTAT -->
<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
</div>

<!-- EKSPORT -->
<div class="card">
<button onclick="lastExcel()">Last ned Excel</button>
<button onclick="window.print()">Lag PDF</button>
</div>

<script>

// FUKT VISNING
document.getElementById("fuktToggle").onchange = function(){
  document.getElementById("fuktFelter").style.display =
    this.checked ? "block" : "none";
};

// FELTER
function visFelter(){
  let t = document.getElementById("skadetype").value;
  let html = "";

  if(t==="indre"){
    html += `<input id="A" placeholder="A råte">`;
    html += `<input id="B" placeholder="B råte">`;
    html += `<input id="E" placeholder="E restskall">`;
  }

  if(t==="sirk" || t==="soft"){
    html += `<input id="A" placeholder="A">`;
    html += `<input id="B" placeholder="B">`;
    html += `<input id="C" placeholder="C">`;
    html += `<input id="D" placeholder="D">`;
  }

  if(t==="sprekk" || t==="spett"){
    html += `<input id="A" placeholder="A bredde">`;
    html += `<input id="B" placeholder="B dybde">`;
  }

  html += `<input id="lengde" placeholder="Lengde">`;
  html += `<input id="hSkade" placeholder="Skadehøyde">`;

  document.getElementById("felter").innerHTML = html;
}

// BILDER
function visBilde(){
  let t = document.getElementById("skadetype").value;
  if(t==="indre") window.open("indre.svg");
  if(t==="sirk") window.open("sirk.svg");
  if(t==="soft") window.open("soft.svg");
  if(t==="sprekk") window.open("sprekk.svg");
  if(t==="spett") window.open("spett.svg");
}

// BEREGNING
function beregn(){

  let d = parseFloat(document.getElementById("diameter").value);
  let h = parseFloat(document.getElementById("hoyde").value);
  let fiber = parseFloat(document.getElementById("fiber").value);
  let sf = parseFloat(document.getElementById("sikkerhet").value);
  let vind = parseFloat(document.getElementById("vind").value);
  let is = parseFloat(document.getElementById("is").value);

  let A = parseFloat(document.getElementById("A")?.value) || 0;
  let B = parseFloat(document.getElementById("B")?.value) || 0;
  let C = parseFloat(document.getElementById("C")?.value) || 0;
  let D = parseFloat(document.getElementById("D")?.value) || 0;
  let E = parseFloat(document.getElementById("E")?.value) || 0;

  let rest = 100;

  if(E>0){
    rest = (E/d)*100;
  } else {
    let vals = [A,B,C,D].filter(v=>v>0);
    if(vals.length){
      let snitt = vals.reduce((a,b)=>a+b,0)/vals.length;
      rest = ((d - snitt)/d)*100;
    }
  }

  let d_eff = d * (rest/100);

  let I = Math.PI * Math.pow(d_eff,4) / 64;
  let M_kap = (fiber * I / (d_eff/2)) / sf;

  let M_last = (0.6*h*vind + 0.3*h*is) * h;

  let knekk = (M_last / M_kap) * h;

  let status = M_kap > M_last ? "GODKJENT" : "IKKE GODKJENT";

  document.getElementById("resultat").innerHTML =
    "Restkapasitet: " + rest.toFixed(1) + "%<br>" +
    "Moment kapasitet: " + M_kap.toFixed(0) + "<br>" +
    "Moment last: " + M_last.toFixed(0) + "<br>" +
    "Knekkpunkt ca: " + knekk.toFixed(2) + " m<br>" +
    "Status: " + status;
}

// EXCEL
function lastExcel(){
  let data = [
    ["Stolpe", document.getElementById("stolpe").value],
    ["Temperatur", document.getElementById("temp").value],
    ["Relativ fukt", document.getElementById("rf").value],
    ["Ytre fukt", document.getElementById("fuktYtre").value],
    ["Resultat", document.getElementById("resultat").innerText]
  ];
  let csv = data.map(e => e.join(";")).join("\n");
  let blob = new Blob([csv], { type: 'text/csv' });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "stolpekontroll.csv";
  link.click();
}

</script>

</body>
</html>
