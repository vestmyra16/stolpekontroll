<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3.7</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.container { max-width:600px; margin:auto; background:white; padding:12px; }
h2 { text-align:center; }
h3 { margin-top:20px; }

label { font-weight:bold; display:block; margin-top:10px; }
input, select, textarea {
width:100%; padding:10px; margin-top:5px; font-size:16px;
}

button {
width:100%; padding:14px; margin-top:10px;
background:#2e7d32; color:white; border:none; border-radius:8px;
}

.result {
background:#eef;
padding:12px;
margin-top:10px;
border-radius:8px;
}

.ok { background:#c8e6c9; }
.warn { background:#fff3cd; }
.bad { background:#f8d7da; }
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v3.7</h2>

<!-- 🔹 GRUNNLAGSDATA -->
<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input id="h">

<label>Jordbanddiameter (mm)</label>
<input id="jb">

<label>Mastetype</label>
<select id="mastetype">
<option>Enkel stolpe</option>
<option>A-mast</option>
<option>Bardunert</option>
</select>

<label>Vertikallast</label>
<select id="last">
<option>Lav</option>
<option selected>Normal</option>
<option>Høy</option>
</select>

<label>Klima</label>
<select id="klima">
<option>Fjell</option>
<option selected>Innland</option>
<option>Kyst</option>
</select>

<label>Jordsmonn</label>
<select id="jord">
<option>Fjell</option>
<option selected>Skogsmark</option>
<option>Innmark</option>
</select>

<!-- 🔹 SKADE -->
<h3>Indre råte</h3>

<label>Stolpenr</label>
<input id="stolpenr">

<label>Skadehøyde (m)</label>
<input id="start">

<label>Diameter på skadested (mm)</label>
<input id="d">

<label>A (mm)</label>
<input id="A">

<label>E (restskall mm)</label>
<input id="E">

<label>Lengde langs stolpen</label>
<select id="lengde">
<option value="kort">0–0,5 m</option>
<option value="middels">0,5–2 m</option>
<option value="lang">Over 2 m</option>
</select>

<label>Merknad</label>
<textarea id="merknad"></textarea>

<button onclick="beregn()">Beregn</button>

<div id="res" class="result"></div>

</div>

<script>

function beregn(){

let d = parseFloat(document.getElementById("d").value);
let E = parseFloat(document.getElementById("E").value);
let A = parseFloat(document.getElementById("A").value);
let h = parseFloat(document.getElementById("h").value);
let start = parseFloat(document.getElementById("start").value);

if(!d || !E || !A || !h){
document.getElementById("res").innerHTML = "Fyll ut alle felt";
return;
}

// 🔵 Radius
let R = d / 2;

// 🔵 RESTSTYRKE (felt + REN kalibrert)
let rest = 100 * Math.pow(E / R, 0.55);

// 🔵 A påvirkning (kun én gang!)
let skadegrad = A / d;
rest *= (1 - skadegrad * 0.15);

// 🔵 Lengde (kun én gang!)
let lengde = document.getElementById("lengde").value;
if(lengde == "middels") rest *= 0.9;
if(lengde == "lang") rest *= 0.8;

// 🔵 Knekkpunkt (lett effekt)
let knekk = h * 0.33;
if(Math.abs(start - knekk) < 1){
rest *= 0.9;
}

// 🔵 Mastetype
let mastetype = document.getElementById("mastetype").value;
if(mastetype == "A-mast") rest *= 0.9;
if(mastetype == "Bardunert") rest *= 0.85;

// 🔵 Begrensning
if(rest > 95) rest = 95;
if(rest < 25) rest = 25;

// 🔒 SIKKERHETSFAKTOR (REN)
let sf = rest / 75;

// 🔵 LEVETID (enkel modell)
let klima = document.getElementById("klima").value;
let jord = document.getElementById("jord").value;

let lev = 20;

if(rest < 80) lev = 15;
if(rest < 70) lev = 10;
if(rest < 60) lev = 7;
if(rest < 50) lev = 5;

if(klima == "Kyst") lev -= 3;
if(jord == "Innmark") lev -= 2;

if(lev < 2) lev = 2;

// 🔵 VURDERING
let klasse = "ok";
let tekst = "OK";

if(rest < 75){
klasse = "warn";
tekst = "Tiltak bør vurderes";
}

if(rest < 60){
klasse = "bad";
tekst = "Tiltak anbefales";
}

// 🔵 RESULTAT
document.getElementById("res").className = "result " + klasse;
document.getElementById("res").innerHTML = `
Reststyrke: <b>${rest.toFixed(1)} %</b><br>
Sikkerhetsfaktor: <b>${sf.toFixed(2)}</b><br>
Restlevetid: <b>${lev} år</b><br>
Vurdering: <b>${tekst}</b>
`;

}

</script>

</body>
</html>
