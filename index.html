<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.section { background:#fff; padding:12px; margin-top:15px; border-radius:8px; }
label { display:block; margin-top:8px; font-weight:bold; }
input, select, textarea {
  width:100%; padding:10px; margin-top:3px;
  border:1px solid #999; border-radius:6px;
}
button {
  width:100%; padding:12px; margin-top:10px;
  background:#2e7d32; color:white;
  border:none; border-radius:6px;
}
.skade {
  background:#eee;
  padding:8px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>Stolpekontroll</h2>

<div class="section">

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<label>Diameter skadested (mm)</label>
<input id="diam">

</div>

<div class="section">

<h3>Skade</h3>

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
<option>Spettsmie</option>
</select>

<div id="felter"></div>

<button onclick="taBilde()">📸 Ta bilde</button>
<input type="file" id="kamera" accept="image/*" capture="environment" style="display:none;">

<label>Merknad</label>
<textarea id="merknad"></textarea>

<button onclick="leggTilSkade()">➕ Legg til skade</button>

<div id="skadeliste"></div>

</div>

<button onclick="lastNed()">📄 Last ned Excel</button>
<button onclick="slettAlt()">🗑️ Slett alt</button>

<script>

let skader = JSON.parse(localStorage.getItem("skader")) || [];

function taBilde(){
  document.getElementById("kamera").click();
}

function oppdaterFelter(){

let t = document.getElementById("type").value;
let f = document.getElementById("felter");

if(t === "Indre råte"){
  f.innerHTML = `
  <label>A (mm)</label><input id="A">
  <label>B (mm)</label><input id="B">
  <label>E (mm)</label><input id="E">
  `;
}

else if(t === "Sirkulær råte"){
  f.innerHTML = `
  <label>A (mm)</label><input id="A">
  <label>B (mm)</label><input id="B">
  <label>C (mm)</label><input id="C">
  <label>D (mm)</label><input id="D">
  `;
}

else if(t === "Sprekk"){
  f.innerHTML = `
  <label>A bredde (mm)</label><input id="A">
  <label>B dybde (mm)</label><input id="B">
  <label>C lengde (m)</label><input id="C">
  `;
}

else if(t === "Spettsmie"){
  f.innerHTML = `
  <label>A (mm)</label><input id="A">
  <label>B (mm)</label><input id="B">
  `;
}

else {
  f.innerHTML = `
  <label>A (mm)</label><input id="A">
  <label>B (mm)</label><input id="B">
  `;
}

}

function leggTilSkade(){

let type = document.getElementById("type").value;

// Softråte kun én
if(type === "Softråte"){
  skader = skader.filter(s => s.type !== "Softråte");
}

let bilde = document.getElementById("kamera").files[0];
let reader = new FileReader();

reader.onload = function(e){

let skade = {
  type: type,
  A: document.getElementById("A")?.value || "",
  B: document.getElementById("B")?.value || "",
  C: document.getElementById("C")?.value || "",
  D: document.getElementById("D")?.value || "",
  E: document.getElementById("E")?.value || "",
  merknad: document.getElementById("merknad").value,
  bilde: e.target.result
};

skader.push(skade);
localStorage.setItem("skader", JSON.stringify(skader));

visSkader();

};

if(bilde){
  reader.readAsDataURL(bilde);
} else {
  reader.onload({target:{result:""}});
}

}

function visSkader(){

let html = "<h4>Registrerte skader</h4>";

skader.forEach((s, i) => {
  html += `
  <div class="skade">
  ${i+1}. ${s.type} | A:${s.A} B:${s.B} C:${s.C}
  </div>
  `;
});

document.getElementById("skadeliste").innerHTML = html;

}

function lastNed(){

let csv = "Type,A,B,C,D,E,Merknad\n";

skader.forEach(s => {
  csv += `${s.type},${s.A},${s.B},${s.C},${s.D},${s.E},${s.merknad}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "stolpekontroll.csv";
a.click();

}

function slettAlt(){
if(confirm("Slette alle registreringer?")){
  localStorage.removeItem("skader");
  skader = [];
  visSkader();
}
}

oppdaterFelter();
visSkader();

</script>

</body>
</html>
