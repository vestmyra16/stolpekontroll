<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

h1 {
  display:flex;
  justify-content: space-between;
  align-items: center;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  font-size: 16px;
}

.camera-btn {
  font-size: 30px;
  background: none;
  border: none;
}

img {
  width: 80px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>
  Stolpekontroll
  <span>v1.0</span>
</h1>

<h2>Grunnlagsdata</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpehøyde (m)</label>
<input type="number" id="hoyde">

<label>Jordbånddiameter (mm)</label>
<input type="number" id="jord">

<button onclick="nyMast()">Ny mast</button>

<h2>Registrer skade 1</h2>

<div id="skade1">
<select id="skadetype1" onchange="visFelter(1)">
  <option value="indre">Indre råte</option>
  <option value="sirk">Sirkulær råte</option>
  <option value="soft">Softråte</option>
  <option value="spett">Spettsmie</option>
  <option value="sprekk">Sprekk</option>
  <option value="hakk">Hakkespetthull</option>
</select>

<img id="img1" src="indre.svg">

<label>Stolpenr</label>
<input id="stolpe1">

<label>Skadehøyde (m)</label>
<input id="h1" type="number">

<label>Diameter (mm)</label>
<input id="d1" type="number">

<div id="bok1"></div>
</div>

<button onclick="visSkade2()">Ny registrering (skade 2)</button>

<div id="skade2" style="display:none">
<h2>Registrer skade 2</h2>

<select id="skadetype2" onchange="visFelter(2)">
  <option value="indre">Indre råte</option>
  <option value="sirk">Sirkulær råte</option>
  <option value="soft">Softråte</option>
  <option value="spett">Spettsmie</option>
  <option value="sprekk">Sprekk</option>
  <option value="hakk">Hakkespetthull</option>
</select>

<img id="img2" src="indre.svg">

<label>Stolpenr</label>
<input id="stolpe2">

<label>Skadehøyde (m)</label>
<input id="h2" type="number">

<label>Diameter (mm)</label>
<input id="d2" type="number">

<div id="bok2"></div>
</div>

<h3>Foto</h3>
<button class="camera-btn" onclick="kamera()">📷</button>
<input type="file" id="kamera" accept="image/*" capture="environment" style="display:none">

<label>Merknad</label>
<textarea id="merknad"></textarea>

<button onclick="lagre()">Lagre</button>
<button onclick="lastNed()">Last ned Excel</button>

<script>

let lagret = [];

function nyMast() {
  document.getElementById("mast").value = "";
  document.getElementById("hoyde").value = "";
  document.getElementById("jord").value = "";
  document.getElementById("skade2").style.display="none";
}

function visSkade2(){
  document.getElementById("skade2").style.display="block";
}

function felt(n){ return `<label>${n} (mm)</label><input>` }

function visFelter(nr){
  let type=document.getElementById("skadetype"+nr).value;
  let div=document.getElementById("bok"+nr);
  let img=document.getElementById("img"+nr);

  div.innerHTML="";

  if(type==="indre"){ img.src="indre.svg"; div.innerHTML=felt("A")+felt("B")+felt("E");}
  if(type==="sirk"){ img.src="sirk.svg"; div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");}
  if(type==="soft"){ img.src="soft.svg"; div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");}
  if(type==="spett"){ img.src="spett.svg"; div.innerHTML=felt("A")+felt("B");}
  if(type==="sprekk"){ img.src="sprekk.svg"; div.innerHTML=felt("A")+felt("B");}
  if(type==="hakk"){ img.src="hakk.svg"; div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");}
}

function kamera(){
 document.getElementById("kamera").click();
}

function lagre(){

 let data={
  netteier: netteier.value,
  linje: linje.value,
  mast: mast.value,
  skade1: skadetype1.value,
  skade2: skadetype2.value || "",
  merknad: merknad.value
 };

 lagret.push(data);

 alert("Lagret!");
}

function lastNed(){

 let csv="Netteier,Linje,Mast,Skade1,Skade2,Merknad\n";

 lagret.forEach(r=>{
   csv+=`${r.netteier},${r.linje},${r.mast},${r.skade1},${r.skade2},${r.merknad}\n`;
 });

 let blob=new Blob([csv],{type:"text/csv"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="stolpekontroll.csv";
 a.click();
}

window.onload=()=>{visFelter(1)}

</script>

</body>
</html>
