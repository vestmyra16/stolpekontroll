<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3.8</title>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.container { max-width:420px; margin:auto; background:white; padding:15px; }
h2 { text-align:center; }
label { font-weight:bold; display:block; margin-top:10px; }
input, select { width:100%; padding:8px; margin-top:3px; }
button { width:100%; padding:10px; margin-top:15px; background:green; color:white; border:none; }
.result { margin-top:15px; padding:10px; }
.red { background:#f8d7da; }
.green { background:#d4edda; }
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v3.8</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input>
<label>LinjeID</label><input>
<label>Mastnr</label><input>

<label>Stolpehøyde (m)</label><input id="h" value="15">
<label>Jordbanddiameter (mm)</label><input id="jb" value="350">

<label>Mastetype</label>
<select><option>Enkel stolpe</option><option>A-mast</option><option>Bardunert</option></select>

<label>Vertikallast</label>
<select><option>Normal</option><option>Høy</option></select>

<label>Klima</label>
<select><option>Innland</option><option>Kyst</option><option>Fjell</option></select>

<label>Jordsmonn</label>
<select><option>Skogsmark</option><option>Innmark</option><option>Fjell</option></select>

<button onclick="nyMast()">Ny mast</button>

<h3>Indre råte</h3>

<label>Stolpenr</label><input>
<label>Skade starter (m)</label><input id="start" value="3">
<label>Skade slutter (m)</label><input id="slutt" value="4">

<label>Diameter på skadested (mm)</label><input id="d" value="330">
<label>A (mm)</label><input id="A" value="100">
<label>E (restskall mm)</label><input id="E" value="30">

<label>Lengde langs stolpen</label>
<select id="lengde">
<option value="kort">0–0,5 m</option>
<option value="middels">0,5–2 m</option>
<option value="lang">Over 2 m</option>
</select>

<button onclick="beregn()">Beregn</button>

<div id="res" class="result"></div>

</div>

<script>

function beregn(){

let d = parseFloat(document.getElementById("d").value);
let E = parseFloat(document.getElementById("E").value);
let A = parseFloat(document.getElementById("A").value);
let h = parseFloat(document.getElementById("h").value);
let start = parseFloat(document.getElementById("start").value);

let R = d/2;

// ======================
// NY FELTKALIBRERT MODELL
// ======================

// lineær + svak kurve (stabil i felt)
let ratio = E / R;
let rest = 100 * (0.6 * ratio + 0.4 * Math.sqrt(ratio));

// moderat A påvirkning
let skadegrad = A / d;
rest *= (1 - skadegrad * 0.10);

// lengdeeffekt (rolig)
let lengde = document.getElementById("lengde").value;
if(lengde === "middels") rest *= 0.97;
if(lengde === "lang") rest *= 0.90;

// knekkpunkt
let knekk = h * 0.33;
if(Math.abs(start - knekk) < 1){
    rest *= 0.92;
}

// begrensning
if(rest > 95) rest = 95;
if(rest < 30) rest = 30;

// ======================
// SIKKERHETSFAKTOR (REN)
// ======================
let sf = rest / 75;

// ======================
// RESTLEVETID
// ======================
let levetid = "";

if(rest > 80) levetid = "10–20 år";
else if(rest > 70) levetid = "8–15 år";
else if(rest > 60) levetid = "5–10 år";
else if(rest > 50) levetid = "3–8 år";
else levetid = "0–5 år";

// ======================
let res = document.getElementById("res");

if(sf < 1){
    res.className = "result red";
} else {
    res.className = "result green";
}

res.innerHTML = `
Reststyrke: ${rest.toFixed(1)} %<br>
Sikkerhetsfaktor: ${sf.toFixed(2)}<br>
Restlevetid: ${levetid}
`;

}

function nyMast(){
document.getElementById("res").innerHTML="";
}

</script>

</body>
</html>
