<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Stolpekontroll v5.1 - Fleksibel</title>
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: auto; padding: 10px; background: #f2f2f2; }
        label { display: block; font-weight: bold; color: #000; margin-top: 12px; margin-bottom: 2px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #000; box-sizing: border-box; color: #000; }
        button { width: 100%; padding: 12px; margin: 4px 0; background: #2e7d32; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .skade-box { border: 2px solid #2e7d32; padding: 10px; margin-top: 20px; background: #fff; }
        img { width: 100px; display: block; margin: 10px auto; }
    </style>
</head>
<body>

<div id="loginBox">
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">
    <h3>Grunnlagsdata</h3>
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    <label>Mastnr</label><input id="mast">

    <h3>Registrering</h3>
    <button onclick="leggTilNy()" style="background:#558b2f;">+ Registrer ny skade</button>

    <div id="skadeOmraade"></div>

    <button onclick="lagre()" style="background:#1b5e20;">Lagre Mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned Excel</button>
    <button onclick="location.reload()" style="background:#c62828;">Ny Mast</button>
</div>

<script>
const skadeTyper = ["Indre råte", "Sirkulær råte", "Softråte", "Spettsmie", "Hakkespett", "Sprekk"];
const felter = {
    "Indre råte":['A','B','E'], "Sirkulær råte":['A','B','C','D'], "Softråte":['A','B','C','D'],
    "Spettsmie":['A','B'], "Hakkespett":['A','B','C','D'], "Sprekk":['Start','Slutt','A','B']
};

function login(){ if(document.getElementById("pass").value==="1234"){ document.getElementById("loginBox").style.display="none"; document.getElementById("app").style.display="block"; } }

function leggTilNy() {
    let container = document.getElementById("skadeOmraade");
    let div = document.createElement("div");
    div.className = "skade-box";
    
    // Dropdown for å velge type
    let options = skadeTyper.map(t => `<option value="${t}">${t}</option>`).join('');
    
    div.innerHTML = `
        <label>Velg skadetype</label>
        <select onchange="oppdaterFelter(this)">
            <option value="">-- Velg --</option>
            ${options}
        </select>
        <div class="felt-container"></div>
        <button style="background:#888;" onclick="this.parentElement.remove()">Fjern denne skaden</button>
    `;
    container.appendChild(div);
}

function oppdaterFelter(select) {
    let type = select.value;
    let container = select.parentElement.querySelector(".felt-container");
    container.innerHTML = `
        <label>Stolpenr</label><input class="s_stolpe">
        <label>Skadehøyde</label><input class="s_h">
        <label>Lengde</label><input class="s_l">
        <label>Diameter</label><input class="s_d">` +
        felter[type].map(f => `<label>${f} (mm)</label><input class="d_f" data-navn="${f}">`).join('');
}

function lagre() {
    let d = JSON.parse(localStorage.getItem("db")||"[]");
    document.querySelectorAll(".skade-box").forEach(s => {
        let obj = { mast: document.getElementById("mast").value, type: s.querySelector("select").value };
        s.querySelectorAll("input").forEach(i => { if(i.className.includes("s_")) obj[i.className] = i.value; });
        s.querySelectorAll(".d_f").forEach(i => obj[i.dataset.navn] = i.value);
        d.push(obj);
    });
    localStorage.setItem("db", JSON.stringify(d)); alert("Lagret!");
}
</script>
</body>
</html>
