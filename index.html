<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v11.2</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 10px;
}

h2 {
  margin-bottom: 5px;
}

.section {
  background: #fff;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
}

label {
  font-weight: 700;
  margin-top: 10px;
  display: block;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 3px;
  border: 2px solid #999;
  border-radius: 6px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2e7d32;
  color: #fff;
  border: none;
  border-radius: 6px;
}

img.knapp {
  width: 100%;
  margin-top: 10px;
}

img.vis {
  width: 100%;
  max-height: 200px;
  object-fit: contain;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v11.2</h2>

<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
<label>Stolpenr</label><input id="stolpe">
<label>Stolpehøyde</label><input id="hoyde">
<label>Jordbanddiameter</label><input id="jord">

<label>Klima</label>
<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select id="jordtype">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<label>Sikkerhetsfaktor</label>
<select id="sf">
<option>1</option>
<option>1.5</option>
<option>2</option>
</select>

</div>

<div class="section">
<h3>Skade</h3>

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte (ABE)</option>
<option>Sirkulær råte (ABCD)</option>
<option>Softråte (ABCD)</option>
<option>Spettsmie (AB)</option>
<option>Hakkespetthull (ABCD)</option>
</select>

<button onclick="visBilde()">Vis bilde</button>
<img id="bilde" class="vis" style="display:none">

<label>Diameter skadested</label>
<input id="diam">

<label>Skadehøyde</label>
<input id="sh">

<div id="felter"></div>

<img src="Knapp.png" class="knapp" onclick="leggTil()">

</div>

<button onclick="lastNed()">Last ned CSV</button>

<script>

// 30 dagers sperre
let start = localStorage.getItem("startDato");
if (!start) {
  localStorage.setItem("startDato", Date.now());
} else {
  let dager = (Date.now() - start) / (1000*60*60*24);
  if (dager > 30) {
    let pw = prompt("Skriv passord:");
    if (pw !== "stolpe123") {
      alert("Ingen tilgang");
      document.body.innerHTML = "";
    }
  }
}

let skader = [];

function oppdaterFelter() {
  let t = type.value;
  let f = document.getElementById("felter");

  if (t.includes("ABE")) {
    f.innerHTML = `
      <label>A</label><input id="A">
      <label>B</label><input id="B">
      <label>E</label><input id="E">
    `;
  } else if (t.includes("ABCD")) {
    f.innerHTML = `
      <label>A</label><input id="A">
      <label>B</label><input id="B">
      <label>C</label><input id="C">
      <label>D</label><input id="D">
    `;
  } else {
    f.innerHTML = `
      <label>A</label><input id="A">
      <label>B</label><input id="B">
    `;
  }
}

function visBilde() {
  let img = document.getElementById("bilde");
  let t = type.value;

  if (t.includes("Indre")) img.src = "indre.svg";
  else if (t.includes("Sirkulær")) img.src = "sirk.svg";
  else if (t.includes("Softråte")) img.src = "soft.svg";
  else if (t.includes("Spettsmie")) img.src = "spett.svg";
  else if (t.includes("Hakkespetthull")) img.src = "hakk.svg";

  img.style.display = "block";
}

function leggTil() {
  skader.push({
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    stolpe: stolpe.value,
    hoyde: hoyde.value,
    jord: jord.value,
    klima: klima.value,
    jordtype: jordtype.value,
    sf: sf.value,
    type: type.value,
    diam: diam.value,
    sh: sh.value,
    A: A?.value || "",
    B: B?.value || "",
    C: C?.value || "",
    D: D?.value || "",
    E: E?.value || ""
  });

  alert("Registrert");
}

function lastNed() {

  let csv = "Netteier,Linje,Mast,Stolpe,Høyde,Jord,Klima,Jordtype,SF,Type,Diameter,Skadehøyde,A,B,C,D,E\n";

  skader.forEach(s => {
    csv += `${s.netteier},${s.linje},${s.mast},${s.stolpe},${s.hoyde},${s.jord},${s.klima},${s.jordtype},${s.sf},${s.type},${s.diam},${s.sh},${s.A},${s.B},${s.C},${s.D},${s.E}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stolpekontroll.csv";
  a.click();

  let valg = confirm("Start ny registrering?");
  if (valg) {
    mast.value = "";
    stolpe.value = "";
    hoyde.value = "";
    jord.value = "";
    diam.value = "";
    sh.value = "";
    document.getElementById("felter").innerHTML = "";
    skader = [];
  }
}

oppdaterFelter();

</script>

</body>
</html>
