<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolpekontroll v5.7</title>
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: auto; padding: 10px; background: #f2f2f2; }
        label { display: block; font-weight: bold; color: #000; margin-top: 12px; margin-bottom: 2px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; color: #000; background: #fff; }
        button { width: 100%; padding: 12px; margin: 4px 0; background: #2e7d32; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .skade-box { border: 2px solid #2e7d32; padding: 10px; margin-top: 20px; background: #fff; }
        img { width: 120px; display: block; margin: 10px auto; border: 1px solid #ccc; }
        .beregnet { background: #e8f5e9 !important; font-style: italic; }
        #loginBox { margin-top: 50px; padding: 20px; background: #fff; border: 1px solid #000; }
    </style>
</head>
<body>

<div id="loginBox">
    <h3>Logg inn</h3>
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">
    <h3>Grunnlagsdata</h3>
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    <label>Mastnr</label><input id="mast">
    <label>Stolpehøyde (m)</label><input id="hoyde" oninput="beregnTopp()">
    <label>Nedgravingsdybde (m)</label><input id="nedgravd" oninput="beregnTopp()">
    <label>Jordbånd (mm)</label><input id="jord" oninput="beregnTopp()">
    <label>Avtrapping (cm/m)</label><input id="avtr" value="0.7" oninput="beregnTopp()">
    <label>Toppdiameter (mm)</label>
    <input id="topp" class="beregnet">

    <h3>Forhold</h3>
    <label>Jordsmonn</label>
    <div class="grid">
        <button onclick="v('jord', 'Innmark', this)">Innmark</button>
        <button onclick="v('jord', 'Skogsmark', this)">Skogsmark</button>
        <button onclick="v('jord', 'Fjell', this)">Fjell</button>
    </div>
    <label>Klima</label>
    <div class="grid">
        <button onclick="v('klima', 'Innland', this)">Innland</button>
        <button onclick="v('klima', 'Kyst', this)">Kyst</button>
        <button onclick="v('klima', 'Fjell', this)">Fjell</button>
    </div>
    <label>Vertikallast</label>
    <div class="grid">
        <button onclick="v('last', 'Lav', this)">Lav</button>
        <button onclick="v('last', 'Normal', this)">Normal</button>
        <button onclick="v('last', 'Høy', this)">Høy</button>
    </div>
    
    <label>Lufttemp (°C)</label><input id="temp">
    <label>Rel. fukt (%)</label><input id="rf">
    <label>Fukt ytterskall (%)</label><input id="fukt">

    <h3>Skaderegistrering</h3>
    <button onclick="leggTilNy()" style="background:#558b2f;">+ Registrer ny skade</button>
    <div id="skadeOmraade"></div>

    <button onclick="lagre()" style="background:#1b5e20; margin-top:20px;">Lagre Mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned CSV (Excel)</button>
    <button onclick="nyMast()" style="background:#c62828;">Ny Mast</button>
</div>

<script>
let valgData = {jord:"", klima:"", last:""};
const skadeDef = {
    "Indre råte": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'E',u:'mm'}], img: "indre.svg" },
    "Sirkulær råte": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'C',u:'mm'}, {n:'D',u:'mm'}], img: "sirk.svg" },
    "Softråte": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'C',u:'mm'}, {n:'D',u:'mm'}], img: "soft.svg" },
    "Spettsmie": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}], img: "spett.svg" },
    "Hakkespetthull": { felt: [{n:'A',u:'mm'}, {n:'B',u:'mm'}, {n:'C',u:'mm'}, {n:'D',u:'mm'}], img: "hakk.svg" },
    "Sprekk": { felt: [{n:'Start over bakken',u:'m'}, {n:'Slutt over bakken',u:'m'}, {n:'A',u:'mm'}, {n:'B',u:'mm'}], img: "sprekk.svg" }
};

function login() { 
    if(document.getElementById("pass").value === "1234") { 
        document.getElementById("loginBox").style.display = "none"; 
        document.getElementById("app").style.display = "block"; 
    } else {
        alert("Feil passord!");
    }
}

function beregnTopp() {
    let h = parseFloat(document.getElementById("hoyde").value) || 0;
    let n = parseFloat(document.getElementById("nedgravd").value) || 0;
    let j = parseFloat(document.getElementById("jord").value) || 0;
    let a = parseFloat(document.getElementById("avtr").value) || 0.7;
    if (h && j) document.getElementById("topp").value = Math.round(j - (a * (h - n) * 10));
}

function v(k, n, b) { 
    valgData[k]=n; 
    b.parentElement.querySelectorAll('button').forEach(x=>x.style.background='#2e7d32'); 
    b.style.background='#1b5e20'; 
}

function leggTilNy() {
    let div = document.createElement("div");
    div.className = "skade-box";
    div.innerHTML = `<label>Velg skadetype</label>
        <select onchange="oppdater(this)">
            <option value="">-- Velg --</option>
            ${Object.keys(skadeDef).map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <div class="skade-innhold"></div>
        <button style="background:#888; margin-top:10px;" onclick="this.parentElement.remove()">Slett denne skaden</button>`;
    document.getElementById("skadeOmraade").appendChild(div);
}

function oppdater(sel) {
    let t = sel.value;
    let cont = sel.parentElement.querySelector(".skade-innhold");
    if(!t) { cont.innerHTML = ""; return; }
    cont.innerHTML = `<img src="${skadeDef[t].img}">
        <label>Stolpenr</label><input class="s_stolpe">
        <label>Skadehøyde over bakken (m)</label><input class="s_h">
        <label>Diameter på skadested (mm)</label><input class="s_diam">` +
        skadeDef[t].felt.map(f => `<label>${f.n} (${f.u})</label><input class="d_f" data-navn="${f.n}">`).join('');
}

function lagre() {
    let d = JSON.parse(localStorage.getItem("db") || "[]");
    let grunndata = {
        netteier: document.getElementById("netteier").value,
        linje: document.getElementById("linje").value,
        mast: document.getElementById("mast").value,
        stolpehøyde_m: document.getElementById("hoyde").value,
        nedgravingsdybde_m: document.getElementById("nedgravd").value,
        jordbånd_mm: document.getElementById("jord").value,
        toppdiam_mm: document.getElementById("topp").value,
        jordsmonn: valgData.jord, klima: valgData.klima, vertikallast: valgData.last,
        temp: document.getElementById("temp").value, fukt: document.getElementById("fukt").value
    };

    let lagretMinstEn = false;
    document.querySelectorAll(".skade-box").forEach(s => {
        let type = s.querySelector("select").value;
        if(!type) return;
        lagretMinstEn = true;
        let row = { ...grunndata, skadetype: type };
        row.stolpenr = s.querySelector(".s_stolpe").value;
        row.skadehoyde_m = s.querySelector(".s_h").value;
        row.diam_skadested_mm = s.querySelector(".s_diam").value;
        
        ['A','B','C','D','E','Start over bakken','Slutt over bakken'].forEach(k => row[k] = "");
        s.querySelectorAll(".d_f").forEach(i => row[i.dataset.navn] = i.value);
        d.push(row);
    });

    // Hvis brukeren lagrer en mast UTEN skader, lagrer vi likevel en rad med tom skadetype
    if(!lagretMinstEn) {
        d.push({ ...grunndata, skadetype: "Ingen skade", stolpenr:"", skadehoyde_m:"", diam_skadested_mm:"", A:"", B:"", C:"", D:"", E:"", 'Start over bakken':"", 'Slutt over bakken':"" });
    }

    localStorage.setItem("db", JSON.stringify(d));
    alert("Mast lagret!");
}

function nyMast() {
    // Tømmer spesifikke input-felter
    ['mast', 'hoyde', 'nedgravd', 'jord', 'topp', 'temp', 'rf', 'fukt'].forEach(id => {
        document.getElementById(id).value = "";
    });
    
    // Nullstiller forhold (knapper)
    valgData = {jord:"", klima:"", last:""};
    document.querySelectorAll('.grid button').forEach(b => b.style.background = '#2e7d32');
    
    // Tømmer alle registrerte skadebokser
    document.getElementById("skadeOmraade").innerHTML = "";
    
    alert("Klar for ny mast! Netteier, LinjeID og Avtrapping er bevart.");
}

function lastCSV() {
    let d = JSON.parse(localStorage.getItem("db") || "[]");
    if(d.length === 0) return alert("Ingen data");
    
    let headers = ['netteier','linje','mast','stolpehøyde_m','nedgravingsdybde_m','jordbånd_mm','toppdiam_mm','jordsmonn','klima','vertikallast','temp','fukt','skadetype','stolpenr','skadehoyde_m','diam_skadested_mm','A','B','C','D','E','Start over bakken','Slutt over bakken'];
    
    let csv = "\uFEFF" + headers.join(";") + "\n";
    d.forEach(r => csv += headers.map(h => r[h] || "").join(";") + "\n");
    let a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "stolpekontroll_rapport.csv";
    a.click();
}
</script>
</body>
</html>
