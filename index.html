<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolpekontroll v4.0</title>
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body{font-family:Arial; max-width:420px; margin:auto; background:#f2f2f2; padding:10px;}
        h2, h3{text-align:center; color:#2e7d32;}
        label{display:block; font-weight:bold; margin-top:10px; font-size: 0.8em;}
        input{width:100%; padding:10px; border:1px solid #ccc; box-sizing:border-box;}
        button{width:100%; padding:12px; margin:5px 0; background:#2e7d32; color:white; border:none; cursor:pointer;}
        .grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;}
        .selected{background:#1b5e20 !important;}
        .hidden{display:none;}
    </style>
</head>
<body>

<div id="loginBox">
    <h3>Stolpekontroll</h3>
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" class="hidden">
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    <label>Mastnr</label><input id="mast">
    <label>Stolpehøyde (m)</label><input id="hoyde">
    <label>Nedgravd (m)</label><input id="nedgravd">
    <label>Jordbånd (mm)</label><input id="jord">
    <label>Avtrapping</label><input id="avtr" value="0.75">
    <label>Toppdiameter</label><input id="topp">

    <h3>Forhold</h3>
    <div class="grid" id="vJord"><button onclick="sett(this,'jord')">Innmark</button><button onclick="sett(this,'jord')">Skogsmark</button><button onclick="sett(this,'jord')">Fjell</button></div>
    <div class="grid" id="vKlima"><button onclick="sett(this,'klima')">Innland</button><button onclick="sett(this,'klima')">Kyst</button><button onclick="sett(this,'klima')">Fjell</button></div>
    <div class="grid" id="vLast"><button onclick="sett(this,'last')">Lav</button><button onclick="sett(this,'last')">Normal</button><button onclick="sett(this,'last')">Høy</button></div>
    
    <label>Temp (°C)</label><input id="temp">
    <label>Rel. fukt (%)</label><input id="rf">
    <label>Fukt ytterskall (%)</label><input id="fukt">

    <div id="skader"></div>
    <button onclick="leggTilSkade()" style="background:#555;">+ Legg til skade</button>
    <button onclick="lagre()">Lagre Mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned Excel (CSV)</button>
    <button onclick="nyMast()" style="background:#c62828;">Ny Mast</button>
</div>

<script>
const PASSORD = "1234";
let valg = {jord:"", klima:"", last:""};

// Tidsbegrensning 60 dager
function sjekkTid() {
    let start = localStorage.getItem("startDato");
    if(!start) localStorage.setItem("startDato", new Date().getTime());
    else if((new Date().getTime() - start) > (60 * 24 * 60 * 60 * 1000)) {
        alert("Appen har utløpt. Kontakt administrator.");
        document.body.innerHTML = "<h1>Lisens utløpt</h1>";
    }
}

function login(){
    if(document.getElementById("pass").value === PASSORD){
        sjekkTid();
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
    } else alert("Feil passord");
}

function sett(btn, kat) {
    valg[kat] = btn.innerText;
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function leggTilSkade() {
    let d = document.createElement("div");
    d.innerHTML = `<label>Skadetype</label><input class="s_type"><label>Stolpenr</label><input class="s_stolpe"><label>Skadehøyde</label><input class="s_h">`;
    document.getElementById("skader").appendChild(d);
}

function lagre() {
    let data = JSON.parse(localStorage.getItem("db") || "[]");
    document.querySelectorAll("#skader > div").forEach(s => {
        data.push({
            netteier: document.getElementById("netteier").value,
            linje: document.getElementById("linje").value,
            mast: document.getElementById("mast").value,
            ...valg,
            skadetype: s.querySelector(".s_type").value,
            stolpe: s.querySelector(".s_stolpe").value,
            hoyde: s.querySelector(".s_h").value
        });
    });
    localStorage.setItem("db", JSON.stringify(data));
    alert("Lagret");
}

function lastCSV() {
    let d = JSON.parse(localStorage.getItem("db"));
    let csv = "\uFEFF" + Object.keys(d[0]).join(";") + "\n";
    d.forEach(r => csv += Object.values(r).join(";") + "\n");
    let a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "stolpekontroll.csv";
    a.click();
}

function nyMast() {
    let n = document.getElementById("netteier").value;
    let l = document.getElementById("linje").value;
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("netteier").value = n;
    document.getElementById("linje").value = l;
    document.getElementById("skader").innerHTML = "";
}
</script>
</body>
</html>
