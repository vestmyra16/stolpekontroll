<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3.5</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:600px; margin:auto; padding:10px; background:white; }
label { font-weight:bold; display:block; margin-top:10px; }
input, select, textarea { width:100%; padding:10px; margin-top:5px; }
button { width:100%; padding:12px; margin-top:10px; background:#2e7d32; color:white; border:none; }
.result { background:#eef; padding:10px; margin-top:10px; }
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v3.5</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input>
<label>LinjeID</label><input>
<label>Mastnr</label><input>

<label>Stolpehøyde (m)</label><input id="h">
<label>Jordbånddiameter (mm)</label><input id="jord">

<label>Mastetype</label>
<select id="mastetype">
<option>Enkel stolpe</option>
<option>A-mast</option>
<option>Bardunert</option>
</select>

<label>Vertikallast</label>
<select>
<option>Lav</option>
<option selected>Normal</option>
<option>Høy</option>
</select>

<label>Klima</label>
<select id="klima">
<option>Fjell</option>
<option selected>Innland</option>
<option>Kyst</option>
</select>

<label>Jordsmonn</label>
<select id="jordtype">
<option>Fjell</option>
<option selected>Skogsmark</option>
<option>Innmark</option>
</select>

<h3>Indre råte</h3>

<label>Stolpenr</label><input>
<label>Skade starter (m)</label><input id="start">
<label>Skade slutter (m)</label><input id="slutt">

<label>Diameter på skadested (mm)</label><input id="d">
<label>A (mm)</label><input>
<label>E (restskall mm)</label><input id="E">

<label>Lengde langs stolpen</label>
<select id="lengde">
<option value="kort">0 – 0,5 m</option>
<option value="middels">0,5 – 2 m</option>
<option value="lang">Over 2 m</option>
</select>

<button onclick="beregn()">Beregn</button>

<div class="result" id="res"></div>

</div>

<script>

function beregn(){

let d = parseFloat(document.getElementById("d").value);
let E = parseFloat(document.getElementById("E").value);
let h = parseFloat(document.getElementById("h").value);
let start = parseFloat(document.getElementById("start").value);

if(!d || !E || !h){
document.getElementById("res").innerHTML = "Fyll ut alle felt";
return;
}

// ✅ FELTKALIBRERT RESTSTYRKE
let rest = 100 * Math.sqrt(E / d) * 3.2;
if(rest > 100) rest = 100;
if(rest < 5) rest = 5;

// ✅ SIKKERHETSFAKTOR
let sf30 = rest / 70;
let sf40 = rest / 85;

// 🔧 Mastetype
let mastetype = document.getElementById("mastetype").value;
if(mastetype == "A-mast") sf30 *= 0.9;
if(mastetype == "Bardunert") sf30 *= 0.85;

// 🔧 Knekkpunkt (~1/3 høyde)
let knekk = h * 0.33;
if(Math.abs(start - knekk) < 1){
sf30 *= 0.9;
sf40 *= 0.9;
}

// 🔧 Lengdeeffekt
let lengde = document.getElementById("lengde").value;
if(lengde == "middels") sf30 *= 0.9;
if(lengde == "lang") sf30 *= 0.75;

// 🌍 Levetid
let klima = document.getElementById("klima").value;
let jord = document.getElementById("jordtype").value;

let lev = 15;

if(rest < 70) lev = 12;
if(rest < 60) lev = 10;
if(rest < 50) lev = 7;
if(rest < 40) lev = 5;

if(klima == "Kyst") lev -= 2;
if(jord == "Innmark") lev -= 2;

if(lev < 2) lev = 2;

// 📊 RESULTAT
document.getElementById("res").innerHTML = `
Reststyrke: ${rest.toFixed(1)} %<br>
SF (30): ${sf30.toFixed(2)}<br>
SF (40): ${sf40.toFixed(2)}<br>
Restlevetid: ${lev} år
`;

}

</script>

</body>
</html>
