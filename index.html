<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.4 (REN)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
</style>
</head>

<body>

<h2>Stolpekontroll v10.4 (REN)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">

<select id="fiber">
<option value="30">Fiberstyrke 30</option>
<option value="40">Fiberstyrke 40</option>
</select>

<select id="sf">
<option value="1.5">SF 1.5</option>
<option value="1.2">SF 1.2</option>
<option value="1.0">SF 1.0</option>
</select>

<select id="vind">
<option value="1">Lav vind</option>
<option value="1.5">Middels vind</option>
<option value="2">Høy vind</option>
</select>

<select id="is">
<option value="1">Ingen is</option>
<option value="1.3">Litt is</option>
<option value="1.6">Mye is</option>
</select>

</div>

<div class="card">
<h3>Skader</h3>

<select id="skadetype">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<button onclick="visBilde()">Vis målebilde</button>

<input id="A" placeholder="A (mm)">
<input id="B" placeholder="B (mm)">
<input id="C" placeholder="C (mm)">
<input id="D" placeholder="D (mm)">
<input id="E" placeholder="E restskall (mm)">

<input id="lengde" placeholder="Lengde skade (mm)">
<input id="hSkade" placeholder="Skadehøyde over bakken (m)">

</div>

<button onclick="beregn()">Beregn</button>
<button onclick="lagCSV()">Excel</button>
<button onclick="window.print()">PDF</button>

<h3 id="resultat"></h3>

<script>

function beregn(){

let d = parseFloat(diameter.value)||0;
let h = parseFloat(hoyde.value)||0;
let fiber = parseFloat(document.getElementById("fiber").value);
let sf = parseFloat(document.getElementById("sf").value);
let vind = parseFloat(document.getElementById("vind").value);
let is = parseFloat(document.getElementById("is").value);

let A = parseFloat(A.value)||0;
let B = parseFloat(B.value)||0;
let C = parseFloat(C.value)||0;
let D = parseFloat(D.value)||0;
let E = parseFloat(E.value)||0;

// RESTKAPASITET
let rest = 1;

if(E>0){
rest = E/d;
} else {
let vals=[A,B,C,D].filter(v=>v>0);
if(vals.length){
let snitt=vals.reduce((a,b)=>a+b,0)/vals.length;
rest = (d-snitt)/d;
}
}

// effektiv diameter
let d_eff = d * rest;

// seksjonsmodul
let W = Math.PI * Math.pow(d_eff,3) / 32;

// kapasitet
let M_kap = (fiber * W) / sf;

// lastprofil
let vindlast = 0.6 * vind;
let islast = 0.3 * is;

// moment langs høyde
let maxMoment = 0;
let knekkpunkt = 0;

for(let x=0; x<=h; x+=0.5){
let M = (vindlast + islast) * x * (h-x);
if(M > maxMoment){
maxMoment = M;
knekkpunkt = x;
}
}

// sikkerhetsfaktor reell
let SF_reell = M_kap / maxMoment;

let status = SF_reell < 1 ? "IKKE GODKJENT" : "GODKJENT";

resultat.innerHTML =
"Restkapasitet: " + (rest*100).toFixed(1) + "%<br>" +
"Moment kapasitet: " + M_kap.toFixed(0) + "<br>" +
"Moment last: " + maxMoment.toFixed(0) + "<br>" +
"Sikkerhetsfaktor: " + SF_reell.toFixed(2) + "<br>" +
"Knekkpunkt: " + knekkpunkt.toFixed(1) + " m<br>" +
"Status: " + status;

}

// CSV
function lagCSV(){

let data = [
netteier.value,
linje.value,
mast.value,
stolpe.value,
resultat.innerText
];

let blob = new Blob([data.join(";")]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "stolpe.csv";
a.click();
}

</script>

</body>
</html>
