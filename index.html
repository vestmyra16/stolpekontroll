<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3.0</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;max-width:420px;margin:auto;background:#f2f2f2;padding:10px;}
h2{text-align:center;}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:6px;border:1px solid #ccc;font-size:16px;}
button{background:#2e7d32;color:white;border:none;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.choice{background:#2e7d32;color:white;padding:12px;text-align:center;border-radius:6px;}
.hidden{display:none;}
img{width:90px;margin:auto;display:none;}
label{font-weight:bold;margin-top:6px;display:block;}
</style>
</head>

<body>

<h2>Stolpekontroll v3.0</h2>

<h3>Grunnlagsdata</h3>
<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mastnr">

<h3>Registrer skade</h3>

<div class="grid">
<button onclick="velg('indre')">Indre råte</button>
<button onclick="velg('sirk')">Sirkulær råte</button>
<button onclick="velg('soft')">Softråte</button>
<button onclick="velg('spett')">Spettsmie</button>
<button onclick="velg('hakk')">Hakkespetthull</button>
<button onclick="velg('sprekk')">Sprekk</button>
</div>

<div id="skade1" class="hidden">
<h3 id="tittel1"></h3>

<label>Stolpenr</label>
<input id="stolpe1">

<label>Skadehøyde over bakken (m)</label>
<input id="h1">

<label>Skadelengde (m)</label>
<input id="l1">

<label>Diameter på skadested (mm)</label>
<input id="d1">

<img id="img1">
<div id="felt1"></div>
</div>

<button onclick="toggle2()" id="btn2">Legg til skade 2</button>

<div id="skade2" class="hidden">
<h3 id="tittel2"></h3>

<label>Stolpenr</label>
<input id="stolpe2">

<label>Skadehøyde over bakken (m)</label>
<input id="h2">

<label>Skadelengde (m)</label>
<input id="l2">

<label>Diameter på skadested (mm)</label>
<input id="d2">

<img id="img2">
<div id="felt2"></div>
</div>

<button onclick="lagre()">Lagre mast</button>
<button onclick="lastCSV()">Last ned Excel</button>

<script>

const felt={
indre:["A (mm)","B (mm)","E (mm)"],
sirk:["A (mm)","B (mm)","C (mm)","D (mm)"],
soft:["A (mm)","B (mm)","C (mm)","D (mm)"],
spett:["A (mm)","B (mm)"],
hakk:["A (mm)","B (mm)","C (mm)","D (mm)"],
sprekk:[
"Start (m over bakken)",
"Slutt (m over bakken)",
"A = Sprekkdybde (mm)",
"B = Sprekkbredde (mm)",
"Antall sprekker (stk)",
"Reststyrke 30 N/mm²",
"Reststyrke 40 N/mm²",
"Beskrivelse av sprekk"
]
};

function lagFelt(type,id,p){
let d=document.getElementById(id);
d.innerHTML="";

felt[type].forEach(f=>{
d.innerHTML+=`
<label>${f}</label>
<input id="${p}_${f}">
`;
});
}

function velg(type){
skade1.classList.remove("hidden");
tittel1.innerText=type+" 1";
tittel2.innerText=type+" 2";

lagFelt(type,"felt1","s1");
lagFelt(type,"felt2","s2");

img1.style.display="block";
if(type==="indre") img1.src="indre.svg";
else if(type==="sirk") img1.src="sirk.svg";
else img1.src=type+".svg";
}

function hent(prefix){
let r={};
document.querySelectorAll(`[id^=${prefix}_]`).forEach(i=>{
r[i.id.split("_")[1]]=i.value;
});
return r;
}

function toggle2(){
skade2.classList.toggle("hidden");
}

let data=[];

function lagre(){
let base={
netteier:netteier.value,
linje:linje.value,
mast:mast.value
};

if(stolpe1.value){
data.push({
...base,
stolpe:stolpe1.value,
hoyde:h1.value,
lengde:l1.value,
diameter:d1.value,
type:tittel1.innerText,
...hent("s1")
});
}

if(stolpe2.value){
data.push({
...base,
stolpe:stolpe2.value,
hoyde:h2.value,
lengde:l2.value,
diameter:d2.value,
type:tittel2.innerText,
...hent("s2")
});
}

alert("Lagret");
}

function lastCSV(){
let csv=Object.keys(data[0]||{}).join(",")+"\n";
data.forEach(d=>{csv+=Object.values(d).join(",")+"\n";});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="stolpekontroll.csv";
a.click();
}

</script>

</body>
</html>
