<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<!-- IKON -->
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  padding: 10px;
}

h2 {
  margin-bottom: 5px;
}

.section {
  background: #fff;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
}

label {
  font-weight: 700;
  color: #000;
  display: block;
  margin-top: 10px;
  font-size: 15px;
}

input, select {
  width: 100%;
  padding: 11px;
  margin-top: 4px;
  border: 2px solid #999;
  border-radius: 6px;
  font-size: 16px;
  color: #000;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2e7d32;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}

img {
  width: 100%;
  max-height: 220px;
  object-fit: contain;
  margin-top: 10px;
  border-radius: 6px;
  background: #fafafa;
}
</style>
</head>

<body>

<h2>Stolpekontroll</h2>

<div class="section">
<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
<label>Stolpenr</label><input id="stolpe">
<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Jordbanddiameter (mm)</label><input id="jord">

<label>Klima</label>
<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select id="jordtype">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<label>Sikkerhetsfaktor</label>
<select id="sf">
<option>1</option>
<option>1.5</option>
<option>2</option>
</select>

</div>

<div class="section">
<h3>Skade</h3>

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte (ABE)</option>
<option>Sirkulær råte (ABCD)</option>
<option>Softråte (ABCD)</option>
<option>Spettsmie (AB)</option>
<option>Hakkespetthull (ABCD)</option>
</select>

<button onclick="visBilde()">Vis bilde</button>
<img id="bilde" style="display:none">

<label>Diameter skadested (mm)</label>
<input id="diam">

<label>Skadehøyde (m)</label>
<input id="sh">

<div id="felter"></div>

<button onclick="leggTil()">Legg til skade</button>

</div>

<button onclick="lastNed()">Last ned CSV</button>

<script>

let skader = [];

function oppdaterFelter() {
  let t = type.value;
  let f = document.getElementById("felter");

  if (t.includes("ABE")) {
    f.innerHTML = `
      <label>A</label><input id="A">
      <label>B</label><input id="B">
      <label>E</label><input id="E">
    `;
  }

  else if (t.includes("ABCD")) {
    f.innerHTML = `
      <label>A</label><input id="A">
      <label>B</label><input id="B">
      <label>C</label><input id="C">
      <label>D</label><input id="D">
    `;
  }

  else {
    f.innerHTML = `
      <label>A</label><input id="A">
      <label>B</label><input id="B">
    `;
  }
}

function visBilde() {
  let img = document.getElementById("bilde");
  let t = type.value;

  if (t.includes("Indre")) img.src = "indre.svg";
  else if (t.includes("Sirkulær")) img.src = "sirk.svg";
  else if (t.includes("Softråte")) img.src = "soft.svg";
  else if (t.includes("Spettsmie")) img.src = "spett.svg";
  else if (t.includes("Hakkespetthull")) img.src = "hakk.svg";

  img.style.display = "block";
}

function leggTil() {

  let obj = {
    netteier: netteier.value,
    linje: linje.value,
    mast: mast.value,
    stolpe: stolpe.value,
    hoyde: hoyde.value,
    jord: jord.value,
    klima: klima.value,
    jordtype: jordtype.value,
    sf: sf.value,
    type: type.value,
    diam: diam.value,
    sh: sh.value,
    A: document.getElementById("A")?.value || "",
    B: document.getElementById("B")?.value || "",
    C: document.getElementById("C")?.value || "",
    D: document.getElementById("D")?.value || "",
    E: document.getElementById("E")?.value || ""
  };

  skader.push(obj);
  alert("Skade registrert");
}

function lastNed() {

  let csv = "Netteier,Linje,Mast,Stolpe,Høyde,Jord,Klima,Jordsmonn,SF,Type,Diameter,Skadehøyde,A,B,C,D,E\n";

  skader.forEach(s => {
    csv += `${s.netteier},${s.linje},${s.mast},${s.stolpe},${s.hoyde},${s.jord},${s.klima},${s.jordtype},${s.sf},${s.type},${s.diam},${s.sh},${s.A},${s.B},${s.C},${s.D},${s.E}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stolpekontroll.csv";
  a.click();
}

oppdaterFelter();

</script>

</body>
</html>
