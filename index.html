<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }

.section { background:#fff; padding:12px; margin-top:15px; border-radius:8px; }

label { font-weight:bold; display:block; margin-top:10px; }

input, select {
  width:100%;
  padding:10px;
  border:2px solid #999;
  border-radius:6px;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
  text-align:left;
}

.camBtn { background:#2e7d32; color:#fff; }
.saveBtn { background:#1565c0; color:#fff; }

img { width:100%; max-height:180px; object-fit:contain; margin-top:10px; }

#resultat { margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>Stolpekontroll v14.0</h2>

<div class="section">
<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">
<label>Stolpehøyde (m)</label><input id="hoyde" oninput="oppdaterTotal()">
</div>

<div class="section">

<label>Type skade</label>
<select id="type" onchange="oppdaterFelter()">
<option>Indre råte (ABE)</option>
<option>Softråte (ABCD)</option>
<option>Sprekk (ABCH)</option>
</select>

<label>Diameter (mm)</label>
<input id="diam" oninput="beregn()">

<div id="felter"></div>

<input type="file" id="cam" accept="image/*" capture="environment" multiple style="display:none">
<button class="camBtn" onclick="cam.click()">📸 Ta bilde</button>

<div id="resultat"></div>

</div>

<button onclick="nesteMast()">➡️ Neste mast</button>
<button class="saveBtn" onclick="lagreMast()">💾 Lagre mast</button>

<script>

let beregninger = {};
let sistLagretMast = "";

// FELTER
function oppdaterFelter(){

let t = type.value;

if (t.includes("ABE")){
  felter.innerHTML = `
  <label>Skadehøyde (m)</label><input id="sh" oninput="beregn()">
  <label>A (mm)</label><input id="A" oninput="beregn()">
  <label>B (mm)</label><input id="B" oninput="beregn()">
  `;
}

if (t.includes("ABCD")){
  felter.innerHTML = `
  <label>Skadehøyde (m)</label><input id="sh" oninput="beregn()">
  <label>A</label><input id="A" oninput="beregn()">
  <label>B</label><input id="B" oninput="beregn()">
  <label>C</label><input id="C" oninput="beregn()">
  <label>D</label><input id="D" oninput="beregn()">
  `;
}

if (t.includes("Sprekk")){
  felter.innerHTML = `
  <label>Bredde A</label><input id="A">
  <label>Dybde B</label><input id="B">
  <label>Lengde C</label><input id="C">
  <label>Høyde H</label><input id="H">
  `;
}

}

// BEREGNING
function beregn(){

let D = parseFloat(diam.value);
let sh = parseFloat(document.getElementById("sh")?.value);
let hoyde = parseFloat(hoydeEl());

if (!D) return;

let rest = 100;

// INDRE
if (type.value.includes("Indre")){
let A = parseFloat(AEl());
let B = parseFloat(BEl());
if (A){
let rd = D - 2*(A + (B||0));
rest = Math.pow(rd/D,2)*100;
beregninger.indre = rest;
}
}

// SOFT
if (type.value.includes("Softråte")){
let vals = [AEl(),BEl(),CEl(),DEl()].map(x=>parseFloat(x)).filter(x=>!isNaN(x));
if (vals.length){
let red = vals.reduce((a,b)=>a+b)/vals.length;
let rd = D - 2*red;
rest = Math.pow(rd/D,2)*100;
beregninger.soft = rest;
}
}

oppdaterTotal();
}

// TOTAL + MOMENT
function oppdaterTotal(){

let vals = Object.values(beregninger);
if (!vals.length) return;

let min = Math.min(...vals);

let refSF = 2;
let SF = (min/100)*refSF;

let h = parseFloat(hoydeEl());
let sh = parseFloat(document.getElementById("sh")?.value);

let korrSF = SF;

if (h && sh){
korrSF = SF * (1 - (sh/h)*0.5);
}

let knekk = h ? (h*0.35).toFixed(1) : "-";

resultat.innerHTML = `
Rest: ${min.toFixed(0)}%<br>
SF: ${SF.toFixed(2)}<br>
Korr SF: ${korrSF.toFixed(2)}<br>
Knekkpunkt ca: ${knekk} m
`;

}

// HELPERS
function AEl(){return document.getElementById("A")?.value}
function BEl(){return document.getElementById("B")?.value}
function CEl(){return document.getElementById("C")?.value}
function DEl(){return document.getElementById("D")?.value}
function hoydeEl(){return document.getElementById("hoyde")?.value}

// LAGRING
function lagreMast(){
if (!mast.value) return alert("Mangler mast");
if (mast.value === sistLagretMast) return alert("Lagret");
sistLagretMast = mast.value;
alert("Lagret");
}

function nesteMast(){
lagreMast();
mast.value="";
document.querySelectorAll("input").forEach(i=>{
if(i.id!=="netteier"&&i.id!=="linje") i.value="";
});
}

oppdaterFelter();

</script>

</body>
</html>
