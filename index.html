<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v6.1</title>
  <link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
.small { font-size:12px; color:#444; }
</style>
</head>

<body>

<h2>Stolpekontroll</h2>

<!-- GRUNNLAG -->
<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="Linje">
<input id="mast" placeholder="Mast nr">
<input id="stolpenr" placeholder="Stolpenr">

<input type="number" id="diameter" placeholder="Diameter skadested (mm)">
<input type="number" id="hoyde" placeholder="Stolpehøyde (m)">
<input type="number" id="nedgraving" placeholder="Nedgravingsdybde (m)">
<input type="number" id="jordband" placeholder="Jordbåndsdiameter (mm)">

<select id="miljo">
<option value="1.2">Kyst</option>
<option value="1.0">Innland</option>
<option value="1.3">Fjellklima</option>
</select>

<select id="jord">
<option value="1.0">Innmark</option>
<option value="1.1">Skogsmark</option>
<option value="1.2">Fjell</option>
</select>

<select id="styrke">
<option value="30">30 N/mm²</option>
<option value="40">40 N/mm²</option>
</select>

</div>

<!-- FUKT -->
<div class="card">
<h3>Fukt</h3>

<label><input type="checkbox" id="fuktAktiv" onchange="toggleFukt()"> Aktiver fukt</label>

<div id="fuktFelter" style="display:none;">
<input type="number" id="temp" placeholder="Temperatur (°C)">
<input type="number" id="rf" placeholder="Relativ fukt (%)">
<input type="number" id="fuktYtre" placeholder="Fukt ytre (%)">
<input type="number" id="fuktIndre" placeholder="Fukt indre (%)">
</div>
</div>

<!-- SKADER -->
<div class="card">
<h3>Skade</h3>

<select id="type">
<option value="innvendig">Indre råte (A B E)</option>
<option value="sirkular">Sirkulær råte (A B C D)</option>
<option value="softråte">Softråte (A B C D)</option>
<option value="sprekk">Sprekk (A B)</option>
<option value="spettsmie">Spettsmie (A B)</option>
</select>

<input id="A" type="number" placeholder="A (mm)">
<input id="B" type="number" placeholder="B (mm)">
<input id="C" type="number" placeholder="C (mm)">
<input id="D" type="number" placeholder="D (mm)">
<input id="E" type="number" placeholder="E (mm)">

<input id="L" type="number" placeholder="Lengde (mm)">
<input id="H" type="number" placeholder="Skadehøyde (mm)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<!-- RESULTAT -->
<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
<div id="forklaring" class="small"></div>
</div>

<!-- EKSPORT -->
<div class="card">
<button onclick="excel()">Last ned Excel</button>
<button onclick="window.print()">Lag PDF</button>
</div>

<script>

let skader = [];

function toggleFukt() {
  document.getElementById("fuktFelter").style.display =
    document.getElementById("fuktAktiv").checked ? "block" : "none";
}

function leggTil() {

  let s = {
    type: type.value,
    A:+A.value, B:+B.value, C:+C.value, D:+D.value, E:+E.value,
    L:+L.value, H:+H.value
  };

  skader.push(s);

  liste.innerHTML += `<div>${s.type} | h=${s.H} mm | L=${s.L} mm</div>`;
}

function beregn() {

  let D = +diameter.value;
  let Htot = +hoyde.value;
  let ned = +nedgraving.value || 0.8;
  let sigma = +styrke.value;

  let miljoF = +miljo.value;
  let jordF = +jord.value;

  let H_eff = Htot - ned;

  let q = 0.6 * miljoF;
  let M_last = q * H_eff * H_eff * 1000;

  let d_eff = D;
  let faktor = 1;

  skader.forEach(s => {

    // INDRE RÅTE (E styrer)
    if (s.type === "innvendig" && s.E) {
      d_eff = s.E * 2;
    }

    // SIRKULÆR RÅTE (min ABCD)
    if (s.type === "sirkular") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length) d_eff = Math.min(...vals) * 2;
    }

    // SOFTRÅTE (maks ABCD)
    if (s.type === "softråte") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length) d_eff = D - Math.max(...vals);
    }

    // SPREKK AB
    if (s.type === "sprekk") {
      faktor *= 0.9;
    }

    // SPETTSMIE AB
    if (s.type === "spettsmie") {
      faktor *= 0.85;
    }

  });

  let W = (Math.PI * Math.pow(d_eff,3)) / 32;

  let sikkerhet = 1.2 * jordF;

  let M_kap = (sigma * W * faktor) / sikkerhet;

  let u = (M_last / M_kap) * 100;

  let status = u <= 100 ? "GODKJENT" :
               u <= 120 ? "KRITISK" : "IKKE GODKJENT";

  resultat.innerHTML =
    "Utnyttelse: " + u.toFixed(1) + "%<br>Status: " + status;

  forklaring.innerText =
    "Effektiv diameter: " + d_eff.toFixed(1) + " mm";
}

function excel() {

  let csv = "Stolpe,Type,A,B,C,D,E,L,H\n";

  skader.forEach(s=>{
    csv += `${stolpenr.value},${s.type},${s.A},${s.B},${s.C},${s.D},${s.E},${s.L},${s.H}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rapport.csv";
  a.click();
}

</script>

</body>
</html>
