<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
</style>
</head>

<body>

<h2>Stolpekontroll</h2>

<!-- GRUNNLAG -->
<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="Linjeidentifikasjon">
<input id="mast" placeholder="Mast nr">
<input id="stolpenr" placeholder="Stolpenr">

<input type="number" id="hoyde" placeholder="Stolpehøyde (m)">
<input type="number" id="nedgraving" placeholder="Nedgravingsdybde (m)">
<input type="number" id="jordband" placeholder="Jordbåndsdiameter (mm)">
<input type="number" id="diameter" placeholder="Diameter skadested (mm)">

<select id="miljo">
<option>Kyst</option>
<option>Innland</option>
<option>Fjellklima</option>
</select>

<select id="jord">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

</div>

<!-- SKADER -->
<div class="card">
<h3>Legg til skade</h3>

<select id="type">
<option value="innvendig">Innvendig råte</option>
<option value="sirkular">Sirkulær råte</option>
<option value="softråte">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spettsmie">Spettsmie</option>
</select>

<input type="number" id="A" placeholder="A (mm)">
<input type="number" id="B" placeholder="B (mm)">
<input type="number" id="C" placeholder="C (mm)">
<input type="number" id="D" placeholder="D (mm)">
<input type="number" id="E" placeholder="E (mm)">
<input type="number" id="hoydeskade" placeholder="Skadehøyde (mm)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>
</div>

<!-- BEREGNING -->
<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
</div>

<!-- EKSPORT -->
<div class="card">
<button onclick="excel()">Last ned Excel</button>
<button onclick="window.print()">Lag PDF</button>
</div>

<script>

let skader = [];

function leggTil() {
  let skade = {
    type: document.getElementById("type").value,
    A: parseFloat(A.value),
    B: parseFloat(B.value),
    C: parseFloat(C.value),
    D: parseFloat(D.value),
    E: parseFloat(E.value),
    h: parseFloat(hoydeskade.value)
  };

  skader.push(skade);

  document.getElementById("liste").innerHTML +=
    "<div>" + skade.type + " (h=" + skade.h + " mm)</div>";
}

function beregn() {
  let d = parseFloat(document.getElementById("diameter").value);
  let verste = 100;

  skader.forEach(s => {

    let rest = 100;

    if (s.type === "innvendig" && s.E) {
      rest = (s.E / (d/2)) * 100;
    }

    if (s.type === "sirkular") {
      let vals = [s.A, s.B, s.C, s.D].filter(v => v);
      if (vals.length > 0) {
        let min = Math.min(...vals);
        rest = (min / (d/2)) * 100;
      }
    }

    if (s.type === "softråte") {
      let vals = [s.A, s.B, s.C, s.D].filter(v => v);
      if (vals.length > 0) {
        let max = Math.max(...vals);
        rest = ((d - max) / d) * 100;
      }
    }

    if (s.type === "sprekk") {
      rest = 100 - ((s.B || 0) * 1.5);
    }

    if (s.type === "spettsmie") {
      rest = 100 - ((s.B || 0) * 2);
    }

    if (rest < verste) verste = rest;

  });

  let status = verste >= 75 ? "GODKJENT" : "IKKE GODKJENT";

  document.getElementById("resultat").innerHTML =
    "Restkapasitet: " + verste.toFixed(1) + "%<br>Status: " + status;
}

function excel() {
  let csv = "Stolpe,Type,A,B,C,D,E,Høyde\n";

  skader.forEach(s => {
    csv += stolpenr.value + "," + s.type + "," + s.A + "," + s.B + "," + s.C + "," + s.D + "," + s.E + "," + s.h + "\n";
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rapport.csv";
  a.click();
}

</script>

</body>
</html>
