<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v6 komplett</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
.small { font-size:12px; color:#444; }
</style>
</head>

<body>

<h2>Stolpekontroll v6</h2>

<!-- GRUNNLAG -->
<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="Linjeidentifikasjon">
<input id="mast" placeholder="Mast nr">
<input id="stolpenr" placeholder="Stolpenr">

<input type="number" id="diameter" placeholder="Diameter skadested (mm)">
<input type="number" id="jordband" placeholder="Jordbåndsdiameter (mm)">
<input type="number" id="hoyde" placeholder="Stolpehøyde (m)">
<input type="number" id="nedgraving" placeholder="Nedgravingsdybde (m)">

<select id="miljo">
<option value="1.2">Kyst</option>
<option value="1.0">Innland</option>
<option value="1.3">Fjellklima</option>
</select>

<select id="jord">
<option value="1.0">Innmark</option>
<option value="1.1">Skogsmark</option>
<option value="1.2">Fjell</option>
</select>

<select id="styrke">
<option value="30">30 N/mm²</option>
<option value="40">40 N/mm²</option>
</select>

</div>

<!-- SKADER -->
<div class="card">
<h3>Skader</h3>

<select id="type">
<option value="innvendig">Innvendig råte</option>
<option value="sirkular">Sirkulær råte</option>
<option value="softråte">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spettsmie">Spettsmie</option>
</select>

<input id="A" type="number" placeholder="A (mm)">
<input id="B" type="number" placeholder="B (mm)">
<input id="C" type="number" placeholder="C (mm)">
<input id="D" type="number" placeholder="D (mm)">
<input id="E" type="number" placeholder="E (mm)">
<input id="L" type="number" placeholder="Lengde (mm)">
<input id="H" type="number" placeholder="Skadehøyde (mm)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<!-- RESULTAT -->
<div class="card">
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
<div id="forklaring" class="small"></div>
</div>

<script>

let skader = [];

function leggTil() {
  let s = {
    type: type.value,
    A: +A.value,
    B: +B.value,
    C: +C.value,
    D: +D.value,
    E: +E.value,
    L: +L.value,
    H: +H.value
  };

  skader.push(s);
  liste.innerHTML += `<div>${s.type} (h=${s.H||0} mm)</div>`;
}

function beregn() {

  let D = +diameter.value;
  let H = +hoyde.value;
  let ned = +nedgraving.value;
  let sigma = +styrke.value;

  if (!D || !H) return alert("Mangler data");

  let miljoF = +miljo.value;
  let jordF = +jord.value;

  // Effektiv høyde (momentarm)
  let H_eff = H - (ned || 0.8);

  // LASTMODELL
  let q_vind = 0.6 * miljoF;
  let q_is = 0.3 * miljoF;

  let M_vind = q_vind * H_eff * H_eff;
  let M_is = q_is * H_eff * H_eff;

  let M_last = (M_vind + M_is) * 1000;

  // SKADE → effektiv diameter
  let d_eff = D;
  let faktor = 1;

  skader.forEach(s => {

    if (s.type === "softråte") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let max = Math.max(...vals);
        d_eff = D - max;
      }
    }

    if (s.type === "sirkular") {
      let vals = [s.A,s.B,s.C,s.D].filter(v=>v);
      if (vals.length){
        let min = Math.min(...vals);
        d_eff = min * 2;
      }
    }

    if (s.type === "innvendig" && s.E) {
      d_eff = s.E * 2;
    }

    if (s.type === "sprekk") faktor *= 0.9;
    if (s.type === "spettsmie") faktor *= 0.85;

  });

  // KAPASITET
  let W = (Math.PI * Math.pow(d_eff,3)) / 32;

  let sikkerhet = 1.2 * jordF;

  let M_kap = (sigma * W * faktor) / sikkerhet;

  let u = (M_last / M_kap) * 100;

  let status = "";
  if (u <= 100) status = "GODKJENT";
  else if (u <= 120) status = "KRITISK";
  else status = "IKKE GODKJENT";

  resultat.innerHTML =
    "Utnyttelse: " + u.toFixed(1) + "%<br>Status: " + status;

  forklaring.innerText =
    "Effektiv høyde: " + H_eff.toFixed(2) +
    " m | Effektiv diameter: " + d_eff.toFixed(1) +
    " mm | Sikkerhetsfaktor: " + sikkerhet.toFixed(2);

}

</script>

</body>
</html>
