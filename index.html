<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v2.7</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.container {
    max-width:420px;
    margin:auto;
    background:white;
    padding:12px;
}

h2 {
    text-align:center;
}

label {
    font-weight:bold;
    display:block;
    margin-top:8px;
}

input {
    width:100%;
    padding:10px;
    margin-top:4px;
    font-size:16px;
}

button {
    width:100%;
    padding:12px;
    margin-top:6px;
    font-size:16px;
    border:none;
    border-radius:6px;
}

.green {
    background:#2e7d32;
    color:white;
}

.choice {
    background:#2e7d32;
    color:white;
    padding:12px;
    text-align:center;
    margin-top:6px;
    border-radius:6px;
}

.hidden {
    display:none;
}

.grid button {
    width:100%;
    margin-top:5px;
}

img {
    width:100%;
    max-width:150px;
    display:block;
    margin:auto;
}
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v2.7</h2>

<!-- GRUNNLAG -->
<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>GPS</label>
<input id="gps" readonly>

<button class="green" onclick="startGPS()">Slå på GPS</button>
<button class="green" onclick="stopGPS()">Slå av GPS</button>

<label>Stolpehøyde (m)</label>
<input id="hoyde">

<label>Jordband (mm)</label>
<input id="jordband">

<label>Nedgravd (m)</label>
<input id="nedgravd">

<!-- JORD -->
<label>Jordsmonn</label>
<div class="choice" onclick="toggle('jordvalg')" id="jordValg">Skogsmark</div>

<div id="jordvalg" class="hidden grid">
    <button onclick="setValg('jordValg','Innmark')">Innmark</button>
    <button onclick="setValg('jordValg','Fjell')">Fjell</button>
</div>

<!-- KLIMA -->
<label>Klima</label>
<div class="choice" onclick="toggle('klimavalg')" id="klimaValg">Kyst</div>

<div id="klimavalg" class="hidden grid">
    <button onclick="setValg('klimaValg','Innland')">Innland</button>
    <button onclick="setValg('klimaValg','Fjell')">Fjell</button>
</div>

<!-- LAST -->
<label>Vertikallast</label>
<div class="choice" onclick="toggle('lastvalg')" id="lastValg">Normal</div>

<div id="lastvalg" class="hidden grid">
    <button onclick="setValg('lastValg','Lav')">Lav</button>
    <button onclick="setValg('lastValg','Høy')">Høy</button>
</div>

<button class="green" onclick="nyMast()">Ny mast</button>

<!-- SKADE -->
<h3>Indre råte</h3>

<label>Stolpenr</label>
<input id="stolpenr">

<label>Skadehøyde (m)</label>
<input id="skadeh">

<label>Diameter skadested (mm)</label>
<input id="diameter">

<label>A (mm)</label>
<input id="A">

<label>E (mm)</label>
<input id="E">

<img src="indre.svg">

<label>Merknad</label>
<input id="merknad">

<button class="green" onclick="lagre()">Lagre mast</button>
<button class="green" onclick="lastned()">Last ned CSV</button>

</div>

<script>

// GPS
let gpsWatch = null;

function startGPS(){
    if(navigator.geolocation){
        gpsWatch = navigator.geolocation.watchPosition(function(pos){
            let lat = pos.coords.latitude.toFixed(6);
            let lon = pos.coords.longitude.toFixed(6);
            document.getElementById("gps").value = lat + ", " + lon;
        });
    } else {
        alert("GPS støttes ikke");
    }
}

function stopGPS(){
    if(gpsWatch){
        navigator.geolocation.clearWatch(gpsWatch);
        gpsWatch = null;
    }
}

// Toggle valg
function toggle(id){
    let el = document.getElementById(id);
    el.classList.toggle("hidden");
}

function setValg(id,val){
    document.getElementById(id).innerText = val;
    document.getElementById(id.replace("Valg","valg")).classList.add("hidden");
}

// Ny mast
function nyMast(){
    document.querySelectorAll("input").forEach(i=>{
        if(i.id !== "netteier" && i.id !== "linje"){
            i.value="";
        }
    });
}

// Lagre
let data = [];

function lagre(){
    let row = [
        document.getElementById("netteier").value,
        document.getElementById("linje").value,
        document.getElementById("mast").value,
        document.getElementById("gps").value,
        document.getElementById("hoyde").value,
        document.getElementById("jordband").value,
        document.getElementById("nedgravd").value,
        document.getElementById("jordValg").innerText,
        document.getElementById("klimaValg").innerText,
        document.getElementById("lastValg").innerText,
        document.getElementById("stolpenr").value,
        document.getElementById("skadeh").value,
        document.getElementById("diameter").value,
        document.getElementById("A").value,
        document.getElementById("E").value,
        document.getElementById("merknad").value
    ];

    data.push(row);
    alert("Lagret");
}

// CSV
function lastned(){
    let csv = "Netteier,Linje,Mast,GPS,Høyde,Jordband,Nedgravd,Jord,Klima,Last,Stolpe,Skadeh,Diameter,A,E,Merknad\n";

    data.forEach(r=>{
        csv += r.join(",") + "\n";
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stolper.csv";
    a.click();
}

</script>

</body>
</html>
