<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.5.1 (REN)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {font-family: Arial; background:#f4f4f4; padding:10px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select {width:100%; padding:8px; margin:4px 0;}
button {background:#2e7d32; color:white; padding:12px; width:100%; border:none; margin-top:10px;}

.popup {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.popup img {max-width:90%; max-height:90%; background:white;}
</style>
</head>

<body>

<h2>Stolpekontroll v10.5.1 (REN)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">

<select id="jordsmonn">
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<select id="sf">
<option value="1">Sikkerhetsfaktor 1.0</option>
<option value="1.5">Sikkerhetsfaktor 1.5</option>
<option value="2">Sikkerhetsfaktor 2.0</option>
</select>

</div>

<div class="card">
<h3>Skader</h3>

<select id="skadetype" onchange="visFelter()">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<label>
<input type="checkbox" onchange="visBilde(this)"> Vis målebilde
</label>

<div id="felter"></div>

<input id="lengde" placeholder="Lengde skade (mm)">
<input id="hSkade" placeholder="Skadehøyde over bakken (m)">

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>

</div>

<button onclick="beregn()">Beregn</button>
<button onclick="lagCSV()">Excel</button>
<button onclick="lagPDF()">PDF</button>

<h3 id="resultat"></h3>

<div id="popup" class="popup" onclick="this.style.display='none'">
<img id="popupimg">
</div>

<script>

let skader=[];

function visFelter(){
let t=skadetype.value;
let f=document.getElementById("felter");

if(t==="indre"){
f.innerHTML = input("A (mm)") + input("B (mm)") + input("E (mm)");
}
else if(t==="sirk"||t==="soft"){
f.innerHTML = input("A (mm)") + input("B (mm)") + input("C (mm)") + input("D (mm)");
}
else if(t==="sprekk"||t==="spett"){
f.innerHTML = input("A (mm)") + input("B (mm)");
}
else{
f.innerHTML="";
}
}

function input(label){
return `<input class="skade" placeholder="${label}">`;
}

function leggTil(){

let vals=[];
document.querySelectorAll(".skade").forEach(i=>{
vals.push(parseFloat(i.value)||0);
});

skader.push(vals);
oppdaterListe();
}

function oppdaterListe(){
let html="";
skader.forEach((s,i)=>{
html += "Skade "+(i+1)+"<br>";
});
liste.innerHTML=html;
}

function visBilde(el){

if(!el.checked){
popup.style.display="none";
return;
}

let map={
indre:"indre.svg",
sirk:"sirk.svg",
soft:"soft.svg",
sprekk:"sprekk.svg",
spett:"spett.svg"
};

popupimg.src = map[skadetype.value];
popup.style.display="flex";
}

function beregn(){

let d=parseFloat(diameter.value)||0;
let sf=parseFloat(document.getElementById("sf").value);

let lavest=100;

skader.forEach(s=>{
let snitt = s.reduce((a,b)=>a+b,0)/s.length;
let rest=(d-snitt)/d*100;
if(rest<lavest) lavest=rest;
});

let status = lavest<75 ? "IKKE GODKJENT" : "OK";

if(sf<1) status="IKKE GODKJENT (SF<1)";

resultat.innerHTML =
"Restkapasitet: "+lavest.toFixed(1)+" %<br>Status: "+status;
}

function lagCSV(){

let text = netteier.value+";"+linje.value+";"+resultat.innerText;

let blob=new Blob([text]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="rapport.csv";
a.click();

reset();
}

function lagPDF(){
window.print();
reset();
}

function reset(){

let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");

netteier.value=n;
linje.value=l;

skader=[];
oppdaterListe();
resultat.innerHTML="";
}

</script>

</body>
</html>
