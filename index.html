<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v14.6</title>

<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.section { background:#fff; padding:12px; margin-top:15px; border-radius:8px; }
label { display:block; margin-top:6px; font-weight:bold; }
input { width:100%; padding:8px; margin-top:3px; }
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#2e7d32;
  color:white;
  border:none;
}
.blokk {
  background:#eef;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v14.6</h2>

<div class="section">

<label>Skadetype</label>
<select id="type" onchange="vis()">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
<option>Spettsmie</option>
</select>

<div id="innhold"></div>

</div>

<script>

function vis(){

let t = document.getElementById("type").value;
let bilde = "";

if(t==="Indre råte") bilde="indre.svg";
if(t==="Sirkulær råte") bilde="sirk.svg";
if(t==="Softråte") bilde="soft.svg";
if(t==="Sprekk") bilde="sprekk.svg";
if(t==="Spettsmie") bilde="spett.svg";

let html = `
<img src="${bilde}" width="120">

<div id="reg1" class="blokk">
<b>Registrering 1</b>

Høyde (m)
<input>

Diameter (mm)
<input>
`;

// FELTER
if(t==="Indre råte"){
html+=`A<input>B<input>E<input>`;
}

if(t==="Sirkulær råte"){
html+=`A<input>B<input>C<input>D<input>`;
}

if(t==="Sprekk"){
html+=`A bredde<input>B dybde<input>C lengde<input>`;
}

if(t==="Spettsmie"){
html+=`A<input>B<input>`;
}

if(t==="Softråte"){
html+=`Tykkelse<input>`;
}

html+=`</div>`;

// ekstra kun hvis ikke softråte
if(t!=="Softråte"){
html+=`
<button onclick="ekstra()">Ekstra registrering</button>
<div id="ekstra"></div>`;
}

document.getElementById("innhold").innerHTML = html;

}

function ekstra(){

let t = document.getElementById("type").value;

let html = `
<div class="blokk">
<b>Registrering 2</b>

Høyde (m)
<input>

Diameter (mm)
<input>
`;

if(t==="Indre råte"){
html+=`A<input>B<input>E<input>`;
}

if(t==="Sirkulær råte"){
html+=`A<input>B<input>C<input>D<input>`;
}

if(t==="Sprekk"){
html+=`A bredde<input>B dybde<input>C lengde<input>`;
}

if(t==="Spettsmie"){
html+=`A<input>B<input>`;
}

html+=`</div>`;

document.getElementById("ekstra").innerHTML = html;

}

vis();

</script>

</body>
</html>
