<script>

// GLOBAL DATA
let excelData = [];

// LAGRE MAST (OPPDATERT)
function lagre(){

let base = {
netteier: netteier.value,
linje: linje.value,
mast: mast.value,
gps: gps.value,
dato: new Date().toLocaleString()
};

// SKADE 1
if(stolpe1.value){
excelData.push({
...base,
stolpe: stolpe1.value,
skadeNr: 1,
type: tittel1.innerText
});
}

// SKADE 2
if(stolpe2.value){
excelData.push({
...base,
stolpe: stolpe2.value,
skadeNr: 2,
type: tittel2.innerText
});
}

alert("Mast lagret i Excel-data");
}


// EKSPORT EXCEL PRO
function lastCSV(){

let csv =
"Netteier,LinjeID,Mastnr,Stolpenr,Skadetype,SkadeNr,GPS,Dato\n";

excelData.forEach(d=>{
csv += `${d.netteier},${d.linje},${d.mast},${d.stolpe},${d.type},${d.skadeNr},${d.gps},${d.dato}\n`;
});

// LAST NED
let blob = new Blob([csv], {type:"text/csv"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = (linje.value || "stolpekontroll") + ".csv";
a.click();

}

</script>
