<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v10.4.2 (REN)</title>

<link rel="apple-touch-icon" href="Knapp.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }

.popup {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}
.popup img { max-width:90%; max-height:90%; background:white; }
</style>
</head>

<body>

<h2>Stolpekontroll v10.4.2 (REN)</h2>

<div class="card">
<h3>Grunnlag</h3>

<input id="netteier" placeholder="Netteier">
<input id="linje" placeholder="LinjeID">
<input id="mast" placeholder="Mast nr">
<input id="stolpe" placeholder="Stolpenr">

<input id="diameter" type="number" placeholder="Diameter skadested (mm)">
<input id="hoyde" type="number" placeholder="Stolpehøyde (m)">

<select id="fiber">
<option value="30">Fiberstyrke 30</option>
<option value="40">Fiberstyrke 40</option>
</select>

<select id="sf">
<option value="1.5">SF 1.5</option>
<option value="1.2">SF 1.2</option>
<option value="1.0">SF 1.0</option>
</select>

<select id="vind">
<option value="1">Lav vind</option>
<option value="1.5">Middels vind</option>
<option value="2">Høy vind</option>
</select>

<select id="is">
<option value="1">Ingen is</option>
<option value="1.3">Litt is</option>
<option value="1.6">Mye is</option>
</select>

</div>

<div class="card">
<h3>Skader</h3>

<select id="skadetype" onchange="oppdaterSkade()">
<option value="">Velg skade</option>
<option value="indre">Indre råte (ABE)</option>
<option value="sirk">Sirkulær råte (ABCD)</option>
<option value="soft">Softråte (ABCD)</option>
<option value="sprekk">Sprekk (AB)</option>
<option value="spett">Spettsmie (AB)</option>
</select>

<label>
<input type="checkbox" onchange="toggleBilde(this)">
 Vis målebilde
</label>

<div id="felter"></div>

<input id="lengde" placeholder="Lengde skade (mm)">
<input id="hSkade" placeholder="Skadehøyde over bakken (m)">

</div>

<button onclick="beregn()">Beregn</button>

<h3 id="resultat"></h3>

<div id="popup" class="popup" onclick="this.style.display='none'">
<img id="popupimg">
</div>

<script>

function oppdaterSkade(){

let type = document.getElementById("skadetype").value;
let f = document.getElementById("felter");

let html = "";

if(type==="indre"){
html += input("A (mm)");
html += input("B (mm)");
html += input("E restskall (mm)");
}

if(type==="sirk" || type==="soft"){
html += input("A (mm)");
html += input("B (mm)");
html += input("C (mm)");
html += input("D (mm)");
}

if(type==="sprekk" || type==="spett"){
html += input("A (mm)");
html += input("B (mm)");
}

f.innerHTML = html;
}

function input(label){
return `<input class="skade" placeholder="${label}">`;
}

function toggleBilde(el){

if(!el.checked){
document.getElementById("popup").style.display="none";
return;
}

let type = document.getElementById("skadetype").value;

let map = {
indre:"Innvendig_raate.svg",
sirk:"Sirkulaer_raate.svg",
soft:"Softraate.svg",
sprekk:"Sprekk.svg",
spett:"Spettsmie.svg"
};

if(map[type]){
document.getElementById("popupimg").src = map[type];
document.getElementById("popup").style.display="flex";
}
}

function beregn(){

let d = parseFloat(diameter.value)||0;
let h = parseFloat(hoyde.value)||0;

let fiber = parseFloat(document.getElementById("fiber").value);
let sf = parseFloat(document.getElementById("sf").value);
let vind = parseFloat(document.getElementById("vind").value);
let is = parseFloat(document.getElementById("is").value);

let inputs = document.querySelectorAll(".skade");
let vals = [];

inputs.forEach(i=>{
let v=parseFloat(i.value);
if(v>0) vals.push(v);
});

let rest = 1;

if(vals.length){
let snitt = vals.reduce((a,b)=>a+b,0)/vals.length;
rest = (d - snitt)/d;
}

let d_eff = d * rest;
let W = Math.PI * Math.pow(d_eff,3) / 32;
let M_kap = (fiber * W) / sf;

let last = (0.6* vind + 0.3*is);

let maxM=0;
let knekk=0;

for(let x=0;x<=h;x+=0.5){
let M = last * x * (h-x);
if(M>maxM){
maxM=M;
knekk=x;
}
}

let SF = M_kap / maxM;
let status = SF < 1 ? "IKKE GODKJENT" : "GODKJENT";

resultat.innerHTML =
"Restkapasitet: "+(rest*100).toFixed(1)+"%<br>"+
"Sikkerhetsfaktor: "+SF.toFixed(2)+"<br>"+
"Knekkpunkt: "+knekk.toFixed(1)+" m<br>"+
"Status: "+status;

}

</script>

</body>
</html>
