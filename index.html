<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v2.9</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0;}
.container {max-width:420px; margin:auto; padding:10px; background:white;}

label {font-weight:bold; display:block; margin-top:8px;}
input {width:100%; padding:10px; margin-top:4px;}

button {
width:100%;
padding:12px;
margin-top:6px;
font-size:16px;
border:none;
border-radius:6px;
background:#2e7d32;
color:white;
}

.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

img {
width:40%;
display:block;
margin:auto;
}

.hidden {display:none;}
.section {margin-top:12px;}
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v2.9</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>GPS</label>
<input id="gps" readonly>

<button onclick="startGPS()">Slå på GPS</button>
<button onclick="stopGPS()">Slå av GPS</button>

<!-- SKADEKNAPPER -->
<h3>Registrer skade</h3>

<div class="grid">
<button onclick="visSkade('indre')">Indre råte</button>
<button onclick="visSkade('sirk')">Sirkulær råte</button>

<button onclick="visSkade('soft')">Softråte</button>
<button onclick="visSkade('spett')">Spettsmie</button>

<button onclick="visSkade('hakk')">Hakkespetthull</button>
<button onclick="visSkade('sprekk')">Sprekk</button>
</div>

<!-- SKADE 1 -->
<div class="section">
<h3>Skade 1</h3>

<img id="img1">

<label>A</label><input id="A1">
<label>B</label><input id="B1">
<label>E</label><input id="E1">

</div>

<!-- NY SKADE -->
<button onclick="visSkade2()">Ny skade (2)</button>

<!-- SKADE 2 -->
<h3 id="skade2Tittel" class="hidden">Skade 2</h3>
<div id="skade2" class="hidden section">

<img id="img2">

<label>A</label><input id="A2">
<label>B</label><input id="B2">
<label>E</label><input id="E2">

</div>

<label>Merknad</label>
<input id="merknad">

<button onclick="lagre()">Lagre mast</button>
<button onclick="nyMast()">Ny mast</button>
<button onclick="lastnedExcel()">Last ned Excel</button>

</div>

<script>

// VIS SKADE
function visSkade(type){
    document.getElementById("img1").src = type + ".svg";
    document.getElementById("img2").src = type + ".svg";
}

// VIS SKADE 2
function visSkade2(){
    document.getElementById("skade2").classList.remove("hidden");
    document.getElementById("skade2Tittel").classList.remove("hidden");
}

// GPS
let gpsWatch = null;

function startGPS(){
    if(navigator.geolocation){
        gpsWatch = navigator.geolocation.watchPosition(function(pos){
            let lat = pos.coords.latitude.toFixed(6);
            let lon = pos.coords.longitude.toFixed(6);
            document.getElementById("gps").value = lat + ", " + lon;
        }, null, {enableHighAccuracy:true});
    }
}

function stopGPS(){
    if(gpsWatch){
        navigator.geolocation.clearWatch(gpsWatch);
        gpsWatch = null;
    }
}

// DATA
let data = [];

function lagre(){
    data.push({
        Netteier: netteier.value,
        LinjeID: linje.value,
        Mastnr: mast.value,
        GPS: gps.value,

        A1: A1.value,
        B1: B1.value,
        E1: E1.value,

        A2: A2.value,
        B2: B2.value,
        E2: E2.value,

        Merknad: merknad.value
    });

    alert("Lagret");
}

// NY MAST
function nyMast(){

    let n = netteier.value;
    let l = linje.value;

    document.querySelectorAll("input").forEach(i => i.value="");

    netteier.value = n;
    linje.value = l;

    document.getElementById("skade2").classList.add("hidden");
    document.getElementById("skade2Tittel").classList.add("hidden");
}

// EXCEL
function lastnedExcel(){

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Stolper");

    XLSX.writeFile(wb, "stolpekontroll.xlsx");
}

</script>

</body>
</html>
