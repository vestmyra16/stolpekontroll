<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v3.4</title>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:600px; margin:auto; padding:10px; background:white; }
label { font-weight:bold; display:block; margin-top:10px; }
input, select, textarea { width:100%; padding:10px; margin-top:5px; }
button { width:100%; padding:12px; margin-top:10px; background:#2e7d32; color:white; border:none; }
.result { background:#eef; padding:10px; margin-top:10px; }
</style>
</head>

<body>
<div class="container">

<h2>Stolpekontroll v3.4</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Jordbånddiameter (mm)</label><input id="jord">

<label>Mastetype</label>
<select id="mastetype">
<option>Enkel stolpe</option>
<option>A-mast</option>
<option>Bardunert</option>
</select>

<label>Vertikallast</label>
<select id="last">
<option>Lav</option>
<option selected>Normal</option>
<option>Høy</option>
</select>

<label>Klima</label>
<select id="klima">
<option>Fjell</option>
<option selected>Innland</option>
<option>Kyst</option>
</select>

<label>Jordsmonn</label>
<select id="jordtype">
<option>Fjell</option>
<option selected>Skogsmark</option>
<option>Innmark</option>
</select>

<h3>Indre råte</h3>

<label>Stolpenr</label><input id="stnr">
<label>Skade starter (m)</label><input id="start">
<label>Skade slutter (m)</label><input id="slutt">

<label>Diameter på skadested (mm)</label><input id="diameter">
<label>A (mm)</label><input id="A">
<label>E (restskall mm)</label><input id="E">

<label>Lengde langs stolpen</label>
<select id="lengde">
<option value="kort">0 – 0,5 m (Kort)</option>
<option value="middels">0,5 – 2 m (Middels)</option>
<option value="lang">Over 2 m (Lang)</option>
</select>

<button onclick="beregn()">Beregn</button>

<div class="result" id="resultat"></div>

</div>

<script>

function beregn(){

let d = parseFloat(document.getElementById("diameter").value);
let E = parseFloat(document.getElementById("E").value);

let radius = d / 2;

// ✅ FELTKALIBRERT RESTSTYRKE
let rest = 100 * Math.pow((E / radius), 1.6);
if(rest > 100) rest = 100;

// ✅ SIKKERHETSFAKTOR
let sf30 = rest / 70;
let sf40 = rest / 85;

// 🔧 Justering for mastetype
let mastetype = document.getElementById("mastetype").value;
if(mastetype == "A-mast") sf30 *= 0.9;
if(mastetype == "Bardunert") sf30 *= 0.85;

// 🔧 Knekkpunkt-effekt (ca 1/3 høyde)
let start = parseFloat(document.getElementById("start").value);
let h = parseFloat(document.getElementById("hoyde").value);

let knekk = h * 0.3;

if(Math.abs(start - knekk) < 1){
    sf30 *= 0.9;
    sf40 *= 0.9;
}

// 🔧 Lengdeeffekt
let lengde = document.getElementById("lengde").value;

if(lengde == "middels") sf30 *= 0.9;
if(lengde == "lang") sf30 *= 0.75;

// 🌍 Levetid (miljø)
let klima = document.getElementById("klima").value;
let jord = document.getElementById("jordtype").value;

let levetid = 15;

if(rest < 70) levetid = 10;
if(rest < 60) levetid = 7;
if(rest < 50) levetid = 5;

if(klima == "Kyst") levetid -= 2;
if(jord == "Innmark") levetid -= 2;

if(levetid < 2) levetid = 2;

// 📊 RESULTAT
document.getElementById("resultat").innerHTML = `
Reststyrke: ${rest.toFixed(1)} %<br>
SF (30): ${sf30.toFixed(2)}<br>
SF (40): ${sf40.toFixed(2)}<br>
Restlevetid: ${levetid} år
`;

}

</script>

</body>
</html>
