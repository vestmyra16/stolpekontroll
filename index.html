<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
body{font-family:Arial;max-width:700px;margin:auto;padding:15px;background:#f5f5f5;}
h2{text-align:center;}
label{font-weight:bold;color:black;margin-top:12px;display:block;}
input,select{width:100%;padding:12px;margin-top:5px;border-radius:6px;border:1px solid #888;font-size:16px;}
button{width:100%;padding:14px;margin-top:10px;background:#1f7a1f;color:white;border:none;font-size:16px;border-radius:6px;}
.result{margin-top:15px;padding:15px;background:#e6f2ff;border-radius:6px;}
</style>
</head>

<body onload="sjekkTilgang()">

<h2>Stolpekontroll v9</h2>

<!-- IDENTIFIKASJON -->
<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Stolpenr</label>
<input id="stolpe">

<!-- GRUNNLAG -->
<label>Stolpehøyde (m)</label>
<input id="H" value="15">

<label>Nedgravingsdybde (m)</label>
<input id="ned" value="2">

<label>Diameter ved skadested (mm)</label>
<input id="D">

<label>Avtrapping (mm/m)</label>
<input id="k" value="7.5">

<label>Skadehøyde (m)</label>
<input id="x">

<!-- SKADE -->
<label>Skadetype</label>
<select id="type">
<option>Innvendig råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
<option>Spettsmie</option>
</select>

<label>Måling A (mm)</label>
<input id="A">

<label>Måling B (mm)</label>
<input id="B">

<label>Måling C (mm)</label>
<input id="C">

<label>Måling D (mm)</label>
<input id="D2">

<label>Måling E (mm)</label>
<input id="E">

<label>Lastnivå</label>
<select id="last">
<option>Lett</option>
<option selected>Normal</option>
<option>Høy</option>
</select>

<button onclick="beregn()">Beregn</button>
<button onclick="lagreData()">💾 Lagre mast</button>
<button onclick="lastNedExcel()">📄 Last ned Excel</button>
<button onclick="nyMast()">➕ Ny mast</button>

<div class="result" id="res"></div>

<script>

// 🔐 BESKYTTELSE
const KODE="stolpe2026";
const DAGER=60;

function sjekkTilgang(){

let start=localStorage.getItem("startDato");
let idag=new Date().getTime();

if(!start){
localStorage.setItem("startDato", idag);
}else{
let diff=(idag-start)/(1000*60*60*24);
if(diff>DAGER){
document.body.innerHTML="<h2>Tilgang utløpt</h2>";
return;
}
}

let input=prompt("Kode:");
if(input!==KODE){
document.body.innerHTML="<h2>Feil kode</h2>";
}
}

// 📊 LAGRING
let registreringer=[];

function lagreData(){

let rad=[
netteier.value,
linje.value,
mast.value,
stolpe.value,
type.value,
D.value,
A.value,
B.value,
C.value,
D2.value,
E.value,
x.value,
H.value,
ned.value,
last.value,
res.innerText
];

registreringer.push(rad);

alert("Mast lagret");
}

// 📄 EXCEL
function lastNedExcel(){

let header=[
"Netteier","Linje","Mast","Stolpe",
"Skadetype","Diameter","A","B","C","D","E",
"Skadehøyde","Høyde","Nedgraving","Last","Resultat"
];

let data=[header,...registreringer];

let csv=data.map(e=>e.join(";")).join("\n");

let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="stolpekontroll.csv";
link.click();
}

// 🧠 ENKEL REN-TENKNING
function beregn(){

let D=Number(document.getElementById("D").value);
let A=Number(document.getElementById("A").value);
let B=Number(document.getElementById("B").value);
let type=document.getElementById("type").value;

let rest=100;

if(type==="Softråte"){
let reduksjon=(2*A)/D;
rest=(1-reduksjon)*100;
}

if(type==="Innvendig råte"){
let reduksjon=(B/D);
rest=(1-reduksjon)*100;
}

if(type==="Sprekk"){
let reduksjon=(B/D)*0.5;
rest=(1-reduksjon)*100;
}

if(type==="Sirkulær råte"){
let reduksjon=(A/D);
rest=(1-reduksjon)*100;
}

let status="OK";
if(rest<75) status="UNDER KRAV";

document.getElementById("res").innerHTML=
"Restverdi: "+rest.toFixed(1)+"%<br>Status: "+status;
}

// 🔄 NY MAST
function nyMast(){

let n=netteier.value;
let l=linje.value;

document.querySelectorAll("input").forEach(i=>i.value="");
res.innerHTML="";

netteier.value=n;
linje.value=l;
}

</script>

</body>
</html>
