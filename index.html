<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v14.3</title>

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.section { background:#fff; padding:12px; margin-top:15px; border-radius:8px; }
label { display:block; margin-top:8px; font-weight:bold; }
input, select, textarea {
  width:100%; padding:10px; margin-top:3px;
  border:1px solid #999; border-radius:6px;
}
button {
  width:100%; padding:12px; margin-top:10px;
  background:#2e7d32; color:white;
  border:none; border-radius:6px;
}
.rad {
  background:#eef;
  padding:8px;
  margin-top:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v14.3</h2>

<!-- GRUNNLAGSDATA -->
<div class="section">

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Nedgravingsdybde (m)</label><input id="nedgrav">

<label>Jordbandsdiameter (mm)</label><input id="jorddiam">
<label>Diameter på skadested (mm)</label><input id="diam">

<label>Klima</label>
<select id="klima">
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select id="jord">
<option>Innmark</option>
<option>Skog</option>
<option>Fjell</option>
</select>

</div>

<!-- SKADE -->
<div class="section">

<h3>Registrer skade</h3>

<label>Skadetype</label>
<select id="type">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
<option>Spettsmie</option>
</select>

<div id="inputfelter"></div>

<button onclick="taBilde()">📸 Ta bilde</button>
<input type="file" id="kamera" accept="image/*" capture="environment" style="display:none;">

<label>Merknad</label>
<textarea id="merknad"></textarea>

<button onclick="leggTil()">➕ Ny skade på samme type</button>

<div id="liste"></div>

</div>

<button onclick="lastNed()">📄 Last ned Excel</button>

<script>

let skader = [];

function taBilde(){
 document.getElementById("kamera").click();
}

// DYNAMISKE FELTER
function oppdater(){

let t = document.getElementById("type").value;
let f = document.getElementById("inputfelter");

if(t==="Indre råte"){
 f.innerHTML=`
 A (mm)<input id="A">
 B (mm)<input id="B">
 E (mm)<input id="E">
 `;
}

if(t==="Sirkulær råte"){
 f.innerHTML=`
 A (mm)<input id="A">
 B (mm)<input id="B">
 C (mm)<input id="C">
 D (mm)<input id="D">
 `;
}

if(t==="Softråte"){
 f.innerHTML=`
 Tykkelse (mm)<input id="A">
 `;
}

if(t==="Sprekk"){
 f.innerHTML=`
 Bredde A (mm)<input id="A">
 Dybde B (mm)<input id="B">
 Lengde C (m)<input id="C">
 `;
}

if(t==="Spettsmie"){
 f.innerHTML=`
 Diameter (mm)<input id="A">
 Dybde (mm)<input id="B">
 `;
}

}

document.getElementById("type").onchange = oppdater;
oppdater();

// LEGG TIL SKADE
function leggTil(){

let t = document.getElementById("type").value;

// Softråte kun én
if(t==="Softråte"){
 skader = skader.filter(s => s.type !== "Softråte");
}

let bilde = document.getElementById("kamera").files[0];
let reader = new FileReader();

reader.onload = function(e){

let skade = {
 type:t,
 A:document.getElementById("A")?.value,
 B:document.getElementById("B")?.value,
 C:document.getElementById("C")?.value,
 D:document.getElementById("D")?.value,
 E:document.getElementById("E")?.value,
 merknad:document.getElementById("merknad").value,
 bilde:e.target.result
};

skader.push(skade);
vis();

};

if(bilde){
 reader.readAsDataURL(bilde);
}else{
 reader.onload({target:{result:""}});
}

}

// VIS
function vis(){

let html="<h4>Registrerte skader</h4>";

skader.forEach((s,i)=>{
 html+=`
 <div class="rad">
 ${i+1}. ${s.type} | A:${s.A} B:${s.B} C:${s.C}
 </div>
 `;
});

document.getElementById("liste").innerHTML=html;

}

// EXCEL
function lastNed(){

let csv="Type,A,B,C,D,E,Merknad\n";

skader.forEach(s=>{
 csv+=`${s.type},${s.A},${s.B},${s.C},${s.D},${s.E},${s.merknad}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="stolpekontroll.csv";
a.click();

}

</script>

</body>
</html>
