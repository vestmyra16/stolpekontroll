<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v14.6</title>

<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2e7d32">

<style>
body { font-family: Arial; max-width: 600px; margin:auto; padding:10px; }
input, select, textarea, button { width:100%; margin:5px 0; padding:8px; }
button { background:#2e7d32; color:white; border:none; }
h3 { margin-top:20px; }
img { border:1px solid #ccc; padding:4px; }
</style>
</head>

<body>

<h2>Stolpekontroll v14.6</h2>

<h3>Grunnlagsdata</h3>
<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<button onclick="nyMast()">Ny mast</button>

<h3>Registrer skade</h3>

<label>Skadetype</label>
<select id="skadetype" onchange="oppdaterBilde()">
  <option value="indre">Indre råte</option>
  <option value="sirk">Sirkulær råte</option>
  <option value="soft">Softråte</option>
  <option value="spett">Spettsmie</option>
  <option value="hakk">Hakkespetthull</option>
  <option value="sprekk">Sprekk</option>
</select>

<div id="skadeBilde">
  <img id="bilde" src="" width="80" onclick="visStortBilde()">
</div>

<label>Stolpenr</label>
<input id="stolpenr">

<label>Skadehøyde (m)</label>
<input id="hoyde" type="number">

<label>Diameter på skadested (mm)</label>
<input id="diameter" type="number">

<label>A (mm)</label>
<input id="A" type="number">

<label>B (mm)</label>
<input id="B" type="number">

<label>C (mm)</label>
<input id="C" type="number">

<label>D (mm)</label>
<input id="D" type="number">

<label>E (mm)</label>
<input id="E" type="number">

<label>Merknad</label>
<textarea id="merknad"></textarea>

<label>Ta bilde</label>
<input type="file" accept="image/*" capture="environment" multiple onchange="hentBilder(this)">

<button onclick="leggTilSkade()">Legg til skade</button>
<button onclick="lagreMast()">💾 Lagre mast</button>

<h3>Registrerte skader</h3>
<div id="liste"></div>

<script>

let skader = [];
let bilder = [];

function oppdaterBilde(){
  let type = document.getElementById("skadetype").value;
  let base = "https://vestmyra16.github.io/stolpekontroll/";

  let map = {
    indre: "indre.svg",
    sirk: "sirk.svg",
    soft: "soft.svg",
    spett: "spett.svg",
    hakk: "hakk.svg",
    sprekk: "sprekk.svg"
  };

  document.getElementById("bilde").src = base + map[type];
}

function visStortBilde(){
  let src = document.getElementById("bilde").src;
  let w = window.open("");
  w.document.write("<img src='"+src+"' style='width:100%'>");
}

function hentBilder(input){
  bilder = [];
  for (let file of input.files){
    const reader = new FileReader();
    reader.onload = function(e){
      bilder.push(e.target.result);
    }
    reader.readAsDataURL(file);
  }
}

function leggTilSkade(){
  let skade = {
    type: skadetype.value,
    stolpenr: stolpenr.value,
    hoyde: hoyde.value,
    diameter: diameter.value,
    A: A.value,
    B: B.value,
    C: C.value,
    D: D.value,
    E: E.value,
    merknad: merknad.value,
    bilder: [...bilder]
  };

  skader.push(skade);
  visListe();
}

function visListe(){
  let html = "";
  skader.forEach((s,i)=>{
    html += "<div style='border:1px solid #ccc;margin:5px;padding:5px'>";
    html += "<b>" + s.type + "</b> - Stolpe " + s.stolpenr + "<br>";
    html += "A:" + s.A + " B:" + s.B + " C:" + s.C + " D:" + s.D + " E:" + s.E + "<br>";
    html += s.merknad;
    html += "</div>";
  });
  document.getElementById("liste").innerHTML = html;
}

function lagreMast(){
  let mast = {
    netteier: netteier.value,
    linje: linje.value,
    skader: skader
  };

  localStorage.setItem("stolpe", JSON.stringify(mast));
  alert("Mast lagret!");
}

function nyMast(){
  skader = [];
  visListe();
  stolpenr.value="";
  hoyde.value="";
  diameter.value="";
  A.value="";
  B.value="";
  C.value="";
  D.value="";
  E.value="";
  merknad.value="";
}

oppdaterBilde();

</script>

</body>
</html>
