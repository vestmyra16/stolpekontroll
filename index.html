<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll v14.5</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
    background: white;
}

h2 {
    margin-top: 0;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    color: white;
    background: #2e7d32;
    font-size: 16px;
}

button.secondary {
    background: #555;
}

.skade-blokk {
    border-top: 2px solid #ccc;
    margin-top: 20px;
    padding-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Stolpekontroll v14.5</h2>

<h3>Grunnlagsdata</h3>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Stolpenr</label>
<input id="stolpe">

<label>Stolpehøyde (m)</label>
<input>

<label>Nedgravingsdybde (m)</label>
<input>

<label>Jordbåndsdiameter (mm)</label>
<input>

<label>Klima</label>
<select>
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select>
<option>Innmark</option>
<option>Skogsmark</option>
<option>Fjell</option>
</select>

<button class="secondary" onclick="nyMast()">Ny mast</button>

<div class="skade-blokk">

<h3>Registrer skade</h3>

<label>Skadetype</label>
<select id="type" onchange="visFelter()">
<option value="indre">Indre råte</option>
<option value="sirk">Sirkulær råte</option>
<option value="soft">Softråte</option>
<option value="sprekk">Sprekk</option>
<option value="spett">Spettsmie</option>
</select>

<label>Skadehøyde over bakken (m)</label>
<input>

<label>Diameter på skadested (mm)</label>
<input>

<div id="felter"></div>

<label>Merknad</label>
<textarea></textarea>

<button onclick="leggTil()">Legg til skade</button>

</div>

<h3>Registrerte skader</h3>
<ul id="liste"></ul>

<button onclick="lastNed()">Last ned Excel</button>

</div>

<script>

function visFelter() {
    let type = document.getElementById("type").value;
    let f = document.getElementById("felter");

    if (type === "indre") {
        f.innerHTML = `
        <label>A (mm)</label><input>
        <label>B (mm)</label><input>
        <label>E (mm)</label><input>`;
    }

    if (type === "sirk") {
        f.innerHTML = `
        <label>A (mm)</label><input>
        <label>B (mm)</label><input>
        <label>C (mm)</label><input>
        <label>D (mm)</label><input>`;
    }

    if (type === "soft") {
        f.innerHTML = `
        <label>Softråte tykkelse (mm)</label><input>`;
    }

    if (type === "sprekk") {
        f.innerHTML = `
        <label>A bredde (mm)</label><input>
        <label>B dybde (mm)</label><input>`;
    }

    if (type === "spett") {
        f.innerHTML = `
        <label>A (mm)</label><input>
        <label>B (mm)</label><input>
        <label>Retning</label><input>`;
    }
}

visFelter();

function leggTil() {
    let li = document.createElement("li");
    li.innerText = document.getElementById("type").value;
    document.getElementById("liste").appendChild(li);
}

function nyMast() {
    let netteier = document.getElementById("netteier").value;
    let linje = document.getElementById("linje").value;

    document.querySelectorAll("input, textarea").forEach(e => e.value = "");

    document.getElementById("netteier").value = netteier;
    document.getElementById("linje").value = linje;

    document.getElementById("liste").innerHTML = "";
}

function lastNed() {
    let tekst = "Dummy eksport";
    let blob = new Blob([tekst], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "stolpekontroll.csv";
    a.click();
}

</script>

</body>
</html>
