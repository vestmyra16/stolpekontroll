<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Stolpekontroll v2.9-Fixed</title>
    <style>
        body{font-family:Arial; max-width:420px; margin:auto; background:#f2f2f2; padding:10px;}
        label{display:block; font-weight:bold; color:#000 !important; margin-top:12px; margin-bottom:2px;}
        input{width:100%; padding:10px; border:1px solid #ccc; box-sizing:border-box; color:#000;}
        button{width:100%; padding:12px; margin:4px 0; background:#2e7d32; color:white; border:none; cursor:pointer;}
        .grid{display:grid; grid-template-columns:1fr 1fr; gap:5px;}
        .hidden{display:none;}
        img{width:120px; display:block; margin:10px auto;}
    </style>
</head>
<body>

<div id="loginBox">
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" class="hidden">
    <h3>Grunnlagsdata</h3>
    <label>Netteier</label><input id="netteier">
    <label>LinjeID</label><input id="linje">
    <label>Mastnr</label><input id="mast">
    <label>Stolpehøyde (m)</label><input id="hoyde">
    <label>Nedgravd (m)</label><input id="nedgravd">
    <label>Jordbånd (mm)</label><input id="jord">
    <label>Avtrapping</label><input id="avtr" value="0.75">
    <label>Toppdiameter</label><input id="topp">

    <h3>Forhold</h3>
    <div class="grid"><button onclick="sett('jord','Innmark')">Innmark</button><button onclick="sett('jord','Skogsmark')">Skogsmark</button><button onclick="sett('jord','Fjell')">Fjell</button></div>
    <h3>Registrer skade</h3>
    <div class="grid">
        <button onclick="velg('indre')">Indre råte</button>
        <button onclick="velg('sirk')">Sirk. råte</button>
        <button onclick="velg('soft')">Softråte</button>
        <button onclick="velg('spett')">Spettsmie</button>
        <button onclick="velg('hakk')">Hakkespett</button>
        <button onclick="velg('sprekk')">Sprekk</button>
    </div>

    <div id="skadeBox" class="hidden">
        <img id="skadeImg">
        <label>Stolpenr</label><input id="s_stolpe">
        <label>Skadehøyde</label><input id="s_h">
        <label>Skadelengde</label><input id="s_l">
        <label>Diameter</label><input id="s_d">
        <div id="dynamiskeFelt"></div>
    </div>

    <button onclick="lagre()">Lagre Mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned Excel</button>
</div>

<script>
const felter = {indre:['A','B','E'], sirk:['A','B','C','D'], soft:['A','B','C','D'], spett:['A','B'], hakk:['A','B','C','D'], sprekk:['Start','Slutt','A','B']};
let aktivType = "";

function login(){
    if(document.getElementById("pass").value==="1234"){
        let s = localStorage.getItem("start");
        if(!s) localStorage.setItem("start", new Date().getTime());
        if((new Date().getTime() - s) > (60*24*60*60*1000)) return alert("Lisens utløpt");
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
    }
}

function velg(type) {
    aktivType = type;
    document.getElementById("skadeBox").classList.remove("hidden");
    document.getElementById("skadeImg").src = type + ".svg";
    let d = document.getElementById("dynamiskeFelt");
    d.innerHTML = "";
    felter[type].forEach(f => {
        d.innerHTML += `<label>${f} (mm)</label><input class="f_val" data-navn="${f}">`;
    });
}

function lagre() {
    let db = JSON.parse(localStorage.getItem("db")||"[]");
    let obj = {
        mast: document.getElementById("mast").value,
        type: aktivType,
        stolpe: document.getElementById("s_stolpe").value
    };
    document.querySelectorAll(".f_val").forEach(i => obj[i.dataset.navn] = i.value);
    db.push(obj);
    localStorage.setItem("db", JSON.stringify(db));
    alert("Lagret");
}

function lastCSV() {
    let d = JSON.parse(localStorage.getItem("db"));
    let csv = "\uFEFF" + Object.keys(d[0]).join(";") + "\n" + d.map(r => Object.values(r).join(";")).join("\n");
    let a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "stolpekontroll.csv";
    a.click();
}
</script>
</body>
</html>
