<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v14.4</title>

<link rel="apple-touch-icon" href="icon-180.png">

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.section { background:#fff; padding:12px; margin-top:15px; border-radius:8px; }
label { display:block; margin-top:8px; font-weight:bold; }
input, select, textarea {
  width:100%; padding:8px; margin-top:3px;
  border:1px solid #999; border-radius:6px;
}
button {
  width:100%; padding:12px; margin-top:10px;
  background:#2e7d32; color:white;
  border:none; border-radius:6px;
}
.skadeblokk {
  background:#eef;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}
.linje {
  background:#fff;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>Stolpekontroll v14.4</h2>

<!-- GRUNNLAGSDATA -->
<div class="section">

<h3>Grunnlagsdata</h3>

<label>Netteier</label><input id="netteier">
<label>LinjeID</label><input id="linje">
<label>Mastnr</label><input id="mast">

<label>Stolpehøyde (m)</label><input id="hoyde">
<label>Nedgravingsdybde (m)</label><input id="nedgrav">

<label>Jordbandsdiameter (mm)</label><input id="jorddiam">
<label>Diameter på skadested (mm)</label><input id="diam">

<label>Klima</label>
<select>
<option>Kyst</option>
<option>Innland</option>
<option>Fjell</option>
</select>

<label>Jordsmonn</label>
<select>
<option>Innmark</option>
<option>Skog</option>
<option>Fjell</option>
</select>

</div>

<!-- SKADER -->
<div class="section">

<h3>Registrer skade</h3>

<label>Skadetype</label>
<select id="type">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Sprekk</option>
<option>Spettsmie</option>
</select>

<button onclick="nySkade()">➕ Ny skade (samme type)</button>

<div id="skader"></div>

</div>

<button onclick="lastNed()">📄 Last ned Excel</button>

<script>

function nySkade(){

let t = document.getElementById("type").value;

// Softråte kun én blokk
if(t==="Softråte"){
let eksisterer = document.querySelectorAll('[data-type="Softråte"]').length;
if(eksisterer > 0){
alert("Kun én registrering for Softråte");
return;
}
}

let blokk = document.createElement("div");
blokk.className = "skadeblokk";
blokk.setAttribute("data-type", t);

let html = `<b>${t}</b><br>

Høyde over bakken (m)
<input class="hoyde"><br>

📸 Bilde
<input type="file" accept="image/*" capture="environment"><br>

Merknad
<textarea></textarea>
`;

// 3 ferdige linjer
for(let i=1;i<=3;i++){

if(t==="Indre råte"){
html += `
<div class="linje">
Linje ${i}<br>
A <input class="A">
B <input class="B">
E <input class="E">
</div>`;
}

if(t==="Sirkulær råte"){
html += `
<div class="linje">
Linje ${i}<br>
A <input class="A">
B <input class="B">
C <input class="C">
D <input class="D">
</div>`;
}

if(t==="Sprekk"){
html += `
<div class="linje">
Linje ${i}<br>
A bredde <input class="A">
B dybde <input class="B">
C lengde <input class="C">
</div>`;
}

if(t==="Spettsmie"){
html += `
<div class="linje">
Linje ${i}<br>
A <input class="A">
B <input class="B">
</div>`;
}

if(t==="Softråte"){
html += `
<div class="linje">
Tykkelse (mm)
<input class="A">
</div>`;
}

}

html += `<button onclick="this.parentElement.remove()">Slett skade</button>`;

blokk.innerHTML = html;

document.getElementById("skader").appendChild(blokk);

}

function lastNed(){

let csv = "Type,Høyde,A,B,C,D,E\n";

let blokker = document.querySelectorAll(".skadeblokk");

blokker.forEach(blokk => {

let type = blokk.getAttribute("data-type");
let hoyde = blokk.querySelector(".hoyde")?.value || "";

let linjer = blokk.querySelectorAll(".linje");

linjer.forEach(linje => {

let A = linje.querySelector(".A")?.value || "";
let B = linje.querySelector(".B")?.value || "";
let C = linje.querySelector(".C")?.value || "";
let D = linje.querySelector(".D")?.value || "";
let E = linje.querySelector(".E")?.value || "";

if(A || B || C){
csv += `${type},${hoyde},${A},${B},${C},${D},${E}\n`;
}

});

});

let blob = new Blob([csv], {type:"text/csv"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "stolpekontroll.csv";
a.click();

}

</script>

</body>
</html>
