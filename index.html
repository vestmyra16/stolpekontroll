<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stolpekontroll v3.3</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;max-width:700px;margin:auto;padding:15px;}
label{font-weight:bold;display:block;margin-top:10px;}
input,select,textarea{width:100%;padding:10px;margin-top:4px;}
button{margin-top:10px;padding:16px;width:100%;background:green;color:white;border:none;font-size:16px;}
img{width:80px;margin-top:10px;}

/* Vertikallast */
.vert-btn{
    background:#ccc;
    margin-top:5px;
    padding:14px;
    text-align:center;
    cursor:pointer;
}
.vert-btn.active{
    background:darkgreen;
    color:white;
    font-weight:bold;
    border:2px solid black;
}
</style>
</head>

<body>

<h2>Grunnlagsdata</h2>

<label>Netteier</label>
<input id="netteier">

<label>LinjeID</label>
<input id="linje">

<label>Mastnr</label>
<input id="mast">

<label>Vertikallast</label>
<div class="vert-btn" onclick="velgVert(this,'Lav')">Lav</div>
<div class="vert-btn" onclick="velgVert(this,'Normal')">Normal</div>
<div class="vert-btn" onclick="velgVert(this,'Høy')">Høy</div>
<input type="hidden" id="vert">

<button onclick="nyMast()">Ny mast</button>

<h2>Registrer skade 1</h2>

<select id="skadetype1" onchange="visSkade(1)">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Spettsmie</option>
<option>Sprekk</option>
<option>Hakkespetthull</option>
</select>

<img id="img1">

<label>Skadehøyde (m)</label>
<input id="hoyde1">

<label>Diameter på skadested (mm)</label>
<input id="diameter1">

<div id="bokstaver1"></div>

<button onclick="taBilde(1)">📷 Ta bilde</button>
<input type="file" id="kamera1" accept="image/*" capture="environment" style="display:none">

<label>Merknad</label>
<textarea id="merknad1"></textarea>

<button onclick="visSkade2()">Ny registrering (skade 2)</button>

<div id="skade2" style="display:none;">

<h2>Registrer skade 2</h2>

<select id="skadetype2" onchange="visSkade(2)">
<option>Indre råte</option>
<option>Sirkulær råte</option>
<option>Softråte</option>
<option>Spettsmie</option>
<option>Sprekk</option>
<option>Hakkespetthull</option>
</select>

<img id="img2">

<label>Skadehøyde (m)</label>
<input id="hoyde2">

<label>Diameter på skadested (mm)</label>
<input id="diameter2">

<div id="bokstaver2"></div>

<button onclick="taBilde(2)">📷 Ta bilde</button>
<input type="file" id="kamera2" accept="image/*" capture="environment" style="display:none">

<label>Merknad</label>
<textarea id="merknad2"></textarea>

</div>

<button onclick="lagre()">Lagre</button>
<button onclick="lastNed()">Last ned Excel</button>

<script>

let data=[];

/* Vertikallast */
function velgVert(el,verdi){
    document.querySelectorAll('.vert-btn').forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("vert").value=verdi;
}

/* Ny mast */
function nyMast(){
    let n=netteier.value;
    let l=linje.value;

    document.querySelectorAll("input, textarea").forEach(e=>e.value="");

    netteier.value=n;
    linje.value=l;

    document.getElementById("skade2").style.display="none";

    document.querySelectorAll('.vert-btn').forEach(b=>b.classList.remove("active"));
    document.getElementById("vert").value="";
}

/* Kamera */
function taBilde(nr){
    document.getElementById("kamera"+nr).click();
}

/* Vis skade */
function visSkade(nr){

let type=document.getElementById("skadetype"+nr).value;
let div=document.getElementById("bokstaver"+nr);
let img=document.getElementById("img"+nr);

div.innerHTML="";

function felt(n){
    return `<label>${n} (mm)</label><input id="${n}${nr}">`;
}

if(type==="Indre råte"){
    img.src="indre.svg";
    div.innerHTML=felt("A")+felt("B")+felt("E");
}

if(type==="Sirkulær råte"){
    img.src="sirk.svg";
    div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");
}

if(type==="Softråte"){
    img.src="soft.svg";
    div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");
}

if(type==="Spettsmie"){
    img.src="spett.svg";
    div.innerHTML=felt("A")+felt("B");
}

if(type==="Sprekk"){
    img.src="sprekk.svg";
    div.innerHTML=felt("A")+felt("B");
}

if(type==="Hakkespetthull"){
    img.src="hakk.svg";
    div.innerHTML=felt("A")+felt("B")+felt("C")+felt("D");
}
}

/* Vis skade 2 */
function visSkade2(){
    document.getElementById("skade2").style.display="block";
    visSkade(2);
}

/* Lagre */
function lagre(){

data.push({
    netteier:netteier.value,
    linje:linje.value,
    mast:mast.value,
    vert:vert.value,
    type1:skadetype1.value,
    hoyde1:hoyde1.value,
    diameter1:diameter1.value,
    merknad1:merknad1.value,
    type2:skadetype2.value,
    hoyde2:hoyde2.value,
    diameter2:diameter2.value,
    merknad2:merknad2.value
});

alert("Lagret");
}

/* Excel */
function lastNed(){
let wb=XLSX.utils.book_new();
let ws=XLSX.utils.json_to_sheet(data);
XLSX.utils.book_append_sheet(wb,ws,"Data");

let navn = linje.value || "Stolpekontroll";
XLSX.writeFile(wb, navn + ".xlsx");
}

/* INIT */
window.onload=function(){
    visSkade(1);
    velgVert(document.querySelectorAll('.vert-btn')[1],'Normal');
}

</script>

</body>
</html>
