<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolpekontroll v4.2</title>
    <style>
        body{font-family:Arial; max-width:420px; margin:auto; background:#f2f2f2; padding:10px;}
        input, select{width:100%; padding:10px; margin:5px 0; border:1px solid #ccc;}
        button{width:100%; padding:12px; margin:5px 0; background:#2e7d32; color:white; border:none; cursor:pointer;}
        .grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;}
        .skade-boks{border:1px solid #999; padding:10px; margin-top:10px; background:#fff;}
        img { width: 100px; display: block; margin: 10px auto; }
    </style>
</head>
<body>

<div id="loginBox">
    <label>Passord</label>
    <input type="password" id="pass">
    <button onclick="login()">Logg inn</button>
</div>

<div id="app" style="display:none;">
    <h3>Grunnlagsdata</h3>
    <input id="netteier" placeholder="Netteier">
    <input id="linje" placeholder="LinjeID">
    <input id="mast" placeholder="Mastnr">
    <input id="hoyde" placeholder="Stolpehøyde (m)">
    <input id="nedgravd" placeholder="Nedgravd (m)">
    <input id="jord" placeholder="Jordbånddiam (mm)">
    <input id="avtr" placeholder="Avtrapping">
    <input id="topp" placeholder="Toppdiameter (mm)">

    <h3>Forhold</h3>
    <div class="grid"><button onclick="sett('jord','Skogsmark')">Skogsmark</button><button onclick="sett('jord','Innmark')">Innmark</button><button onclick="sett('jord','Fjell')">Fjell</button></div>
    <div class="grid"><button onclick="sett('klima','Kyst')">Kyst</button><button onclick="sett('klima','Innland')">Innland</button><button onclick="sett('klima','Fjell')">Fjell</button></div>
    <div class="grid"><button onclick="sett('last','Lav')">Lav</button><button onclick="sett('last','Normal')">Normal</button><button onclick="sett('last','Høy')">Høy</button></div>
    
    <input id="temp" placeholder="Lufttemperatur">
    <input id="rf" placeholder="Relativ fuktighet">
    <input id="fukt" placeholder="Fukt i ytterskall">
    <input id="gps" placeholder="GPS-koordinater">
    <button onclick="gps()">Slå på GPS</button>

    <h3>Registrer skade</h3>
    <div class="grid">
        <button onclick="skade('indre')">Indre</button><button onclick="skade('sirk')">Sirk</button><button onclick="skade('soft')">Soft</button>
        <button onclick="skade('spett')">Spett</button><button onclick="skade('hakk')">Hakk</button><button onclick="skade('sprekk')">Sprekk</button>
    </div>
    
    <div id="skadeContainer"></div>
    <button onclick="lagre()" style="background:#1b5e20;">Lagre mast</button>
    <button onclick="lastCSV()" style="background:#1565c0;">Last ned Excel</button>
</div>

<script>
const felter = {
    indre: ['A','B','E'], sirk: ['A','B','C','D'], soft: ['A','B','C','D'],
    spett: ['A','B'], hakk: ['A','B','C','D'], sprekk: ['Start','Slutt','A','B']
};

function sjekkTid() {
    let s = localStorage.getItem("start");
    if(!s) localStorage.setItem("start", new Date().getTime());
    if((new Date().getTime() - s) > (60*24*60*60*1000)) document.body.innerHTML="<h1>Lisens utløpt</h1>";
}

function login(){
    if(document.getElementById("pass").value==="1234"){
        sjekkTid();
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
    }
}

function skade(type) {
    let d = document.createElement("div");
    d.className = "skade-boks";
    d.innerHTML = `<img src="${type}.svg"><strong>${type}</strong>
        <input class="s_type" value="${type}" type="hidden">
        <input class="s_stolpe" placeholder="Stolpenr">
        <input class="s_h" placeholder="Skadehøyde">
        <input class="s_l" placeholder="Skadelengde">
        <input class="s_d" placeholder="Diameter">` + 
        felter[type].map(f => `<input class="s_felt" data-navn="${f}" placeholder="${f} (mm)">`).join('');
    document.getElementById("skadeContainer").appendChild(d);
}

function lagre() {
    let db = JSON.parse(localStorage.getItem("db")||"[]");
    document.querySelectorAll(".skade-boks").forEach(s => {
        let obj = {
            dato: new Date().toLocaleDateString(),
            netteier: document.getElementById("netteier").value,
            mast: document.getElementById("mast").value,
            type: s.querySelector(".s_type").value
        };
        s.querySelectorAll("input").forEach(i => {
            if(i.className === "s_felt") obj[i.dataset.navn] = i.value;
        });
        db.push(obj);
    });
    localStorage.setItem("db", JSON.stringify(db));
    alert("Lagret");
}

function lastCSV() {
    let d = JSON.parse(localStorage.getItem("db"));
    let csv = "\uFEFF" + Object.keys(d[0]).join(";") + "\n" + d.map(r => Object.values(r).join(";")).join("\n");
    let a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "stolpekontroll.csv";
    a.click();
}
</script>
</body>
</html>
