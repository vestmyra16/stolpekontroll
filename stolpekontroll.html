<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:15px;}
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select, button { width:100%; padding:10px; margin:5px 0;}
button { background:#2e7d32; color:white; border:none;}
</style>
</head>

<body>

<h1>Stolpekontroll</h1>

<div class="card">
<h2>Grunnlagsdata</h2>
<input id="diameter" placeholder="Diameter (mm)">
</div>

<div class="card">
<h2>Skade</h2>

<select id="type" onchange="visFelter()">
<option>Innvendig råte</option>
<option>Sirkulær råte</option>
<option>Hakkespetthull med reirhull</option>
</select>

<div id="felter"></div>

<button onclick="leggTil()">Legg til skade</button>

<div id="liste"></div>
</div>

<div class="card">
<button onclick="beregn()">Kjør beregning</button>
</div>

<div class="card">
<h2>Resultat</h2>
<div id="resultat"></div>
</div>

<script>

let skader=[];

function visFelter(){
 let t = document.getElementById("type").value;
 let html="";

 if(t==="Innvendig råte"){
  html="A<input id='A'> B<input id='B'> E<input id='E'>";
 }

 if(t==="Sirkulær råte"){
  html="A<input id='A'> B<input id='B'> C<input id='C'> D<input id='D'>";
 }

 if(t==="Hakkespetthull med reirhull"){
  html="HB<input id='HB'> HH<input id='HH'> HDY<input id='HDY'>";
 }

 document.getElementById("felter").innerHTML=html;
}

function getVal(id){
 let el = document.getElementById(id);
 if(!el) return 0;
 return parseFloat(el.value) || 0;
}

function leggTil(){

 let t = document.getElementById("type").value;

 skader.push({
  type:t,
  A:getVal("A"),
  B:getVal("B"),
  C:getVal("C"),
  D:getVal("D"),
  E:getVal("E"),
  HB:getVal("HB")
 });

 document.getElementById("liste").innerHTML =
 skader.map(s=>s.type).join("<br>");
}

function beregn(){

 let D = parseFloat(document.getElementById("diameter").value);
 if(!D){
  resultat.innerHTML="Mangler diameter";
  return;
 }

 let rest = 100;

 skader.forEach(s=>{
  if(s.A) rest -= s.A * 0.5;
  if(s.E) rest = Math.min(rest, s.E);
 });

 let status = rest >= 75 ? "Godkjent" : "Tiltak nødvendig";

 resultat.innerHTML =
 "Restkapasitet: " + rest.toFixed(1) + "%<br>" +
 "Status: " + status;
}

visFelter();

</script>

</body>
</html>
