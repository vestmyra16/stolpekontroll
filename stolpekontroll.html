<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stolpekontroll</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:white; border:none; }
.result { font-weight:bold; padding:10px; }
</style>
</head>

<body>

<h2>Stolpekontroll</h2>

<div class="card">
<h3>Grunnlag</h3>
<input id="stolpenr" placeholder="Stolpenr">
<input id="diameter" placeholder="Diameter skadested (mm)" type="number">
</div>

<div class="card">
<h3>Fukt</h3>
<label><input type="checkbox" id="fuktAktiv"> Aktiver fukt</label>

<div id="fuktFelt">
<input placeholder="Temperatur">
<input placeholder="Relativ luftfuktighet">
<input placeholder="Fukt ytre (%)">
<input placeholder="Fukt indre (%)">
</div>
</div>

<div class="card">
<h3>Skader</h3>

<select id="skadeType">
<option>Ingen</option>
<option>Innvendig råte</option>
<option>Softråte</option>
</select>

<input id="A" placeholder="A (mm)">
<input id="B" placeholder="B (mm)">
<input id="reduksjon" placeholder="Diameterreduksjon (mm)">
</div>

<div class="card">
<h3>Beregning</h3>
<button onclick="beregn()">Beregn</button>
<div id="resultat" class="result"></div>
</div>

<div class="card">
<h3>Eksport</h3>
<button onclick="lastNedExcel()">Last ned Excel</button>
<button onclick="lagPDF()">Lag PDF</button>
</div>

<script>

// Fukt toggle (fikser iPhone bug)
const fuktCheckbox = document.getElementById("fuktAktiv");
const fuktFelt = document.getElementById("fuktFelt");

function toggleFukt() {
  fuktFelt.style.display = fuktCheckbox.checked ? "block" : "none";
}
fuktCheckbox.addEventListener("change", toggleFukt);
window.addEventListener("load", toggleFukt);

// Beregning (forenklet men riktig prinsipp)
function beregn() {
  let d = parseFloat(document.getElementById("diameter").value) || 0;
  let A = parseFloat(document.getElementById("A").value) || 0;
  let B = parseFloat(document.getElementById("B").value) || 0;
  let reduksjon = parseFloat(document.getElementById("reduksjon").value) || 0;
  let type = document.getElementById("skadeType").value;

  let rest = 100;

  if (type === "Innvendig råte") {
    let hulrom = A + B;
    rest = ((d - hulrom) / d) * 100;
  }

  if (type === "Softråte") {
    rest = ((d - reduksjon) / d) * 100;
  }

  let status = rest >= 75 ? "GODKJENT" : "IKKE GODKJENT";

  document.getElementById("resultat").innerHTML =
    "Restkapasitet: " + rest.toFixed(1) + "%<br>Status: " + status;
}

// Excel eksport
function lastNedExcel() {
  let data = "Stolpenr,Diameter,Resultat\n";
  data += document.getElementById("stolpenr").value + ",";
  data += document.getElementById("diameter").value + ",";
  data += document.getElementById("resultat").innerText;

  let blob = new Blob([data], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rapport.csv";
  a.click();
}

// PDF (bruker print)
function lagPDF() {
  window.print();
}

</script>

</body>
</html>
